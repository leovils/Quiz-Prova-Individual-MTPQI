{id:"r7q02",text:"O TOST é usado quando o pesquisador quer demonstrar:",options:["Que há diferença significante entre grupos","Que dois tratamentos são equivalentes (efeito desprezível)","Que o p-valor é menor que 0,05","Que o tamanho de efeito é grande"],answer:1,difficulty:"easy",explain_correct:"O TOST testa equivalência — demonstra que a diferença entre grupos é tão pequena que é praticamente irrelevante, dentro de limites pré-definidos (Δ).",explain_wrong:"Diferença significante é objetivo do NHST. O TOST não busca p < 0,05 no sentido tradicional, nem efeitos grandes — busca evidência de que o efeito é trivial."},
{id:"r7q03",text:"SESOI (Smallest Effect Size of Interest) representa:",options:["O maior efeito que o teste pode detectar","O menor tamanho de efeito que seria considerado relevante na prática","O efeito médio da população","O tamanho de efeito que produz p = 0,05"],answer:1,difficulty:"easy",explain_correct:"O SESOI é o menor efeito que teria relevância prática no contexto da pesquisa. Abaixo dele, diferenças são consideradas triviais. É definido a priori pelo pesquisador.",explain_wrong:"Não é o teto de detecção, nem o efeito médio, nem derivado do p-valor. É um limiar substantivo definido antes da análise, com base em teoria ou consequências práticas."},
{id:"r7q04",text:"Os limites de equivalência no TOST (−Δ, +Δ) devem ser definidos:",options:["Após ver os resultados, para maximizar a chance de equivalência","A priori, antes da coleta, com base em argumentos teóricos ou práticos","Como ±1 desvio-padrão, sempre","Pelo software estatístico automaticamente"],answer:1,difficulty:"easy",explain_correct:"Definir Δ a priori é fundamental para a integridade do TOST. Os limites devem refletir o que é praticamente irrelevante na área de pesquisa, não ser ajustados post-hoc.",explain_wrong:"Definir após ver resultados é manipulação (equivalente a p-hacking). Não existe regra fixa de ±1 DP. O software não decide — o pesquisador fundamenta com teoria."},
{id:"r7q05",text:"No TOST, qual intervalo de confiança é tipicamente utilizado para testar equivalência a α = 0,05?",options:["IC 99%","IC 95%","IC 90%","IC 80%"],answer:2,difficulty:"easy",explain_correct:"O TOST usa IC 90% (não 95%) porque são dois testes unilaterais a α = 0,05 cada. O IC (1 − 2α) = IC 90% corresponde à região de decisão dos dois testes simultâneos.",explain_wrong:"IC 95% corresponderia a α = 0,025 por teste. IC 99% ou 80% não se alinham com a lógica de dois testes unilaterais a 0,05 cada."},
{id:"r7q06",text:"Odin Dinho ensina: 'Ausência de evidência não é evidência de ausência.' O TOST resolve esse problema porque:",options:["Elimina a possibilidade de erro Tipo II","Fornece evidência positiva de que o efeito é trivial, não apenas que falhamos em detectá-lo","Garante que p > 0,05 significa igualdade","Substitui completamente o NHST"],answer:1,difficulty:"easy",explain_correct:"O NHST só diz 'não rejeitamos H₀' — não prova ausência de efeito. O TOST testa diretamente se o efeito está dentro de limites triviais, fornecendo evidência positiva de equivalência.",explain_wrong:"Nenhum teste elimina erros completamente. p > 0,05 no NHST nunca prova igualdade. O TOST complementa o NHST, não o substitui."},
{id:"r7q07",text:"No TOST, para concluir equivalência, é necessário que:",options:["Apenas um dos dois testes unilaterais seja significante","Os dois testes unilaterais sejam significantes (ambos p < α)","O IC 90% inclua zero","O p-valor do NHST seja maior que 0,05"],answer:1,difficulty:"easy",explain_correct:"Ambos os testes unilaterais devem rejeitar suas respectivas H₀. Se apenas um rejeita, não podemos concluir que o efeito está dentro de ambos os limites (−Δ, +Δ).",explain_wrong:"Um teste só exclui um lado. O IC 90% deve estar inteiramente dentro de (−Δ, +Δ), não apenas incluir zero. O resultado NHST é independente da conclusão TOST."},
{id:"r7q08",text:"ThorMento pergunta: 'TOST pareado e TOST independente — qual a diferença?' Muninn responde:",options:["Não existe TOST pareado — só funciona com grupos independentes","O TOST pareado usa diferenças intra-sujeito, exatamente como o teste t pareado, mas com limites de equivalência","O TOST pareado não precisa de limites de equivalência","O TOST independente é sempre mais poderoso"],answer:1,difficulty:"easy",explain_correct:"Assim como o teste t, o TOST pode ser aplicado a dados pareados (mesmos sujeitos em duas condições) ou independentes (grupos distintos). A lógica dos limites Δ permanece idêntica.",explain_wrong:"TOST pareado existe e é bastante usado. Limites são sempre necessários. O pareado geralmente tem mais poder quando há correlação entre medidas."},
{id:"r7q09",text:"Quando o TOST conclui equivalência, isso significa que:",options:["As médias são exatamente iguais","A diferença entre as médias está dentro dos limites de equivalência pré-definidos","O p-valor do teste t tradicional é maior que 0,05","Não há nenhum efeito na população"],answer:1,difficulty:"easy",explain_correct:"Equivalência estatística não é igualdade perfeita. Significa que a diferença observada é pequena o suficiente para ser considerada trivial, conforme os limites Δ definidos a priori.",explain_wrong:"Médias exatamente iguais é praticamente impossível. O resultado NHST é independente. Nenhum teste prova 'nenhum efeito' — apenas efeito dentro de limites definidos."},
{id:"r7q10",text:"A diferença fundamental entre NHST e TOST é que:",options:["O NHST testa se o efeito é diferente de zero; o TOST testa se o efeito é pequeno o suficiente para ser irrelevante","O NHST usa p-valor e o TOST não","O TOST sempre exige amostras maiores que o NHST","O NHST é bilateral e o TOST é unilateral"],answer:0,difficulty:"easy",explain_correct:"O NHST pergunta 'o efeito é diferente de zero?' enquanto o TOST pergunta 'o efeito está dentro de limites de irrelevância prática?' São perguntas complementares, não opostas.",explain_wrong:"O TOST também usa p-valores (dois, na verdade). Nem sempre exige N maior. O TOST usa dois testes unilaterais, mas a lógica geral é diferente de 'ser unilateral'."},
{id:"r7q11",text:"Odin Dinho cruza resultados de NHST e TOST e obtém: NHST significante + TOST equivalente. O que isso significa?",options:["Contradição — os resultados se anulam","O efeito existe estatisticamente, mas é tão pequeno que é praticamente irrelevante (efeito trivial)","Erro no cálculo — impossível ser significante e equivalente","Deve-se repetir o estudo com amostra menor"],answer:1,difficulty:"medium",explain_correct:"Este é o quadrante 'significante + equivalente': com amostra grande, até efeitos minúsculos são detectáveis pelo NHST, mas o TOST confirma que são triviais na prática.",explain_wrong:"Não é contradição nem erro — é perfeitamente possível com N grande. Reduzir a amostra não resolve. É um resultado informativo: efeito real porém irrelevante."},
{id:"r7q12",text:"Huginn questiona: 'NHST não significante + TOST não equivalente. O que concluímos?' A resposta é:",options:["Os grupos são iguais","Os grupos são diferentes","Resultado indeterminado — não temos evidência nem de diferença nem de equivalência","O TOST falhou e devemos confiar só no NHST"],answer:2,difficulty:"medium",explain_correct:"Este é o quadrante indeterminado: o NHST não detectou diferença, mas o TOST também não confirmou equivalência. Literalmente não sabemos — pode ser efeito real com poder insuficiente.",explain_wrong:"Sem rejeitar H₀ no NHST, não provamos igualdade. Sem equivalência no TOST, não confirmamos trivialidade. Os dois testes dão informações complementares, não se substituem."},
{id:"r7q13",text:"Um pesquisador define Δ = ±0,30 (em Cohen's d) para um TOST. O IC 90% da diferença padronizada é [−0,18; 0,25]. Qual a conclusão?",options:["Equivalência confirmada — o IC 90% está inteiramente dentro de (−0,30; +0,30)","Equivalência não confirmada — o IC excede os limites","Significância estatística detectada","Indeterminado — precisamos do p-valor do NHST"],answer:0,difficulty:"medium",explain_correct:"O IC 90% [−0,18; 0,25] cabe inteiramente dentro dos limites (−0,30; +0,30). Logo, ambos os testes unilaterais rejeitam, e concluímos equivalência.",explain_wrong:"Os limites não foram excedidos. A conclusão de equivalência via IC não requer o p-valor NHST. Quando o IC 90% está dentro de (−Δ, +Δ), a equivalência está demonstrada."},
{id:"r7q14",text:"Se o pesquisador define Δ muito amplo (ex: ±2,0 em d), qual o problema?",options:["O TOST terá menos poder estatístico","O TOST quase sempre concluirá equivalência, mesmo com efeitos substanciais — limites frouxos são pouco informativos","Não há problema — limites amplos são mais conservadores","O software não aceita Δ > 1,0"],answer:1,difficulty:"medium",explain_correct:"Limites excessivamente amplos tornam o TOST trivial: qualquer efeito razoável cairá dentro, e a conclusão de 'equivalência' perde significado prático. Os limites devem ser substantivamente justificados.",explain_wrong:"Limites amplos aumentam (não diminuem) o poder. Não são conservadores — são permissivos demais. Softwares aceitam qualquer Δ. O problema é substantivo, não técnico."},
{id:"r7q15",text:"Odin Dinho obtém: NHST não significante (p = 0,31) + TOST significante (equivalência confirmada com Δ = ±0,20). ThorMento diz: 'Se não é significante, como pode ser equivalente?' A explicação é:",options:["ThorMento está certo — é impossível","O NHST falhou em rejeitar H₀ (efeito pode ser zero ou pequeno), e o TOST confirmou positivamente que o efeito é ≤ Δ. São perguntas diferentes com respostas compatíveis","O TOST invalidou o NHST","Devemos ignorar o NHST quando o TOST é significante"],answer:1,difficulty:"medium",explain_correct:"São testes com perguntas distintas. NHST: 'efeito ≠ 0?' (não conseguiu provar). TOST: 'efeito ≤ Δ?' (sim, confirmou). Este é o quadrante 'não significante + equivalente' — resultado coerente e desejável quando se busca equivalência.",explain_wrong:"Não é impossível nem inválido. Os testes se complementam — não se invalidam. Devemos reportar ambos para quadro completo."},
{id:"r7q16",text:"Para definir o SESOI de forma rigorosa, qual abordagem é recomendada?",options:["Usar sempre d = 0,50 como padrão universal","Basear-se em benchmarks de Cohen (0,20, 0,50, 0,80) sem adaptação","Fundamentar com teoria da área, estudos anteriores, ou consequências práticas mínimas relevantes","Escolher o menor Δ que produza significância no TOST"],answer:2,difficulty:"medium",explain_correct:"O SESOI deve refletir o menor efeito com consequência prática real na área — fundamentado em literatura, teoria ou análise de custos/benefícios. Não existe valor universal.",explain_wrong:"Benchmarks de Cohen são genéricos e descontextualizados. Escolher Δ para obter resultado desejado é manipulação. O SESOI é uma decisão substantiva, não arbitrária."},
{id:"r7q17",text:"Huginn provoca: 'Se meu IC 90% é [−0,28; 0,05] e os limites são Δ = ±0,25, posso concluir equivalência?'",options:["Sim — o IC está quase todo dentro dos limites","Não — o limite inferior (−0,28) excede −Δ (−0,25), então o IC não está inteiramente contido nos limites","Sim — o importante é que zero está no IC","Não — porque o IC inclui valores negativos"],answer:1,difficulty:"medium",explain_correct:"O IC 90% deve estar inteiramente dentro de (−Δ, +Δ). Como −0,28 < −0,25, o limite inferior extrapola. Não podemos concluir equivalência — falhamos no teste unilateral inferior.",explain_wrong:"'Quase dentro' não conta — a regra é estrita. Zero no IC é relevante para NHST, não TOST. Valores negativos per se não são problema — o problema é exceder −Δ."},
{id:"r7q18",text:"Num estudo de equivalência entre duas técnicas de forja, Odin Dinho usa TOST com Δ = ±3 pontos na escala original e obtém IC 90% = [−1,5; 2,8]. O NHST indica p = 0,22. Qual dos 4 quadrantes descreve o resultado?",options:["Significante + Equivalente","Significante + Não-equivalente","Não-significante + Equivalente","Não-significante + Não-equivalente (indeterminado)"],answer:2,difficulty:"medium",explain_correct:"NHST: p = 0,22 > 0,05 → não significante. TOST: IC 90% [−1,5; 2,8] está dentro de (−3; +3) → equivalente. Quadrante: não-significante + equivalente — evidência de efeito trivial.",explain_wrong:"Sem significância no NHST, eliminamos quadrantes com 'significante'. O IC dentro dos limites confirma equivalência, eliminando 'indeterminado'. É o quadrante ideal para quem busca equivalência."},
{id:"r7q19",text:"Um pesquisador argumenta: 'Obtive p = 0,45 no teste t, logo os grupos são equivalentes.' Por que Odin Dinho discorda?",options:["Porque p = 0,45 prova que H₀ é verdadeira","Porque p alto no NHST não prova equivalência — apenas indica insuficiência de evidência para diferença. Sem TOST, não há teste formal de equivalência","Porque o pesquisador deveria ter usado α = 0,10","Porque o teste t não se aplica a comparações de equivalência"],answer:1,difficulty:"medium",explain_correct:"p alto no NHST significa 'não encontramos evidência de diferença' — não significa 'provamos igualdade'. O TOST é necessário para afirmar positivamente que o efeito é trivial.",explain_wrong:"p alto não prova H₀. Mudar α não resolve o problema conceitual. O teste t pode ser usado dentro do TOST. O ponto é que ausência de significância ≠ evidência de equivalência."},
{id:"r7q20",text:"Muninn resume os 4 quadrantes NHST × TOST. Qual combinação indica que devemos aumentar o tamanho amostral antes de concluir?",options:["Significante + Equivalente (efeito trivial detectado)","Significante + Não-equivalente (efeito real e relevante)","Não-significante + Equivalente (evidência de equivalência)","Não-significante + Não-equivalente (indeterminado)"],answer:3,difficulty:"medium",explain_correct:"O quadrante indeterminado (não-significante + não-equivalente) indica que não temos evidência nem de diferença nem de equivalência. A causa mais provável é amostra insuficiente — mais dados podem resolver a ambiguidade.",explain_wrong:"Os outros três quadrantes fornecem conclusões claras. Só o indeterminado deixa em aberto, sugerindo que o estudo carece de poder para responder qualquer uma das perguntas."}
],

"reino8": [
{id:"r8q01",text:"Na ANOVA de um fator, o que a razão F compara?",options:["A média geral com a média de cada grupo","A variância entre grupos com a variância dentro dos grupos","O desvio-padrão total com o desvio-padrão residual","A soma dos quadrados total com os graus de liberdade"],answer:1,difficulty:"easy",explain_correct:"A razão F é exatamente a divisão da variância entre grupos (MSB) pela variância dentro dos grupos (MSW). Se os grupos diferem de verdade, MSB será grande em relação a MSW.",explain_wrong:"A razão F não compara médias diretamente nem desvios-padrão — ela compara estimativas de variância (quadrados médios)."},
{id:"r8q02",text:"Um mestre-cervejeiro de Valhalla testa 4 receitas de hidromel com 10 provadores cada. Quantos graus de liberdade tem o fator entre grupos (dfB)?",options:["4","3","36","39"],answer:1,difficulty:"easy",explain_correct:"Os graus de liberdade entre grupos são k − 1 = 4 − 1 = 3, onde k é o número de grupos.",explain_wrong:"Não se usa N ou N−1 para o fator entre grupos. O df entre grupos depende apenas do número de grupos (k), não do total de observações."},
{id:"r8q03",text:"A partição fundamental da ANOVA de um fator estabelece que SST = SSB + SSW. O que SSW representa?",options:["A variação total dos dados","A variação explicada pelas diferenças entre os grupos","A variação dentro de cada grupo, não explicada pelo fator","A variação devida ao erro de medida do instrumento"],answer:2,difficulty:"easy",explain_correct:"SSW (soma de quadrados within) captura a variabilidade das observações dentro de cada grupo em torno da média do próprio grupo — é a porção não explicada pelo fator.",explain_wrong:"SSW não é a variação total (essa é SST) nem a variação entre grupos (essa é SSB). Também não se limita a erro de instrumento — inclui toda variação individual."},
{id:"r8q04",text:"Qual pressuposto da ANOVA verifica se as variâncias dos grupos são semelhantes?",options:["Normalidade dos resíduos","Independência das observações","Homocedasticidade (homogeneidade de variâncias)","Linearidade da relação"],answer:2,difficulty:"easy",explain_correct:"Homocedasticidade significa que os grupos comparados possuem variâncias populacionais aproximadamente iguais. É um dos três pressupostos clássicos da ANOVA.",explain_wrong:"Normalidade refere-se à forma da distribuição, não às variâncias. Independência trata da relação entre observações. Linearidade é pressuposto de regressão, não da ANOVA clássica."},
{id:"r8q05",text:"Qual teste é usado para verificar formalmente a homogeneidade de variâncias antes de rodar uma ANOVA?",options:["Teste de Tukey","Teste de Mauchly","Teste de Levene","Teste de Bonferroni"],answer:2,difficulty:"easy",explain_correct:"O teste de Levene avalia se as variâncias dos grupos são estatisticamente diferentes. É robusto a desvios de normalidade, por isso é o mais recomendado.",explain_wrong:"Tukey e Bonferroni são procedimentos post-hoc para comparações múltiplas. Mauchly testa esfericidade em medidas repetidas, não homogeneidade de variâncias em ANOVA de um fator."},
{id:"r8q06",text:"Se o teste de Levene indica variâncias heterogêneas entre os grupos, qual alternativa robusta à ANOVA clássica é recomendada?",options:["Teste t de Student pareado","ANOVA de Welch","Teste de Friedman","Regressão logística"],answer:1,difficulty:"easy",explain_correct:"A ANOVA de Welch não assume variâncias iguais entre os grupos, ajustando os graus de liberdade para acomodar a heterocedasticidade.",explain_wrong:"O teste t pareado compara apenas dois grupos relacionados. Friedman é para medidas repetidas não-paramétricas. Regressão logística é para variáveis dependentes categóricas."},
{id:"r8q07",text:"Ao comparar 5 tipos de espada forjadas em Valhalla, a ANOVA retorna F significativo. O que isso nos diz?",options:["Que todos os 5 tipos diferem entre si","Que pelo menos um tipo difere dos demais em média","Que o tipo com maior média é significativamente superior","Que as variâncias dos 5 tipos são iguais"],answer:1,difficulty:"easy",explain_correct:"Um F significativo na ANOVA indica apenas que existe pelo menos uma diferença entre as médias dos grupos — não especifica quais pares diferem.",explain_wrong:"A ANOVA é um teste omnibus: não identifica quais grupos diferem entre si nem garante que todos diferem. Para isso, são necessários testes post-hoc."},
{id:"r8q08",text:"O que é o erro familywise (familywise error rate) no contexto de comparações múltiplas?",options:["O erro padrão da média de todos os grupos combinados","A probabilidade de cometer pelo menos um Erro Tipo I ao realizar múltiplas comparações","A taxa de falsos negativos em um conjunto de testes","O viés introduzido por amostras de tamanhos desiguais"],answer:1,difficulty:"easy",explain_correct:"Quando fazemos múltiplas comparações, a probabilidade acumulada de rejeitar pelo menos uma hipótese nula verdadeira cresce. Essa probabilidade conjunta é o erro familywise.",explain_wrong:"Não se trata de erro padrão, nem de falsos negativos (Tipo II), nem de viés amostral. É especificamente a inflação do Erro Tipo I ao multiplicar comparações."},
{id:"r8q09",text:"Qual medida de tamanho de efeito na ANOVA representa a proporção da variância total explicada pelo fator?",options:["Cohen's d","η² (eta-quadrado)","Hedges' g","r de Pearson"],answer:1,difficulty:"easy",explain_correct:"O η² (eta-quadrado) é calculado como SSB/SST e indica que proporção da variabilidade total dos dados é atribuída às diferenças entre os grupos.",explain_wrong:"Cohen's d e Hedges' g medem diferenças padronizadas entre duas médias, não proporções de variância. O r de Pearson mede associação linear entre duas variáveis contínuas."},
{id:"r8q10",text:"Na ANOVA, o que significa MSB (quadrado médio entre grupos)?",options:["A soma dos quadrados entre grupos dividida por N","A soma dos quadrados entre grupos dividida por k − 1","A variância total dividida pelo número de grupos","A média aritmética das médias de cada grupo"],answer:1,difficulty:"easy",explain_correct:"MSB = SSB / dfB = SSB / (k − 1). É a variância estimada entre os grupos, usada no numerador da razão F.",explain_wrong:"Não se divide por N (total de observações) nem pela variância total. Também não é uma média aritmética das médias — é uma estimativa de variância."},
{id:"r8q11",text:"Três clãs vikings (n=15 cada) competem no tempo de remo. SSB = 420 e SSW = 1260. Qual é o valor da razão F?",options:["0,33","2,00","5,88","7,00"],answer:3,difficulty:"medium",explain_correct:"MSB = 420/(3−1) = 210. MSW = 1260/(45−3) = 1260/42 = 30. F = 210/30 = 7,00.",explain_wrong:"F não é SSB/SSW diretamente (isso daria 0,33). É preciso dividir cada SS pelos respectivos graus de liberdade para obter os quadrados médios antes de calcular a razão."},
{id:"r8q12",text:"Uma ANOVA com 4 grupos e N total = 60 produz F(3, 56) = 4,12, p = 0,01. Qual é o η²?",options:["Não é possível calcular sem SSB e SST","η² = 0,181","η² = 0,069","η² = 0,412"],answer:0,difficulty:"medium",explain_correct:"Para calcular η² precisamos de SSB e SST (ou SSB e SSW). Apenas com F e os graus de liberdade não é possível obter η² diretamente sem informação adicional sobre as somas de quadrados.",explain_wrong:"Não se pode simplesmente dividir F por algum valor de gl para obter η². A fórmula é η² = SSB/SST, que exige as somas de quadrados, não apenas a razão F."},
{id:"r8q13",text:"Um pesquisador compara 5 fornos de forja e obtém SSB = 200 e SST = 1000. Qual é o η² e como se interpreta?",options:["η² = 0,20 — o tipo de forno explica 20% da variância no resultado","η² = 0,80 — o tipo de forno explica 80% da variância","η² = 0,25 — efeito moderado","η² = 5,00 — efeito muito grande"],answer:0,difficulty:"medium",explain_correct:"η² = SSB/SST = 200/1000 = 0,20. Isso significa que 20% da variabilidade total na qualidade da forja é explicada pelo tipo de forno.",explain_wrong:"η² é sempre um valor entre 0 e 1. Não se calcula como SST/SSB (que daria 5) nem como SSW/SST (que daria 0,80)."},
{id:"r8q14",text:"Por que o ω² (ômega-quadrado) é considerado menos enviesado que o η² como estimador de tamanho de efeito?",options:["Porque usa a mediana em vez da média","Porque corrige para o número de grupos e o tamanho amostral, reduzindo a superestimação","Porque é calculado a partir dos ranks, não dos valores brutos","Porque só considera a variância within"],answer:1,difficulty:"medium",explain_correct:"O η² tende a superestimar o tamanho de efeito populacional, especialmente com amostras pequenas. O ω² aplica uma correção que leva em conta k e N, fornecendo uma estimativa menos inflada.",explain_wrong:"ω² não usa medianas nem ranks — trabalha com as mesmas somas de quadrados da ANOVA, mas inclui um fator de correção. Também não ignora a variância between."},
{id:"r8q15",text:"Em uma ANOVA com 6 tipos de hidromel, quantas comparações par a par são possíveis e qual é a probabilidade aproximada de erro familywise com α = 0,05 sem correção?",options:["15 comparações; ≈ 54%","6 comparações; ≈ 26%","15 comparações; ≈ 30%","30 comparações; ≈ 78%"],answer:0,difficulty:"medium",explain_correct:"O número de pares é C(6,2) = 15. A probabilidade familywise aproximada é 1 − (1−0,05)^15 = 1 − 0,95^15 ≈ 1 − 0,463 ≈ 0,537, ou cerca de 54%.",explain_wrong:"O número de comparações é k(k−1)/2 = 15, não 6 ou 30. A taxa familywise cresce rapidamente com o número de comparações — por isso correções como Bonferroni ou Tukey são essenciais."},
{id:"r8q16",text:"Qual a diferença principal entre o teste post-hoc de Tukey HSD e a correção de Bonferroni?",options:["Tukey é mais conservador que Bonferroni em todos os cenários","Tukey controla o erro familywise comparando todas as médias par a par usando a distribuição Studentized Range; Bonferroni simplesmente divide α pelo número de comparações","Bonferroni só funciona com grupos de tamanho igual; Tukey funciona com tamanhos desiguais","Tukey é um teste não-paramétrico; Bonferroni é paramétrico"],answer:1,difficulty:"medium",explain_correct:"O Tukey HSD usa a distribuição Studentized Range (q) projetada especificamente para todas as comparações par a par simultâneas. Bonferroni é um método geral que ajusta α dividindo pelo número de comparações — é mais flexível, mas tende a ser mais conservador quando há muitos pares.",explain_wrong:"Bonferroni é geralmente mais conservador que Tukey quando há muitas comparações. Tukey funciona melhor com tamanhos iguais, mas não é não-paramétrico — ambos assumem normalidade e homocedasticidade."},
{id:"r8q17",text:"Se as variâncias são heterogêneas E os tamanhos amostrais são desiguais, qual teste post-hoc é mais indicado?",options:["Tukey HSD","Fisher LSD","Games-Howell","Bonferroni"],answer:2,difficulty:"medium",explain_correct:"O Games-Howell não assume variâncias iguais nem tamanhos amostrais iguais, sendo o post-hoc indicado quando ambas as condições são violadas. É baseado na distribuição Studentized Range com gl corrigidos à la Welch.",explain_wrong:"Tukey HSD, Fisher LSD e Bonferroni clássicos pressupõem homocedasticidade. Fisher LSD, além disso, não controla o erro familywise. Nenhum deles é robusto a variâncias heterogêneas."},
{id:"r8q18",text:"Um mestre de armas compara 3 técnicas de combate (n=20 cada). Obtém F(2,57) = 5,34, p = 0,008, η² = 0,158. Qual o reporte APA correto?",options:["F(2,57) = 5,34, p = 0,008, d = 0,158","F(2,57) = 5,34, p < 0,01, η² = 0,16","F = 5,34, gl = 57, p = 0,008","F(2,57) = 5,34, p = 0,008, η² = .16"],answer:3,difficulty:"medium",explain_correct:"O formato APA exige F(dfB, dfW) = valor, p = valor exato, e tamanho de efeito. A notação usa ponto (sem zero à esquerda) para proporções: η² = .16. Reportar p exato é preferível a p < limiar.",explain_wrong:"Não se reporta d (Cohen's d) como tamanho de efeito da ANOVA — usa-se η² ou ω². Omitir os graus de liberdade ou usar formatos não padronizados viola as normas APA."},
{id:"r8q19",text:"Qual a vantagem dos contrastes planejados (a priori) sobre os testes post-hoc na ANOVA?",options:["Os contrastes planejados são mais conservadores e protegem melhor contra o Erro Tipo I","Os contrastes planejados têm mais poder estatístico porque testam hipóteses específicas definidas antes dos dados, sem necessidade de correção para comparações múltiplas","Os contrastes planejados não exigem nenhum pressuposto da ANOVA","Os contrastes planejados substituem completamente o teste F omnibus"],answer:1,difficulty:"medium",explain_correct:"Contrastes planejados são definidos antes de ver os dados e testam hipóteses específicas. Como são limitados a k−1 contrastes ortogonais, não inflam o erro familywise tanto quanto explorar todos os pares, resultando em maior poder.",explain_wrong:"Contrastes planejados são MENOS conservadores (mais poder), não mais. Eles ainda exigem os pressupostos da ANOVA e tipicamente complementam o teste omnibus em vez de substituí-lo."},
{id:"r8q20",text:"Um pesquisador argumenta que a ANOVA é apenas um caso especial do Modelo Linear Geral (GLM). Qual justificativa sustenta essa afirmação?",options:["Porque a ANOVA usa a distribuição F, que também aparece na regressão","Porque a ANOVA pode ser reescrita como uma regressão com variáveis dummy codificando a pertença ao grupo, onde o teste F na ANOVA equivale ao teste F da regressão","Porque ambas usam a média como medida de tendência central","Porque a ANOVA e a regressão produzem exatamente os mesmos graus de liberdade em todas as situações"],answer:1,difficulty:"medium",explain_correct:"No framework GLM, a variável categórica do fator é codificada por k−1 variáveis dummy. O teste F omnibus da ANOVA é idêntico ao teste F do modelo de regressão com essas dummies. Isso unifica ANOVA e regressão como casos do mesmo modelo.",explain_wrong:"Embora ambas usem a distribuição F, essa coincidência não é a justificativa — o ponto é a equivalência formal via dummy coding. Os gl podem diferir dependendo de como se parametriza o modelo."}
],

"reino9": [
{id:"r9q01",text:"O que define um design fatorial na ANOVA?",options:["Um design com apenas um fator e múltiplos níveis","Um design que cruza dois ou mais fatores, avaliando todas as combinações de níveis","Um design onde cada participante é testado em todas as condições","Um design que usa apenas variáveis contínuas como preditores"],answer:1,difficulty:"easy",explain_correct:"Um design fatorial cruza todos os níveis de dois ou mais fatores independentes, criando todas as combinações possíveis (ex.: 2×3 = 6 células).",explain_wrong:"Um fator com múltiplos níveis é ANOVA de um fator. Testar cada participante em todas as condições é medidas repetidas. Variáveis contínuas como preditores é regressão."},
{id:"r9q02",text:"Em um design 2×3, quantas células experimentais existem?",options:["5","6","8","23"],answer:1,difficulty:"easy",explain_correct:"Um design 2×3 cruza um fator com 2 níveis e outro com 3 níveis: 2 × 3 = 6 combinações (células).",explain_wrong:"Não se soma os níveis (2+3=5) nem se calcula potência (2³=8). Multiplica-se o número de níveis de cada fator."},
{id:"r9q03",text:"Na ANOVA fatorial, o que é um efeito principal (main effect)?",options:["A interação entre dois fatores","O efeito de um fator sobre a VD, ignorando os níveis do outro fator","O efeito do fator que tem maior razão F","A diferença entre a maior e a menor média do estudo"],answer:1,difficulty:"easy",explain_correct:"O efeito principal avalia se as médias marginais de um fator diferem significativamente, colapsando (fazendo média) sobre os níveis do outro fator.",explain_wrong:"A interação é um efeito separado dos efeitos principais. O efeito principal não é definido pelo maior F nem pela amplitude das médias."},
{id:"r9q04",text:"O que indica um efeito de interação significativo em uma ANOVA fatorial 2×2?",options:["Que ambos os fatores são significativos individualmente","Que o efeito de um fator depende do nível do outro fator","Que as médias de todas as células são iguais","Que a variância de erro é maior do que a variância entre grupos"],answer:1,difficulty:"easy",explain_correct:"Uma interação significativa significa que o efeito de um fator sobre a VD muda conforme o nível do outro fator — os fatores não operam de forma independente.",explain_wrong:"Interação não exige que ambos os efeitos principais sejam significativos. Pode haver interação mesmo sem efeitos principais significativos, e vice-versa."},
{id:"r9q05",text:"No gráfico de interação de uma ANOVA 2×2, linhas paralelas indicam:",options:["Interação significativa","Ausência de interação","Que o efeito principal do fator A não é significativo","Que há violação de homocedasticidade"],answer:1,difficulty:"easy",explain_correct:"Linhas paralelas no gráfico de interação indicam que o efeito de um fator é constante através dos níveis do outro — ou seja, não há interação.",explain_wrong:"Linhas que se cruzam ou convergem/divergem sugerem interação. Paralelismo não informa sobre significância dos efeitos principais nem sobre pressupostos."},
{id:"r9q06",text:"Em uma ANOVA fatorial com dois fatores (A e B), quantas razões F são calculadas?",options:["Uma: para a interação apenas","Duas: uma para cada efeito principal","Três: uma para A, uma para B, e uma para A×B","Quatro: uma para cada efeito principal, interação e erro"],answer:2,difficulty:"easy",explain_correct:"São calculadas três razões F separadas: F_A para o efeito principal de A, F_B para o efeito principal de B, e F_AB para a interação entre A e B.",explain_wrong:"O erro não gera uma razão F própria — ele é o denominador de todas as três razões F. Não se omite nenhum dos três testes."},
{id:"r9q07",text:"Na partição da variância de uma ANOVA fatorial, a soma de quadrados total (SST) se decompõe em:",options:["SSA + SSB + SSError","SSA + SSB + SSAB + SSError","SSBetween + SSWithin apenas","SSA × SSB + SSError"],answer:1,difficulty:"easy",explain_correct:"Na ANOVA fatorial, SST = SS_A + SS_B + SS_AB + SS_Error. A interação tem sua própria porção da variância, separada dos efeitos principais.",explain_wrong:"Omitir SS_AB ignora a variância explicada pela interação. Não se multiplica SS_A por SS_B. A decomposição between/within é simplificação da ANOVA de um fator."},
{id:"r9q08",text:"O chefe de cozinha de Valhalla testa 2 tipos de tempero × 3 métodos de cocção. Qual é o design fatorial?",options:["Design 2×2","Design 2×3","Design 3×3","Design 6×1"],answer:1,difficulty:"easy",explain_correct:"Com um fator de 2 níveis (tempero) e outro de 3 níveis (cocção), o design é fatorial 2×3, com 6 combinações no total.",explain_wrong:"2×2 estaria errado porque o segundo fator tem 3 níveis. 3×3 assume ambos com 3 níveis. 6×1 seria ANOVA de um fator com 6 grupos, perdendo a estrutura fatorial."},
{id:"r9q09",text:"Para que servem os testes de efeitos simples (simple effects) na ANOVA fatorial?",options:["Para verificar a homocedasticidade em cada célula","Para comparar os níveis de um fator dentro de cada nível fixo do outro fator, quando a interação é significativa","Para calcular o tamanho de efeito total do modelo","Para substituir os testes post-hoc de Tukey"],answer:1,difficulty:"easy",explain_correct:"Quando a interação é significativa, os efeitos principais podem ser enganosos. Os efeitos simples decompõem a interação, testando o efeito de um fator separadamente em cada nível do outro.",explain_wrong:"Efeitos simples não verificam pressupostos nem calculam tamanho de efeito global. São complementares aos post-hoc, não substitutos."},
{id:"r9q10",text:"Em uma ANOVA fatorial 2×2, qual medida de tamanho de efeito é reportada para cada efeito (A, B, A×B)?",options:["Cohen's d para cada efeito","η²_parcial (partial eta-squared) para cada efeito","ω² total do modelo apenas","r de Pearson entre os fatores"],answer:1,difficulty:"easy",explain_correct:"Na ANOVA fatorial, reporta-se η²_parcial para cada efeito separadamente: η²_p = SS_efeito / (SS_efeito + SS_Error). Isso indica a proporção de variância explicada por cada efeito, controlando os demais.",explain_wrong:"Cohen's d é para comparações entre duas médias. ω² total não diferencia os efeitos. r de Pearson mede correlação entre variáveis contínuas, não efeitos fatoriais."},
{id:"r9q11",text:"Em uma ANOVA 2×3 com n=10 por célula, quais são os graus de liberdade para o efeito de interação A×B?",options:["2","5","6","54"],answer:0,difficulty:"medium",explain_correct:"df_AB = (a−1)(b−1) = (2−1)(3−1) = 1×2 = 2. Os graus de liberdade da interação são o produto dos gl de cada efeito principal.",explain_wrong:"Não se soma os gl dos efeitos principais (1+2=3) nem se multiplica os níveis (2×3=6). A fórmula é (a−1)×(b−1)."},
{id:"r9q12",text:"Em uma ANOVA fatorial 2×3 com n=10 por célula, qual é o df do erro (MSError)?",options:["54","57","59","60"],answer:0,difficulty:"medium",explain_correct:"N total = 2×3×10 = 60. df_Error = N − a×b = 60 − 6 = 54. Alternativamente: df_Error = N − 1 − df_A − df_B − df_AB = 59 − 1 − 2 − 2 = 54.",explain_wrong:"Não se subtrai apenas os gl dos fatores sem a interação. O denominador inclui todas as fontes de variação sistemática: efeitos principais e interação."},
{id:"r9q13",text:"Um grimório culinário compara 2 marinadas × 2 cortes de carne. Os resultados mostram: efeito principal de marinada F(1,36)=0,80, p=0,38; efeito principal de corte F(1,36)=1,20, p=0,28; interação F(1,36)=12,45, p=0,001. Qual a interpretação correta?",options:["Nenhum efeito é significativo porque os efeitos principais não são","A interação é significativa — o efeito da marinada depende do corte, tornando os efeitos principais potencialmente enganosos","Apenas os efeitos principais importam; a interação pode ser ignorada","O modelo é inválido porque os efeitos principais deveriam ser significativos quando a interação é"],answer:1,difficulty:"medium",explain_correct:"A interação significativa indica que marinada e corte não operam independentemente. Nesse cenário, interpretar os efeitos principais isoladamente seria enganoso — é preciso analisar efeitos simples.",explain_wrong:"Não é obrigatório que efeitos principais sejam significativos quando a interação é. A interação significativa é o achado principal e não pode ser ignorada."},
{id:"r9q14",text:"Em um design 2×2, as médias das células são: A1B1=10, A1B2=20, A2B1=20, A2B2=10. Qual padrão de interação isso sugere?",options:["Interação ordinal — as linhas não se cruzam","Interação disordinal (crossover) — as linhas se cruzam","Ausência de interação — linhas paralelas","Efeito principal de A sem interação"],answer:1,difficulty:"medium",explain_correct:"Em A1, B2 é maior que B1 (20 vs 10). Em A2, B1 é maior que B2 (20 vs 10). O efeito de B se inverte conforme o nível de A — é uma interação disordinal (crossover), com linhas que se cruzam no gráfico.",explain_wrong:"Linhas paralelas indicariam que a diferença B2−B1 é igual em A1 e A2. Aqui, a diferença é +10 em A1 e −10 em A2, um claro cruzamento."},
{id:"r9q15",text:"Um pesquisador encontra interação significativa em seu design 2×3. Ao analisar efeitos simples, ele testa o efeito do fator A em cada nível de B. Quantos testes de efeitos simples ele realizará?",options:["2 (um para cada nível de A)","3 (um para cada nível de B)","6 (um para cada célula)","5 (total de gl dos efeitos principais)"],answer:1,difficulty:"medium",explain_correct:"Se analisamos o efeito de A em cada nível de B, realizamos 3 testes (um para B1, um para B2, um para B3), pois B tem 3 níveis.",explain_wrong:"Não se testa cada célula individualmente (isso seria 6 comparações de médias). Os efeitos simples agrupam por nível de um fator e testam o outro dentro de cada nível."},
{id:"r9q16",text:"Em uma ANOVA 2×2 com n=15 por célula, SS_A=120, SS_B=80, SS_AB=200, SS_Error=1400. Calcule η²_parcial para a interação A×B.",options:["η²_p = 0,111","η²_p = 0,125","η²_p = 0,143","η²_p = 0,200"],answer:1,difficulty:"medium",explain_correct:"η²_parcial para AB = SS_AB / (SS_AB + SS_Error) = 200 / (200 + 1400) = 200/1600 = 0,125. O denominador inclui apenas a SS do efeito e a SS do erro.",explain_wrong:"Não se usa SST no denominador do η²_parcial (isso seria η² clássico). A fórmula parcial isola cada efeito ao colocar apenas SS_efeito + SS_Error no denominador."},
{id:"r9q17",text:"Por que, quando a interação é significativa, interpretar apenas os efeitos principais pode ser enganoso?",options:["Porque os efeitos principais ficam estatisticamente inflados pela interação","Porque as médias marginais (usadas nos efeitos principais) escondem padrões opostos entre subgrupos que a interação revela","Porque a interação invalida todos os pressupostos da ANOVA","Porque a interação sempre é mais importante que os efeitos principais"],answer:1,difficulty:"medium",explain_correct:"As médias marginais colapsam os dados, podendo cancelar efeitos opostos nos subgrupos. Uma interação crossover pode resultar em efeitos principais nulos, embora existam diferenças reais dentro de cada nível.",explain_wrong:"A interação não infla os efeitos principais estatisticamente nem invalida pressupostos. Também não é automaticamente mais importante — depende do contexto teórico."},
{id:"r9q18",text:"Qual é o reporte APA correto para o efeito de interação em uma ANOVA 2×3: F(2, 54) = 6,78, p = 0,002, η²_p = 0,20?",options:["F(2,54) = 6.78, p = .002, η²_p = .20","F = 6,78, p < 0,01, eta = 0,20","F(2) = 6,78, p = 0,002, d = 0,20","ANOVA: F = 6,78, gl1 = 2, gl2 = 54, sig = 0,002"],answer:0,difficulty:"medium",explain_correct:"O formato APA usa F(df_efeito, df_erro) = valor, p = valor exato (sem zero antes do ponto em proporções), e η²_p com ponto decimal. Ambos os graus de liberdade devem constar entre parênteses.",explain_wrong:"Omitir df do erro, usar 'd' em vez de η²_p, ou formatos não-APA (como 'sig' ou 'gl1/gl2') não seguem as normas de publicação."},
{id:"r9q19",text:"Em uma ANOVA fatorial, se o fator A tem 3 níveis, o fator B tem 2 níveis, e n=12 por célula, qual é o F crítico aproximado para o efeito principal de A com α=0,05? (Use df_A e df_Error)",options:["F(2, 66) — consultar tabela F para esses gl","F(3, 66) — consultar tabela F para esses gl","F(2, 72) — consultar tabela F para esses gl","F(2, 5) — consultar tabela F para esses gl"],answer:0,difficulty:"medium",explain_correct:"df_A = a−1 = 3−1 = 2. N = 3×2×12 = 72. df_Error = N − a×b = 72 − 6 = 66. Portanto, F(2, 66) é a distribuição correta para avaliar o efeito principal de A.",explain_wrong:"df_A é k−1 = 2, não k = 3. df_Error = N − número de células = 72 − 6 = 66, não N − k de um fator."},
{id:"r9q20",text:"Um guerreiro analisa um design 3×2 e encontra: efeito principal de Arma F(2,54)=8,90, p<0,001; efeito principal de Escudo F(1,54)=0,45, p=0,51; interação F(2,54)=0,32, p=0,73. Qual a melhor interpretação?",options:["Interação significativa — fazer efeitos simples","Apenas o tipo de arma afeta significativamente o resultado; o tipo de escudo e a interação não são significativos — pode-se interpretar o efeito principal de Arma diretamente","Nenhum efeito é interpretável porque a interação não é significativa","O modelo deve ser refeito como ANOVA de um fator apenas com Arma"],answer:1,difficulty:"medium",explain_correct:"Sem interação significativa, os efeitos principais podem ser interpretados diretamente. O efeito de Arma é significativo, indicando diferenças entre os tipos de arma na VD, independentemente do escudo.",explain_wrong:"Interação não-significativa NÃO invalida a interpretação — pelo contrário, facilita a leitura dos efeitos principais. Não é necessário refazer como ANOVA de um fator; o design fatorial é válido."}
],

"reino10": [
{id:"r10q01",text:"O que caracteriza um design de medidas repetidas (within-subjects)?",options:["Cada participante é atribuído aleatoriamente a apenas um grupo","Cada participante é medido em todas as condições do estudo","Os grupos são formados por pareamento de variáveis demográficas","Cada condição é testada em um dia diferente, com participantes diferentes"],answer:1,difficulty:"easy",explain_correct:"No design within-subjects, cada participante serve como seu próprio controle, sendo testado em todas as condições experimentais. Isso permite remover a variabilidade individual.",explain_wrong:"Atribuição a um único grupo é between-subjects. Pareamento é uma técnica diferente de controle. Dias diferentes com participantes diferentes seria between-subjects."},
{id:"r10q02",text:"Qual é a principal vantagem da ANOVA de medidas repetidas sobre a ANOVA independente?",options:["Não precisa de normalidade nos dados","Permite usar mais fatores simultaneamente","Remove a variação entre sujeitos do termo de erro, aumentando o poder estatístico","Elimina a necessidade de testes post-hoc"],answer:2,difficulty:"easy",explain_correct:"Como cada sujeito é medido em todas as condições, a variância individual (SS_subjects) é extraída do erro, reduzindo MSError e aumentando a razão F — logo, mais poder.",explain_wrong:"Medidas repetidas ainda exige normalidade. Não tem relação com o número de fatores nem elimina a necessidade de post-hoc quando há mais de 2 condições."},
{id:"r10q03",text:"Na ANOVA de medidas repetidas, a variância total é particionada em quais componentes?",options:["SS_Between + SS_Within apenas","SS_Condição + SS_Sujeitos + SS_Erro","SS_Condição + SS_Erro apenas","SS_Between + SS_Condição + SS_Sujeitos"],answer:1,difficulty:"easy",explain_correct:"A partição separa a variabilidade devida às condições (tratamento), a variabilidade entre sujeitos e o erro residual (interação sujeito × condição).",explain_wrong:"Diferente da ANOVA independente, aqui o SS_Sujeitos é explicitamente separado. Não se resume a apenas SS_Condição + SS_Erro — o componente de sujeitos é essencial."},
{id:"r10q04",text:"O que é esfericidade no contexto da ANOVA de medidas repetidas?",options:["A suposição de que os dados seguem distribuição normal","A suposição de que as variâncias das diferenças entre todos os pares de condições são iguais","A suposição de que as médias de todas as condições são iguais","A suposição de que não há outliers nos dados"],answer:1,difficulty:"easy",explain_correct:"Esfericidade exige que as variâncias das diferenças entre cada par de condições sejam aproximadamente iguais. É o pressuposto específico da ANOVA de medidas repetidas, análogo à homocedasticidade.",explain_wrong:"Normalidade e ausência de outliers são pressupostos separados. Igualdade de médias é a hipótese nula, não um pressuposto."},
{id:"r10q05",text:"Qual teste é usado para verificar a esfericidade?",options:["Teste de Levene","Teste de Mauchly (Mauchly's W)","Teste de Bartlett","Teste de Kolmogorov-Smirnov"],answer:1,difficulty:"easy",explain_correct:"O teste de Mauchly avalia se a suposição de esfericidade é violada. Se W é significativo (p < 0,05), a esfericidade foi violada e correções são necessárias.",explain_wrong:"Levene testa homocedasticidade em grupos independentes. Bartlett também testa variâncias, mas em contexto diferente. Kolmogorov-Smirnov testa normalidade."},
{id:"r10q06",text:"Quando a esfericidade é violada, quais correções podem ser aplicadas aos graus de liberdade?",options:["Correção de Bonferroni e Tukey","Correção de Greenhouse-Geisser (GG) e Huynh-Feldt (HF)","Correção de Welch e Brown-Forsythe","Correção de Yates e continuidade"],answer:1,difficulty:"easy",explain_correct:"As correções GG e HF multiplicam os graus de liberdade por epsilon (ε), reduzindo-os para compensar a violação de esfericidade. Isso torna o teste F mais conservador.",explain_wrong:"Bonferroni/Tukey são para comparações múltiplas. Welch/Brown-Forsythe são para ANOVA independente com variâncias desiguais. Yates é para qui-quadrado."},
{id:"r10q07",text:"O valor de epsilon (ε) nas correções de esfericidade varia entre qual intervalo?",options:["0 e 1","1/(k−1) e 1","0 e k","−1 e +1"],answer:1,difficulty:"easy",explain_correct:"Epsilon varia de 1/(k−1), que indica violação máxima de esfericidade, até 1, que indica esfericidade perfeita. Com k condições, o limite inferior é 1/(k−1).",explain_wrong:"ε nunca é zero nem negativo. O limite inferior não é 0, mas 1/(k−1). Também não chega a k."},
{id:"r10q08",text:"Qual é a alternativa não-paramétrica à ANOVA de medidas repetidas?",options:["Teste de Kruskal-Wallis","Teste de Friedman","Teste de Mann-Whitney","Teste de Wilcoxon para amostras independentes"],answer:1,difficulty:"easy",explain_correct:"O teste de Friedman é usado quando os dados violam normalidade e temos um design within-subjects com 3 ou mais condições. Trabalha com ranks em vez de valores brutos.",explain_wrong:"Kruskal-Wallis é para grupos independentes (alternativa à ANOVA de um fator). Mann-Whitney compara dois grupos independentes. Wilcoxon para amostras independentes não existe — Wilcoxon signed-rank é para dois grupos relacionados."},
{id:"r10q09",text:"O que é uma ANOVA mista (mixed ANOVA)?",options:["Uma ANOVA que combina dados paramétricos e não-paramétricos","Uma ANOVA que tem pelo menos um fator between-subjects e pelo menos um fator within-subjects","Uma ANOVA que mistura ANOVA e regressão no mesmo modelo","Uma ANOVA onde metade dos participantes faz medidas repetidas e a outra metade não"],answer:1,difficulty:"easy",explain_correct:"A ANOVA mista combina fatores between-subjects (grupos independentes) e within-subjects (medidas repetidas) no mesmo modelo, permitindo analisar efeitos de ambos os tipos e sua interação.",explain_wrong:"Não se refere a misturar tipos de dados nem métodos estatísticos. Todos os participantes seguem o mesmo design — o que muda é a natureza dos fatores."},
{id:"r10q10",text:"Na ANOVA de medidas repetidas, o que representa SS_sujeitos?",options:["A variância entre as condições experimentais","A variância entre os participantes, refletindo diferenças individuais","O erro residual do modelo","A interação entre sujeitos e condições"],answer:1,difficulty:"easy",explain_correct:"SS_sujeitos captura as diferenças individuais entre participantes nas suas médias gerais. Ao removê-la do erro, a ANOVA de medidas repetidas ganha poder.",explain_wrong:"SS_sujeitos não é a variância entre condições (essa é SS_condição) nem o erro residual. O erro é a interação sujeito×condição que sobra após extrair SS_sujeitos."},
{id:"r10q11",text:"Um ferreiro de Asgard mede a qualidade de 12 espadas em 4 estágios de têmpera (medidas repetidas). Os graus de liberdade para o efeito de estágio são:",options:["df = 3, pois k − 1 = 4 − 1 = 3","df = 11, pois N − 1 = 12 − 1 = 11","df = 44, pois N × k − 1","df = 33, pois (N−1)(k−1)"],answer:0,difficulty:"medium",explain_correct:"Os graus de liberdade do efeito principal em medidas repetidas são k − 1 = 4 − 1 = 3, onde k é o número de condições (estágios).",explain_wrong:"N−1 = 11 seria df de sujeitos. (N−1)(k−1) = 33 seria o df do erro. N×k−1 = 47 seria df total."},
{id:"r10q12",text:"No mesmo exemplo (12 espadas, 4 estágios), qual é o df do termo de erro?",options:["44","33","36","11"],answer:1,difficulty:"medium",explain_correct:"df_Erro = (N−1)(k−1) = (12−1)(4−1) = 11 × 3 = 33. É a interação sujeito × condição, que serve como denominador da razão F.",explain_wrong:"Não é N×k (48) nem N−1 (11) nem k−1 (3). O erro em medidas repetidas tem gl = (n−1)(k−1)."},
{id:"r10q13",text:"O teste de Mauchly para 12 sujeitos e 4 condições retorna W = 0,42, p = 0,03. Qual a decisão?",options:["Esfericidade atendida — proceder com ANOVA padrão","Esfericidade violada — aplicar correção de Greenhouse-Geisser ou Huynh-Feldt aos gl","Esfericidade violada — usar ANOVA independente em vez de medidas repetidas","Resultado inconclusivo — aumentar a amostra"],answer:1,difficulty:"medium",explain_correct:"Com p = 0,03 < 0,05, rejeitamos H0 de esfericidade. A esfericidade está violada, então devemos aplicar correção (GG ou HF) para ajustar os gl e obter um p-valor corrigido.",explain_wrong:"Não se abandona o design de medidas repetidas — aplica-se correção. O resultado não é inconclusivo; o teste claramente rejeita a esfericidade."},
{id:"r10q14",text:"Com k = 4 condições e ε de Greenhouse-Geisser = 0,65, como ficam os graus de liberdade corrigidos para o efeito de condição (originalmente df = 3)?",options:["df_corrigido = 3 × 0,65 = 1,95","df_corrigido = 4 × 0,65 = 2,60","df_corrigido = 3 / 0,65 = 4,62","df_corrigido = 0,65 × (3 + 33) = 23,4"],answer:0,difficulty:"medium",explain_correct:"Os gl corrigidos são obtidos multiplicando os gl originais por ε: df_condição_corrigido = 3 × 0,65 = 1,95. O mesmo se aplica ao df do erro.",explain_wrong:"Não se multiplica k (4) por ε, mas sim df = k−1 por ε. Não se divide gl por ε. A correção reduz os gl, tornando o teste mais conservador."},
{id:"r10q15",text:"Quando se recomenda usar Greenhouse-Geisser versus Huynh-Feldt?",options:["GG quando ε > 0,75; HF quando ε < 0,75","GG quando ε < 0,75 (violação severa); HF quando ε ≥ 0,75 (violação leve)","GG para amostras grandes; HF para amostras pequenas","GG sempre — HF é obsoleto"],answer:1,difficulty:"medium",explain_correct:"GG é mais conservador e recomendado quando ε < 0,75 (violação severa). HF é menos conservador e preferido quando ε ≥ 0,75 (violação leve), pois GG seria excessivamente conservador.",explain_wrong:"A regra é baseada no valor de ε, não no tamanho amostral. HF não é obsoleto — é complementar a GG dependendo da severidade da violação."},
{id:"r10q16",text:"Com k = 5 condições em medidas repetidas, qual é o valor mínimo possível de epsilon (ε)?",options:["ε = 0","ε = 0,20","ε = 0,25","ε = 0,50"],answer:2,difficulty:"medium",explain_correct:"O limite inferior de ε é 1/(k−1) = 1/(5−1) = 1/4 = 0,25. Esse valor indica a violação máxima de esfericidade.",explain_wrong:"ε nunca chega a zero — seu mínimo é 1/(k−1). Com 5 condições, 1/4 = 0,25, não 0,20 ou 0,50."},
{id:"r10q17",text:"Em uma ANOVA mista 2 (grupo: novatos vs veteranos) × 3 (sessão: 1, 2, 3 — medidas repetidas) com 15 participantes por grupo, quais são os df para a interação grupo × sessão?",options:["df = 2","df = 4","df = 56","df = 28"],answer:0,difficulty:"medium",explain_correct:"df_interação = (a−1)(b−1) = (2−1)(3−1) = 1 × 2 = 2. Os gl da interação em ANOVA mista seguem a mesma lógica fatorial.",explain_wrong:"Não se multiplica os gl dos fatores between e within de outra forma. O df_erro para este efeito within seria (N−a)(b−1) = 28×2 = 56, mas isso é o erro, não a interação."},
{id:"r10q18",text:"Um guerreiro é avaliado em 3 provas de combate (medidas repetidas). A ANOVA retorna F(2,28) = 7,45 sem correção, mas após correção GG (ε = 0,72) o resultado é F(1,44, 20,16) = 7,45. Por que o valor F não mudou?",options:["Porque a correção GG é aplicada apenas ao p-valor, não ao F","Porque a correção GG ajusta os graus de liberdade (e portanto o p-valor crítico), mas não altera a razão F calculada","Porque ε = 0,72 é próximo de 1, então não há efeito","Porque houve erro no cálculo — o F deveria mudar"],answer:1,difficulty:"medium",explain_correct:"A correção GG multiplica os gl por ε, reduzindo-os. Isso não altera a razão F (que vem dos quadrados médios), mas muda os gl da distribuição F usada para obter o p-valor, tornando-o mais conservador.",explain_wrong:"A correção afeta os gl, não diretamente o p-valor em si — o p muda como consequência dos gl alterados. ε = 0,72 é suficiente para afetar os gl. O F não deveria mudar — isso é o comportamento esperado."},
{id:"r10q19",text:"Qual o reporte APA correto para uma ANOVA de medidas repetidas com correção de Greenhouse-Geisser?",options:["F(2, 28) = 7,45, p = 0,003, η²_p = .35 (sem menção à correção)","F(1.44, 20.16) = 7.45, p = .009, η²_p = .35, com correção de Greenhouse-Geisser (ε = .72)","F = 7,45, GG corrigido, p < 0,01","ANOVA repetida: F = 7,45, ε = 0,72, significativo"],answer:1,difficulty:"medium",explain_correct:"O formato APA exige os gl corrigidos (com decimais), valor F, p exato, tamanho de efeito, e menção explícita à correção aplicada com o valor de epsilon.",explain_wrong:"Omitir a correção ou usar gl não-corrigidos é inadequado. Reportar apenas 'GG corrigido' sem os gl específicos ou sem ε não é suficiente pelas normas APA."},
{id:"r10q20",text:"Em que situação a ANOVA de medidas repetidas perde sua vantagem de poder sobre a ANOVA independente?",options:["Quando o número de condições é muito grande (k > 10)","Quando as correlações entre as medidas repetidas são muito baixas ou próximas de zero","Quando os tamanhos amostrais são iguais entre condições","Quando se usa a correção de Greenhouse-Geisser"],answer:1,difficulty:"medium",explain_correct:"A vantagem de medidas repetidas vem de extrair SS_sujeitos do erro. Se as medidas não são correlacionadas entre si, SS_sujeitos é pequeno e a redução do erro é mínima — perdendo a vantagem de poder.",explain_wrong:"Muitas condições aumentam questões de esfericidade, mas não eliminam a vantagem se as correlações são altas. Tamanhos iguais e correção GG não anulam o ganho de poder inerente ao design."}
],

"reino11": [
{id:"r11q01",text:"Na Biblioteca dos Sábios de Asgard, Odin Dinho explica que uma covariável na ANCOVA é:",options:["Uma variável dependente adicional","Uma variável contínua que se deseja controlar estatisticamente","O mesmo que um fator entre sujeitos","Uma variável categórica que substitui a VI"],answer:1,difficulty:"easy",explain_correct:"A covariável é uma variável contínua (métrica) incluída na ANCOVA para remover sua influência sobre a VD, purificando o efeito da VI.",explain_wrong:"Não é uma VD adicional (isso seria MANOVA), nem um fator categórico (seria outro fator da ANOVA), nem substitui a VI — ela complementa o modelo."},
{id:"r11q02",text:"Um pesquisador de Asgard quer comparar três métodos de treinamento de guerreiros, mas a experiência prévia varia. Qual o principal propósito de incluir experiência prévia como covariável na ANCOVA?",options:["Aumentar o número de graus de liberdade","Remover a variância associada à experiência prévia para isolar o efeito do método","Transformar a VD em escala ordinal","Substituir o teste post-hoc"],answer:1,difficulty:"easy",explain_correct:"A ANCOVA remove a porção de variância da VD explicada pela covariável, reduzindo o erro residual e permitindo uma estimativa mais limpa do efeito da VI.",explain_wrong:"A ANCOVA não aumenta gl (na verdade consome 1 gl por covariável), não transforma escalas e não substitui post-hoc."},
{id:"r11q03",text:"Muninn sussurra: 'O pressuposto de homogeneidade de inclinações na ANCOVA significa que...'",options:["As médias dos grupos devem ser iguais antes do ajuste","A relação entre covariável e VD deve ser similar em todos os grupos","A covariável deve ter variância zero dentro de cada grupo","Os resíduos devem seguir distribuição uniforme"],answer:1,difficulty:"easy",explain_correct:"Homogeneidade de inclinações exige que a reta de regressão covariável→VD tenha inclinação semelhante em cada grupo — ou seja, a covariável afeta a VD de forma comparável nos grupos.",explain_wrong:"Não se trata de igualdade de médias, variância zero da covariável ou distribuição uniforme dos resíduos."},
{id:"r11q04",text:"ThorMento acha que ANCOVA e ANOVA são a mesma coisa. Odin Dinho corrige: a principal diferença é que a ANCOVA:",options:["Usa apenas variáveis categóricas","Inclui uma ou mais covariáveis contínuas para ajustar as médias dos grupos","Não exige normalidade dos resíduos","Dispensa o teste de Levene"],answer:1,difficulty:"easy",explain_correct:"A ANCOVA estende a ANOVA incluindo covariáveis contínuas, o que permite ajustar as médias dos grupos removendo a influência dessas variáveis.",explain_wrong:"A ANCOVA também exige normalidade e homocedasticidade como a ANOVA; a diferença central é a inclusão de covariáveis."},
{id:"r11q05",text:"Na ANCOVA, as 'médias ajustadas' representam:",options:["As médias originais multiplicadas pelo tamanho da amostra","As médias dos grupos após remover estatisticamente o efeito da covariável","As médias da covariável em cada grupo","As médias ponderadas pelo inverso da variância"],answer:1,difficulty:"easy",explain_correct:"Médias ajustadas (estimated marginal means) são as médias da VD em cada grupo após controlar estatisticamente a covariável — como se todos os grupos tivessem o mesmo valor na covariável.",explain_wrong:"Não são médias multiplicadas por n, nem médias da covariável, nem ponderações inversas de variância."},
{id:"r11q06",text:"Huginn provoca: 'Se a covariável e a VI estiverem altamente correlacionadas, o que acontece na ANCOVA?'",options:["Os resultados ficam mais precisos","Viola-se o pressuposto de independência entre VI e covariável, comprometendo a interpretação","O poder estatístico aumenta exponencialmente","A ANCOVA se transforma automaticamente em regressão"],answer:1,difficulty:"easy",explain_correct:"Quando VI e covariável estão confundidas, a ANCOVA não consegue separar seus efeitos. O ajuste pode remover parte legítima do efeito da VI, distorcendo os resultados.",explain_wrong:"Não aumenta precisão nem poder — a colinearidade entre VI e covariável é problemática. A ANCOVA não 'vira' regressão automaticamente."},
{id:"r11q07",text:"Um dos pressupostos da ANCOVA é a linearidade. Isso significa que:",options:["A VI deve ter relação linear com a covariável","A relação entre a covariável e a VD deve ser linear","Os grupos devem ter tamanhos iguais","A covariável deve ser dicotômica"],answer:1,difficulty:"easy",explain_correct:"A ANCOVA modela a covariável com um termo linear. Se a relação covariável→VD for curvilínea, o ajuste será inadequado e as médias ajustadas serão enviesadas.",explain_wrong:"A linearidade refere-se à relação covariável-VD, não VI-covariável. Tamanhos iguais e covariável dicotômica não são esse pressuposto."},
{id:"r11q08",text:"Odin Dinho ensina que a ANCOVA pertence à família do Modelo Linear Geral (GLM). Isso significa que:",options:["A ANCOVA só pode ser rodada com dados normalizados entre 0 e 1","ANOVA, regressão e ANCOVA são casos especiais do mesmo framework estatístico","A ANCOVA exige que todas as variáveis sejam contínuas","O GLM é exclusivo para dados não-paramétricos"],answer:1,difficulty:"easy",explain_correct:"O GLM unifica ANOVA (preditores categóricos), regressão (preditores contínuos) e ANCOVA (ambos) sob o mesmo modelo Y = Xβ + ε.",explain_wrong:"O GLM não exige normalização 0-1, aceita variáveis categóricas (via codificação), e é um modelo paramétrico."},
{id:"r11q09",text:"Para reportar ANCOVA no formato APA, qual informação é essencial incluir além de F, gl e p?",options:["O valor do qui-quadrado de Box's M","As médias ajustadas e o eta-parcial ao quadrado (ηₚ²)","O coeficiente de Spearman entre VI e covariável","A mediana da covariável"],answer:1,difficulty:"easy",explain_correct:"O reporte APA de ANCOVA exige F(gl_efeito, gl_erro), p, ηₚ² como tamanho de efeito, e as médias ajustadas para cada grupo — pois são estas que refletem o efeito após controle.",explain_wrong:"Box's M é da MANOVA. Spearman não se aplica aqui. A mediana da covariável não é exigida no reporte."},
{id:"r11q10",text:"Quando é mais vantajoso usar ANCOVA em vez de ANOVA simples?",options:["Quando não há variáveis contínuas disponíveis","Quando existe uma variável contínua correlacionada com a VD que não é de interesse primário, mas pode ser controlada","Quando a amostra é muito grande e não há covariáveis","Quando a VD é categórica"],answer:1,difficulty:"easy",explain_correct:"A ANCOVA é vantajosa quando uma covariável contínua correlaciona-se com a VD — ao controlá-la, reduz-se o erro residual e aumenta-se o poder para detectar o efeito da VI.",explain_wrong:"Sem covariáveis, use ANOVA. Amostras grandes não justificam ANCOVA por si. VD categórica exigiria outro modelo (ex.: regressão logística)."},
{id:"r11q11",text:"Na Biblioteca de Asgard, um aprendiz testou a ANCOVA e encontrou interação significativa entre VI e covariável. Isso indica que:",options:["A ANCOVA pode prosseguir normalmente, pois interações são desejáveis","O pressuposto de homogeneidade de inclinações foi violado e a ANCOVA padrão não é apropriada","A covariável deve ser removida e uma ANOVA simples deve ser usada","O efeito da VI é necessariamente nulo"],answer:1,difficulty:"medium",explain_correct:"Interação significativa VI×covariável significa que as inclinações diferem entre grupos — a ANCOVA padrão assume inclinações homogêneas. Alternativas incluem ANCOVA de Johnson-Neyman ou análise separada por grupo.",explain_wrong:"Não se pode prosseguir normalmente. Remover a covariável desperdiça informação. A interação não prova efeito nulo da VI."},
{id:"r11q12",text:"Um sábio de Asgard conduziu ANCOVA com dois grupos e uma covariável. O F da covariável foi significativo (p < .001) mas o F do fator não (p = .34). A interpretação correta é:",options:["A ANCOVA falhou porque a covariável não deveria ser significativa","A covariável explica parte substancial da variância na VD, mas após esse ajuste, os grupos não diferem significativamente","O resultado é impossível — se a covariável é significativa, o fator também deveria ser","A covariável deve ser removida e a análise refeita"],answer:1,difficulty:"medium",explain_correct:"É perfeitamente possível: a covariável se associa fortemente à VD, mas as médias ajustadas dos grupos são semelhantes. A ANCOVA funcionou — simplesmente não há efeito do fator após o controle.",explain_wrong:"A covariável significativa é desejável (valida sua inclusão). Os dois efeitos são independentes. Remover a covariável seria desperdiçar controle estatístico."},
{id:"r11q13",text:"Odin Dinho alerta que usar ANCOVA para 'corrigir' diferenças pré-existentes entre grupos em estudos quasi-experimentais é problemático porque:",options:["A ANCOVA não funciona com designs quasi-experimentais","O ajuste estatístico pode ser enviesado quando os grupos diferem sistematicamente na covariável, violando a independência VI-covariável","A ANCOVA só funciona com randomização perfeita e amostras > 500","Quasi-experimentos exigem sempre testes não-paramétricos"],answer:1,difficulty:"medium",explain_correct:"Quando grupos já diferem na covariável (ex.: grupos intactos), a covariável está confundida com a VI. O ajuste da ANCOVA pode sobre-corrigir ou sub-corrigir, gerando interpretações falaciosas.",explain_wrong:"A ANCOVA pode ser usada em quasi-experimentos com cautela, mas o pesquisador deve reconhecer a limitação. Não há requisito de n > 500 nem obrigatoriedade de testes não-paramétricos."},
{id:"r11q14",text:"Em uma ANCOVA com 3 grupos e 1 covariável, os graus de liberdade do erro são:",options:["N − 3","N − 4","N − 2","N − 5"],answer:1,difficulty:"medium",explain_correct:"gl_erro = N − k − c, onde k = número de grupos (3) e c = número de covariáveis (1). Logo, gl_erro = N − 3 − 1 = N − 4.",explain_wrong:"ANOVA sem covariável daria N − 3. Com 1 covariável, perde-se mais 1 gl, resultando em N − 4."},
{id:"r11q15",text:"Huginn questiona: 'Se a covariável não correlaciona com a VD (r ≈ 0), incluí-la na ANCOVA resulta em:'",options:["Aumento substancial do poder estatístico","Perda de 1 grau de liberdade sem redução do erro, diminuindo levemente o poder","Violação automática de todos os pressupostos","Transformação da ANCOVA em teste t"],answer:1,difficulty:"medium",explain_correct:"Covariável sem correlação com a VD não remove variância do erro. Porém, consome 1 gl, reduzindo levemente o poder. A ANCOVA funciona, mas não traz benefício.",explain_wrong:"Não aumenta poder (a covariável não explica nada). Não viola pressupostos automaticamente. Não se transforma em teste t."},
{id:"r11q16",text:"Um escriba reportou: F(2, 45) = 4.12, p = .023, ηₚ² = .15. As médias ajustadas foram: Grupo A = 72.3, Grupo B = 68.1, Grupo C = 65.4. O que está faltando para um reporte APA completo de ANCOVA?",options:["O valor de Wilks' Lambda","Os erros-padrão ou intervalos de confiança das médias ajustadas e menção à covariável controlada","O resultado do teste de Friedman","A correlação bisserial"],answer:1,difficulty:"medium",explain_correct:"O reporte APA de ANCOVA deve incluir qual covariável foi controlada, os EP ou IC das médias ajustadas, e idealmente o resultado do teste da covariável. Wilks' Lambda é para MANOVA.",explain_wrong:"Wilks' Lambda pertence à MANOVA. Friedman é não-paramétrico para medidas repetidas. Correlação bisserial não se aplica aqui."},
{id:"r11q17",text:"Na ANCOVA, a homocedasticidade refere-se a:",options:["Igualdade das médias da covariável entre grupos","Variâncias dos resíduos aproximadamente iguais entre os grupos","Correlação perfeita entre covariável e VD","Distribuição uniforme dos tamanhos amostrais"],answer:1,difficulty:"medium",explain_correct:"Assim como na ANOVA, a ANCOVA pressupõe homocedasticidade — variâncias residuais semelhantes entre grupos. Violações podem inflar o erro Tipo I ou reduzir poder.",explain_wrong:"Igualdade de médias da covariável não é homocedasticidade. Correlação perfeita violaria multicolinearidade. Tamanhos amostrais iguais são desejáveis, mas não é esse pressuposto."},
{id:"r11q18",text:"Odin Dinho mostra que a ANCOVA aumenta o poder estatístico primariamente porque:",options:["Aumenta o tamanho amostral efetivo","Reduz a variância do erro (MSE) ao extrair a variância explicada pela covariável","Elimina a necessidade de teste post-hoc","Transforma dados não-normais em normais"],answer:1,difficulty:"medium",explain_correct:"Ao remover a variância da VD atribuível à covariável, o MSE diminui. Com denominador menor no teste F, o poder para detectar diferenças entre grupos aumenta.",explain_wrong:"Não altera n, não dispensa post-hoc, não normaliza dados."},
{id:"r11q19",text:"Um pesquisador incluiu 5 covariáveis em uma ANCOVA com 3 grupos e N = 60. Muninn alerta que o problema é:",options:["ANCOVA não aceita mais de 2 covariáveis","Com 5 covariáveis, perdem-se 5 gl do erro (gl = 60 − 3 − 5 = 52), e o ajuste excessivo pode instabilizar as estimativas e reduzir poder","As covariáveis precisam ser ortogonais entre si","O pressuposto de normalidade é automaticamente violado com mais de 3 covariáveis"],answer:1,difficulty:"medium",explain_correct:"Cada covariável consome 1 gl e pode introduzir multicolinearidade. Com muitas covariáveis e amostra modesta, as estimativas tornam-se instáveis e o ganho de poder pode ser anulado pela perda de gl.",explain_wrong:"Não há limite formal de 2 covariáveis. Covariáveis não precisam ser ortogonais (mas multicolinearidade alta é problemática). Mais covariáveis não violam normalidade automaticamente."},
{id:"r11q20",text:"ThorMento sugere usar ANCOVA para controlar uma variável que é consequência do tratamento (mediadora). Odin Dinho rejeita porque:",options:["A ANCOVA não aceita variáveis mediadoras como input","Controlar uma variável pós-tratamento remove parte do efeito real do tratamento, subestimando ou distorcendo o efeito verdadeiro da VI","Variáveis mediadoras devem sempre ser tratadas como VDs","A ANCOVA exige que a covariável seja medida antes do tratamento, e mediadoras são sempre medidas depois"],answer:1,difficulty:"medium",explain_correct:"Se a covariável é afetada pelo tratamento (mediadora), ajustá-la remove parte do efeito causal da VI. Isso é um viés de controle pós-tratamento — a covariável deve ser medida antes ou ser independente da VI.",explain_wrong:"Tecnicamente a ANCOVA 'aceita' qualquer contínua, mas o resultado fica substantivamente errado. Nem toda mediadora é VD. A questão não é só temporal, mas causal."}
],

"reino12": [
{id:"r12q01",text:"No Grande Salão das Matrizes, Odin Dinho explica que a MANOVA se diferencia da ANOVA porque:",options:["Usa medianas em vez de médias","Analisa múltiplas variáveis dependentes simultaneamente","Só funciona com amostras pareadas","Substitui o teste F pelo teste t"],answer:1,difficulty:"easy",explain_correct:"A MANOVA (Multivariate ANOVA) estende a ANOVA para cenários com duas ou mais VDs analisadas conjuntamente, preservando a relação entre elas.",explain_wrong:"A MANOVA usa médias (vetores de médias), funciona com designs entre-sujeitos e usa o teste F multivariado, não o teste t."},
{id:"r12q02",text:"Huginn provoca: 'Por que não rodar uma ANOVA separada para cada VD em vez de MANOVA?' A resposta principal é:",options:["Porque ANOVA separada é mais difícil computacionalmente","Porque múltiplas ANOVAs inflacionam o erro Tipo I e ignoram a correlação entre as VDs","Porque a ANOVA não aceita VDs contínuas","Porque a MANOVA é sempre mais poderosa que ANOVAs separadas"],answer:1,difficulty:"easy",explain_correct:"Com k ANOVAs separadas, cada uma a α = .05, o erro familywise cresce. Além disso, ANOVAs isoladas ignoram a covariância entre VDs — a MANOVA captura o padrão multivariado.",explain_wrong:"ANOVAs separadas não são mais difíceis computacionalmente. ANOVA aceita VDs contínuas. A MANOVA nem sempre é mais poderosa (depende da correlação entre VDs)."},
{id:"r12q03",text:"A matriz SSCP 'H' na MANOVA representa:",options:["A variabilidade total dos dados","A variabilidade entre grupos (hipótese) nas múltiplas VDs","A variabilidade dentro dos grupos (erro)","A correlação entre as VDs"],answer:1,difficulty:"easy",explain_correct:"H (Hypothesis) é a matriz de soma de quadrados e produtos cruzados entre grupos — captura quanto os vetores de médias dos grupos diferem entre si nas VDs simultaneamente.",explain_wrong:"A variabilidade total seria T (= H + E). A variabilidade dentro dos grupos é E (Error). A correlação entre VDs é parte de E, mas E não é 'a correlação'."},
{id:"r12q04",text:"O teste de Box's M na MANOVA avalia:",options:["A normalidade multivariada dos dados","A homogeneidade das matrizes de covariância entre os grupos","A esfericidade dos dados","A presença de outliers multivariados"],answer:1,difficulty:"easy",explain_correct:"Box's M testa se as matrizes de variância-covariância são iguais entre os grupos — análogo multivariado do teste de Levene. É notoriamente sensível a desvios de normalidade.",explain_wrong:"Normalidade multivariada é testada por outros métodos (ex.: Mardia). Esfericidade é pressuposto de medidas repetidas. Outliers são detectados por distância de Mahalanobis."},
{id:"r12q05",text:"Muninn lembra: 'Pillai's Trace é considerado o critério mais robusto da MANOVA porque:'",options:["Sempre produz o menor p-valor","É o menos afetado por violações de normalidade e homogeneidade de matrizes de covariância","Não requer cálculo de autovalores","É idêntico ao teste F univariado"],answer:1,difficulty:"easy",explain_correct:"Pillai's Trace é o mais robusto a violações de pressupostos entre os quatro critérios multivariados. É recomendado quando amostras são desiguais ou pressupostos são questionáveis.",explain_wrong:"Não necessariamente produz menor p. Usa autovalores como os outros. Não é equivalente ao F univariado."},
{id:"r12q06",text:"Wilks' Lambda na MANOVA varia entre:",options:["−1 e +1","0 e 1, onde valores próximos de 0 indicam grande diferença entre grupos","0 e infinito","1 e infinito, onde valores maiores indicam maior efeito"],answer:1,difficulty:"easy",explain_correct:"Λ de Wilks varia de 0 a 1. Valores próximos de 0 indicam que a maior parte da variância é explicada pelas diferenças entre grupos. Λ = 1 significa nenhuma diferença.",explain_wrong:"Não varia de −1 a +1 (isso é correlação). Não vai a infinito. Valores menores (não maiores) indicam maior efeito."},
{id:"r12q07",text:"Hotelling's Trace na MANOVA é calculado como:",options:["O determinante da matriz E","A soma dos autovalores da matriz HE⁻¹","O maior autovalor da matriz HE⁻¹","O traço da matriz de correlação"],answer:1,difficulty:"easy",explain_correct:"Hotelling's Trace (T²) é a soma de todos os autovalores de HE⁻¹. Quanto maior, maior a separação multivariada entre os grupos.",explain_wrong:"O determinante de E não é Hotelling's. O maior autovalor isolado é Roy's Largest Root. O traço da correlação é outra coisa."},
{id:"r12q08",text:"Roy's Largest Root considera apenas:",options:["A soma de todos os autovalores","O menor autovalor da matriz HE⁻¹","O maior autovalor da matriz HE⁻¹","A média dos autovalores"],answer:2,difficulty:"easy",explain_correct:"Roy's Largest Root usa apenas o maior autovalor de HE⁻¹. É o mais poderoso quando as diferenças entre grupos concentram-se em uma única dimensão, mas o menos robusto a violações.",explain_wrong:"A soma é Hotelling's Trace. Não usa o menor nem a média dos autovalores."},
{id:"r12q09",text:"Após uma MANOVA significativa, o procedimento de follow-up mais comum é:",options:["Repetir a MANOVA com bootstrap","Conduzir ANOVAs univariadas para cada VD, com possível correção de Bonferroni","Aplicar teste de Friedman em cada VD","Converter as VDs em uma única variável composta e rodar teste t"],answer:1,difficulty:"easy",explain_correct:"O follow-up típico envolve ANOVAs univariadas para identificar quais VDs contribuem para a diferença, frequentemente com correção para múltiplas comparações. Análise discriminante é outra opção.",explain_wrong:"Bootstrap não é o follow-up padrão. Friedman é não-paramétrico para medidas repetidas. Comprimir VDs em uma variável perde informação multivariada."},
{id:"r12q10",text:"Uma vantagem central da MANOVA sobre múltiplas ANOVAs é:",options:["Requer amostras menores","Controla o erro Tipo I ao avaliar as VDs conjuntamente e pode detectar padrões multivariados invisíveis a testes univariados","Não exige nenhum pressuposto","Funciona com qualquer tipo de variável dependente"],answer:1,difficulty:"easy",explain_correct:"A MANOVA testa diferenças no vetor de médias, protegendo contra inflação α e capturando combinações lineares de VDs que discriminam os grupos — algo que ANOVAs isoladas perdem.",explain_wrong:"MANOVA geralmente exige amostras maiores. Tem vários pressupostos (normalidade multivariada, Box's M). As VDs devem ser contínuas."},
{id:"r12q11",text:"Um pesquisador de Asgard conduziu MANOVA com 3 grupos e 4 VDs. Pillai's Trace foi significativo (p = .012), mas nenhuma ANOVA univariada de follow-up atingiu significância. Isso sugere que:",options:["A MANOVA cometeu erro Tipo I","A diferença entre grupos existe em uma combinação linear das VDs, não em qualquer VD isolada","Os dados estão corrompidos","O teste de Pillai é inválido neste cenário"],answer:1,difficulty:"medium",explain_correct:"A MANOVA detecta diferenças no espaço multivariado — combinações lineares de VDs que discriminam os grupos. ANOVAs univariadas não capturam essa separação conjunta.",explain_wrong:"Não é necessariamente erro Tipo I. Dados não estão corrompidos. Pillai é válido. O resultado revela o poder da análise multivariada."},
{id:"r12q12",text:"Quando Box's M é significativo (p < .001), a melhor estratégia é:",options:["Ignorar, pois Box's M é sempre significativo","Usar Pillai's Trace em vez de Wilks' Lambda, pois é mais robusto a heterogeneidade de matrizes de covariância","Converter todas as VDs em ranks","Remover VDs até Box's M ficar não-significativo"],answer:1,difficulty:"medium",explain_correct:"Box's M significativo indica violação de homogeneidade de matrizes de covariância. Pillai's Trace é o critério mais robusto nesta situação. Também considere tamanhos amostrais iguais.",explain_wrong:"Não se deve ignorar Box's M (embora seja sensível com n grande). Converter em ranks perde informação multivariada. Remover VDs altera a questão de pesquisa."},
{id:"r12q13",text:"Na MANOVA, a correlação moderada (r = .3 a .6) entre as VDs é considerada:",options:["Problemática — as VDs devem ser completamente independentes","Ideal — correlação moderada maximiza o benefício da MANOVA sobre ANOVAs separadas","Irrelevante — a MANOVA ignora correlações entre VDs","Violação que invalida toda a análise"],answer:1,difficulty:"medium",explain_correct:"Correlação moderada entre VDs é o cenário ideal para MANOVA. Com r ≈ 0, a MANOVA não agrega nada sobre ANOVAs. Com r muito alto, há redundância e multicolinearidade.",explain_wrong:"VDs completamente independentes tornam a MANOVA desnecessária. A MANOVA não ignora correlações — elas são centrais à análise. Correlação moderada não é violação."},
{id:"r12q14",text:"A análise discriminante como follow-up da MANOVA serve para:",options:["Verificar normalidade multivariada","Identificar quais combinações lineares das VDs melhor separam os grupos","Testar a esfericidade dos dados","Substituir o teste de Box's M"],answer:1,difficulty:"medium",explain_correct:"A análise discriminante identifica funções discriminantes — combinações lineares ótimas das VDs que maximizam a separação entre grupos, complementando a informação da MANOVA.",explain_wrong:"Não testa normalidade, esfericidade, nem substitui Box's M. Seu papel é interpretar a estrutura multivariada."},
{id:"r12q15",text:"Muninn lembra que o número mínimo de observações por grupo na MANOVA deve exceder:",options:["O número de VIs","O número de VDs em cada grupo","O quadrado do número de grupos","O número total de variáveis no modelo"],answer:1,difficulty:"medium",explain_correct:"Para que as matrizes SSCP sejam não-singulares e estimáveis, cada grupo precisa ter mais observações que o número de VDs. Na prática, recomenda-se n por grupo ≥ VDs + 20.",explain_wrong:"O critério fundamental é n_grupo > número de VDs. Não é o número de VIs, o quadrado de grupos, nem o total de variáveis."},
