{id:"r12q16",text:"Em uma MANOVA 3 × 2 com 5 VDs, qual estatística multivariada é mais vulnerável a violações de pressupostos?",options:["Pillai's Trace","Wilks' Lambda","Hotelling's Trace","Roy's Largest Root"],answer:3,difficulty:"medium",explain_correct:"Roy's Largest Root é o mais poderoso quando diferenças se concentram em uma dimensão, mas o menos robusto — muito sensível a violações de normalidade e homogeneidade de matrizes.",explain_wrong:"Pillai é o mais robusto. Wilks e Hotelling ficam no meio. Roy é o extremo em poder e vulnerabilidade."},
{id:"r12q17",text:"ThorMento incluiu 12 VDs na MANOVA com apenas 15 participantes por grupo. Odin Dinho critica porque:",options:["A MANOVA não aceita mais de 10 VDs","Com n por grupo próximo ao número de VDs, as matrizes de covariância tornam-se instáveis e os resultados não são confiáveis","Mais VDs sempre aumentam o poder","O teste F multivariado não existe para mais de 10 VDs"],answer:1,difficulty:"medium",explain_correct:"Com 15 obs/grupo e 12 VDs, a razão n/VDs é perigosamente baixa. As matrizes SSCP ficam quase singulares, os testes perdem poder e os resultados são instáveis.",explain_wrong:"Não há limite formal de VDs. Mais VDs com n insuficiente reduzem poder. O teste F multivariado existe para qualquer número de VDs (com n adequado)."},
{id:"r12q18",text:"Na MANOVA, o equivalente multivariado do eta-quadrado parcial é:",options:["O R² ajustado","O eta-quadrado multivariado parcial (ηₚ²), frequentemente derivado de Pillai's Trace ou Wilks' Lambda","O d de Cohen para cada VD separadamente","O coeficiente de contingência"],answer:1,difficulty:"medium",explain_correct:"O tamanho de efeito multivariado pode ser estimado via ηₚ² derivado das estatísticas multivariadas (ex.: 1 − Λ para Wilks com 2 grupos). Para designs mais complexos, usa-se conversão de cada critério.",explain_wrong:"R² ajustado é de regressão. Cohen's d por VD é univariado. O coeficiente de contingência é para qui-quadrado."},
{id:"r12q19",text:"Quando os quatro critérios multivariados (Pillai, Wilks, Hotelling, Roy) concordam em significância, isso sugere:",options:["Que os dados violam todos os pressupostos","Que o efeito multivariado é robusto e provavelmente genuíno","Que houve erro computacional, pois deveriam divergir","Que a MANOVA é redundante e ANOVAs seriam suficientes"],answer:1,difficulty:"medium",explain_correct:"Concordância entre os quatro critérios indica resultado robusto. Quando divergem, há sinais de violação de pressupostos ou efeitos concentrados em poucas dimensões.",explain_wrong:"Concordância não indica violação nem erro. Também não torna MANOVA redundante — ela ainda oferece proteção α e informação multivariada."},
{id:"r12q20",text:"Huginn questiona: 'Se as VDs na MANOVA forem altamente correlacionadas (r > .90), o risco é:'",options:["Aumento do poder estatístico da MANOVA","Multicolinearidade, que torna as matrizes de covariância quase singulares e instabiliza os testes","Conversão automática em ANOVA fatorial","Eliminação da necessidade de follow-up"],answer:1,difficulty:"medium",explain_correct:"Correlações muito altas entre VDs geram multicolinearidade — matrizes quase singulares (determinante ≈ 0), inversão instável, e testes pouco confiáveis. Considere reduzir VDs ou usar PCA.",explain_wrong:"Não aumenta poder (reduz). Não se converte em ANOVA fatorial. Follow-up ainda seria necessário se significativo."}
],

"reino13": [
{id:"r13q01",text:"No Trono de Odin, a MANCOVA é descrita como a combinação de:",options:["ANOVA + teste t","MANOVA + ANCOVA: múltiplas VDs com controle de covariáveis","Regressão + qui-quadrado","ANOVA fatorial + correlação de Spearman"],answer:1,difficulty:"easy",explain_correct:"A MANCOVA une a lógica da MANOVA (múltiplas VDs simultâneas) com a da ANCOVA (controle de covariáveis contínuas), ajustando os vetores de médias pela influência das covariáveis.",explain_wrong:"Não envolve teste t, qui-quadrado, Spearman ou correlação. É especificamente a fusão de MANOVA e ANCOVA."},
{id:"r13q02",text:"Odin Dinho apresenta a sequência de decisão: se tenho 1 VD e 0 covariáveis, uso ANOVA. Se tenho 1 VD e 1 covariável, uso ANCOVA. Se tenho 3 VDs e 0 covariáveis, uso:",options:["ANCOVA","Três ANOVAs separadas","MANOVA","MANCOVA"],answer:2,difficulty:"easy",explain_correct:"Com múltiplas VDs e sem covariáveis, a MANOVA é o modelo correto — analisa as VDs conjuntamente, protegendo contra inflação α.",explain_wrong:"ANCOVA exige covariável. ANOVAs separadas inflacionam α. MANCOVA exige covariáveis que não existem aqui."},
{id:"r13q03",text:"Quando se deve escolher MANCOVA em vez de MANOVA?",options:["Quando há apenas uma VD","Quando existem covariáveis contínuas que influenciam as VDs e precisam ser controladas","Quando os dados são ordinais","Quando não há pressupostos a verificar"],answer:1,difficulty:"easy",explain_correct:"A MANCOVA é indicada quando há múltiplas VDs e ao menos uma covariável contínua a controlar — combinando as vantagens de ambas as técnicas.",explain_wrong:"Com 1 VD seria ANCOVA. Dados ordinais pedem testes não-paramétricos. A MANCOVA tem mais pressupostos que a MANOVA."},
{id:"r13q04",text:"Muninn sussurra: 'Os pressupostos da MANCOVA são os pressupostos acumulados de MANOVA e ANCOVA.' Isso inclui:",options:["Apenas normalidade univariada","Normalidade multivariada, homogeneidade de matrizes de covariância, homogeneidade de inclinações, linearidade covariável-VDs e independência VI-covariável","Apenas homocedasticidade","Apenas linearidade"],answer:1,difficulty:"easy",explain_correct:"A MANCOVA herda todos os pressupostos da MANOVA (normalidade multivariada, Box's M) e da ANCOVA (homogeneidade de inclinações, linearidade, independência VI-covariável).",explain_wrong:"Não é apenas um pressuposto — é a combinação completa dos pressupostos de ambas as técnicas."},
{id:"r13q05",text:"Huginn provoca: 'Se o GLM (Modelo Linear Geral) é um framework unificador, então ANOVA, ANCOVA, MANOVA e MANCOVA são:'",options:["Técnicas completamente independentes sem relação","Casos especiais do mesmo modelo geral Y = Xβ + ε","Versões obsoletas da regressão logística","Exclusivas para dados experimentais"],answer:1,difficulty:"easy",explain_correct:"O GLM unifica todas essas técnicas: ANOVA (preditores categóricos, 1 VD), ANCOVA (+covariável), MANOVA (múltiplas VDs), MANCOVA (múltiplas VDs + covariáveis). Todas são Y = Xβ + ε.",explain_wrong:"Não são independentes — compartilham o mesmo framework. Não são obsoletas. Funcionam com dados experimentais e quasi-experimentais."},
{id:"r13q06",text:"A tabela comparativa das técnicas mostra: ANOVA = 1 VD, 0 covariáveis; ANCOVA = 1 VD, ≥1 covariável; MANOVA = ≥2 VDs, 0 covariáveis; MANCOVA = ≥2 VDs, ≥1 covariável. Quantas VIs categóricas cada uma pode ter?",options:["Exatamente 1","Cada uma pode ter 1 ou mais VIs categóricas (fatores)","Apenas MANOVA e MANCOVA aceitam mais de 1 VI","Nenhuma aceita mais de 2 VIs"],answer:1,difficulty:"easy",explain_correct:"Todas as quatro técnicas aceitam 1 ou mais fatores (VIs categóricas). A distinção está no número de VDs e na presença/ausência de covariáveis, não no número de fatores.",explain_wrong:"Não há limite de 1 fator. ANOVA e ANCOVA também podem ser fatoriais. Todas aceitam múltiplas VIs."},
{id:"r13q07",text:"Odin Dinho explica que a parcimônia na escolha entre ANOVA, ANCOVA, MANOVA e MANCOVA significa:",options:["Sempre usar a técnica mais complexa disponível","Usar a técnica mais simples que responda adequadamente à pergunta de pesquisa","Evitar todas essas técnicas e usar apenas correlação","Usar MANCOVA em toda situação para maximizar controle"],answer:1,difficulty:"easy",explain_correct:"Parcimônia: se 1 VD e 0 covariáveis bastam, use ANOVA. Não complique sem necessidade. Cada técnica adiciona complexidade (pressupostos, interpretação) que só se justifica se o design exigir.",explain_wrong:"Técnica mais complexa sem necessidade viola parcimônia. Correlação não substitui comparação de grupos. MANCOVA para tudo é excesso."},
{id:"r13q08",text:"Na MANCOVA, as médias ajustadas dos vetores de médias representam:",options:["As médias originais de cada VD","Os vetores de médias de cada grupo nas VDs após remover estatisticamente o efeito das covariáveis","As médias das covariáveis","Os resíduos padronizados"],answer:1,difficulty:"easy",explain_correct:"Assim como a ANCOVA ajusta médias de 1 VD, a MANCOVA ajusta o vetor completo de médias (todas as VDs) pela covariável, como se todos os grupos tivessem o mesmo valor na covariável.",explain_wrong:"Não são médias originais (essas seriam da MANOVA sem ajuste). Não são médias das covariáveis. Não são resíduos."},
{id:"r13q09",text:"ThorMento quer usar MANCOVA com 8 VDs, 4 covariáveis e apenas 20 participantes por grupo. Odin Dinho alerta que a limitação principal é:",options:["A MANCOVA não aceita mais de 3 VDs","Com tantas variáveis e poucos participantes, a razão n/variáveis é insuficiente, tornando as estimativas instáveis","A MANCOVA exige N > 1000","As covariáveis devem ser binárias"],answer:1,difficulty:"easy",explain_correct:"Com 12 variáveis no modelo (8 VDs + 4 covariáveis) e 20 obs/grupo, as matrizes ficam instáveis. Recomenda-se n por grupo muito superior ao número de VDs.",explain_wrong:"Não há limite de 3 VDs. Não exige N > 1000. Covariáveis devem ser contínuas, não binárias."},
{id:"r13q10",text:"Qual é a principal vantagem da MANCOVA sobre conduzir ANOVAs separadas para cada VD com covariáveis?",options:["É mais rápida de calcular","Controla simultaneamente o erro Tipo I, preserva a correlação entre VDs e ajusta por covariáveis em um único modelo integrado","Não exige normalidade","Funciona sem software estatístico"],answer:1,difficulty:"easy",explain_correct:"A MANCOVA oferece proteção α, captura padrões multivariados entre VDs, e ajusta pelas covariáveis — tudo que se perderia ao fragmentar a análise em testes isolados.",explain_wrong:"Não é mais rápida (é mais complexa). Exige normalidade multivariada. Requer software especializado."},
{id:"r13q11",text:"Em uma MANCOVA com 2 VDs, 1 covariável e 3 grupos, o pesquisador encontra efeito multivariado significativo do fator (Pillai = .28, p = .004) após controlar a covariável. O follow-up adequado é:",options:["Reportar apenas o Pillai e encerrar","Conduzir ANCOVAs univariadas para cada VD (com a mesma covariável) para identificar onde as diferenças ocorrem","Rodar um teste t para cada par de grupos sem considerar a covariável","Ignorar o resultado e usar ANOVA simples"],answer:1,difficulty:"medium",explain_correct:"Após MANCOVA significativa, ANCOVAs univariadas com a mesma covariável identificam quais VDs contribuem para a diferença, mantendo o ajuste da covariável em todo o pipeline.",explain_wrong:"Só Pillai não informa onde está a diferença. Teste t sem covariável perde o ajuste. Voltar à ANOVA descarta o controle da covariável."},
{id:"r13q12",text:"Huginn questiona: 'Se a MANCOVA encontrar que a covariável é significativa multivariadamente, mas o fator não, a interpretação é:'",options:["A MANCOVA falhou","A covariável explica variância nas VDs conjuntamente, mas após esse ajuste, os grupos não diferem — resultado válido e informativo","Deve-se remover a covariável e refazer como MANOVA","Os dados são inadequados para análise multivariada"],answer:1,difficulty:"medium",explain_correct:"É um resultado legítimo: a covariável associa-se fortemente às VDs, e após seu controle, os grupos são semelhantes. Isso indica que diferenças aparentes nos grupos poderiam ser atribuídas à covariável.",explain_wrong:"A MANCOVA não 'falhou'. Remover covariável significativa desperdiça informação. Dados podem ser perfeitamente adequados."},
{id:"r13q13",text:"A verificação de homogeneidade de inclinações na MANCOVA é mais complexa que na ANCOVA porque:",options:["Não existe esse pressuposto na MANCOVA","É necessário verificar se a relação covariável-VD tem inclinação similar entre grupos para cada VD simultaneamente — envolvendo interação multivariada fator×covariável","Basta verificar para uma VD e generalizar","A homogeneidade é testada apenas pela covariável, não pelas VDs"],answer:1,difficulty:"medium",explain_correct:"Na MANCOVA, testa-se a interação multivariada fator×covariável. Se significativa, as inclinações covariável→VDs diferem entre grupos no espaço multivariado, violando o pressuposto.",explain_wrong:"O pressuposto existe. Verificar uma VD não basta — é multivariado. Envolve a relação covariável com todas as VDs."},
{id:"r13q14",text:"Odin Dinho mostra que adicionar covariáveis na MANCOVA pode aumentar o poder estatístico. Isso ocorre porque:",options:["As covariáveis aumentam o tamanho amostral","A variância explicada pelas covariáveis é removida do erro residual multivariado, reduzindo o denominador dos testes","Covariáveis eliminam outliers automaticamente","O número de graus de liberdade aumenta com covariáveis"],answer:1,difficulty:"medium",explain_correct:"Covariáveis que correlacionam com as VDs extraem variância do erro residual multivariado. Com erro menor, os testes têm mais poder para detectar efeitos do fator.",explain_wrong:"Covariáveis não alteram n. Não eliminam outliers. Na verdade, consomem gl (reduzem gl_erro)."},
{id:"r13q15",text:"Um pesquisador usou MANCOVA quando bastaria ANOVA (1 VD, sem covariável relevante). O problema dessa decisão é:",options:["A MANCOVA daria resultado oposto","Viola o princípio de parcimônia — adiciona complexidade desnecessária, mais pressupostos a verificar e dificulta a interpretação sem ganho analítico","A MANCOVA é proibida com 1 VD","Os revisores sempre rejeitam MANCOVA"],answer:1,difficulty:"medium",explain_correct:"Usar técnica mais complexa que o necessário viola parcimônia. Mais pressupostos, interpretação mais difícil, e nenhum benefício analítico quando design simples é suficiente.",explain_wrong:"Tecnicamente MANCOVA com 1 VD reduz-se a ANCOVA (se tiver covariável) ou ANOVA. Não é proibida, mas injustificada. Revisores criticam por ser desnecessária, não por ser MANCOVA per se."},
{id:"r13q16",text:"Na MANCOVA, a independência entre VI e covariável é especialmente crítica porque:",options:["A covariável deve ser a mesma variável que a VI","Se a VI e a covariável estão confundidas, o ajuste multivariado pode distorcer o efeito em múltiplas VDs simultaneamente, amplificando o viés","A MANCOVA não usa VIs categóricas","A covariável substitui a VI quando estão correlacionadas"],answer:1,difficulty:"medium",explain_correct:"Confusão VI-covariável na MANCOVA propaga o viés para todas as VDs simultaneamente. O problema é amplificado em relação à ANCOVA (1 VD) porque contamina todo o vetor de médias ajustadas.",explain_wrong:"VI e covariável são variáveis diferentes. A MANCOVA usa VIs categóricas. Covariável não substitui VI."},
{id:"r13q17",text:"Muninn resume: 'Para que a MANCOVA funcione adequadamente, a relação entre covariáveis e VDs deve ser:'",options:["Inexistente — covariáveis não devem correlacionar com VDs","Linear, para que o ajuste da covariável seja eficaz em remover variância relevante","Curvilínea, pois a MANCOVA modela relações não-lineares","Perfeita (r = 1.0) entre cada covariável e cada VD"],answer:1,difficulty:"medium",explain_correct:"Como no GLM, a MANCOVA assume relação linear covariável→VDs. Se a relação for curvilínea, o ajuste linear subestima a variância removível, comprometendo a eficácia.",explain_wrong:"Covariáveis que não correlacionam com VDs são inúteis. A MANCOVA não modela não-linearidade nativamente. Correlação perfeita geraria problemas."},
{id:"r13q18",text:"ThorMento pergunta por que não usar sempre MANCOVA 'para garantir'. Odin Dinho lista desvantagens legítimas da MANCOVA:",options:["Não tem nenhuma desvantagem","Exige amostras maiores, mais pressupostos a verificar, interpretação mais complexa e covariáveis irrelevantes podem reduzir poder","É mais barata computacionalmente que ANOVA","Sempre produz resultados significativos"],answer:1,difficulty:"medium",explain_correct:"A MANCOVA é a técnica mais exigente da família GLM: amostra grande, muitos pressupostos, interpretação multivariada complexa, e covariáveis sem relação com VDs desperdiçam gl.",explain_wrong:"Tem várias desvantagens. É mais custosa computacionalmente. Não garante significância — pode até perder poder com covariáveis irrelevantes."},
{id:"r13q19",text:"Ao reportar MANCOVA em formato APA, além da estatística multivariada (ex.: Pillai's Trace) e p-valor, deve-se incluir:",options:["Apenas o F multivariado","Os gl multivariados, F aproximado, tamanho de efeito multivariado (ηₚ²), quais covariáveis foram controladas e os resultados das ANCOVAs univariadas de follow-up com médias ajustadas","O qui-quadrado de Bartlett","O índice KMO"],answer:1,difficulty:"medium",explain_correct:"Reporte APA completo: estatística multivariada, F(gl_hipótese, gl_erro), p, ηₚ², covariáveis controladas, seguido de ANCOVAs univariadas com médias ajustadas e IC para cada VD.",explain_wrong:"Qui-quadrado de Bartlett e KMO são da análise fatorial. O F sozinho é insuficiente — precisa de gl, efeito, covariáveis e follow-up."},
{id:"r13q20",text:"Huginn encerra com um desafio: 'Em qual situação a MANCOVA seria claramente preferível a todas as outras técnicas (ANOVA, ANCOVA, MANOVA)?'",options:["Quando há 1 VD e nenhuma covariável","Quando há múltiplas VDs correlacionadas e ao menos uma covariável contínua relevante que influencia as VDs","Quando os dados são categóricos em todas as variáveis","Quando a amostra tem menos de 10 participantes"],answer:1,difficulty:"medium",explain_correct:"MANCOVA é a escolha quando: (a) há 2+ VDs correlacionadas, (b) existe covariável contínua relevante, (c) a amostra é adequada e (d) os pressupostos são razoavelmente atendidos.",explain_wrong:"1 VD sem covariável = ANOVA. Dados categóricos = qui-quadrado ou log-linear. Amostra de 10 é insuficiente para MANCOVA."}
],

"reino14": [
{id:"r14q01",text:"Em Niflheim, terra gélida dos dados rebeldes, os testes não-paramétricos são preferíveis quando:",options:["A amostra é grande e normal","Os dados violam normalidade, são ordinais ou as amostras são muito pequenas","A variância é homogênea entre grupos","As variáveis são todas dicotômicas"],answer:1,difficulty:"easy",explain_correct:"Testes não-paramétricos não assumem distribuição normal, trabalham com ranks e são robustos para dados ordinais e amostras pequenas onde a normalidade é difícil de verificar.",explain_wrong:"Com amostras grandes e normais, testes paramétricos são mais poderosos. Variância homogênea favorece paramétricos. Variáveis dicotômicas pedem qui-quadrado ou Fisher."},
{id:"r14q02",text:"O teste de Mann-Whitney U é o equivalente não-paramétrico de qual teste paramétrico?",options:["ANOVA de um fator","Teste t para amostras independentes","Teste t pareado","Correlação de Pearson"],answer:1,difficulty:"easy",explain_correct:"Mann-Whitney U compara dois grupos independentes usando ranks, sendo a alternativa não-paramétrica ao teste t de amostras independentes.",explain_wrong:"ANOVA é para 3+ grupos (Kruskal-Wallis). Teste t pareado corresponde a Wilcoxon Signed-Rank. Pearson corresponde a Spearman."},
{id:"r14q03",text:"Muninn lembra: 'O teste de Wilcoxon Signed-Rank é usado para comparar:'",options:["Três ou mais grupos independentes","Dois grupos independentes","Duas condições pareadas (medidas repetidas com 2 níveis)","Correlações entre variáveis ordinais"],answer:2,difficulty:"easy",explain_correct:"Wilcoxon Signed-Rank compara duas condições pareadas (mesmo sujeito em duas condições, ou pares emparelhados), usando as diferenças ranqueadas — alternativa ao teste t pareado.",explain_wrong:"3+ grupos independentes = Kruskal-Wallis. 2 independentes = Mann-Whitney. Correlações ordinais = Spearman/Kendall."},
{id:"r14q04",text:"O teste de Kruskal-Wallis é utilizado quando se deseja comparar:",options:["Duas condições pareadas","Três ou mais grupos independentes com dados ordinais ou que violam normalidade","Duas médias populacionais com variância conhecida","A associação entre duas variáveis contínuas"],answer:1,difficulty:"easy",explain_correct:"Kruskal-Wallis é a extensão de Mann-Whitney para 3+ grupos independentes — equivalente não-paramétrico da ANOVA de um fator.",explain_wrong:"Duas condições pareadas = Wilcoxon. Duas médias com variância conhecida = teste z. Associação contínua = Pearson/Spearman."},
{id:"r14q05",text:"O teste de Friedman é o equivalente não-paramétrico de:",options:["ANOVA de um fator entre sujeitos","ANOVA de medidas repetidas de um fator","Teste t independente","Regressão linear"],answer:1,difficulty:"easy",explain_correct:"Friedman compara 3+ condições pareadas (mesmo sujeito em múltiplas condições), usando ranks dentro de cada sujeito — alternativa não-paramétrica à ANOVA de medidas repetidas.",explain_wrong:"ANOVA entre sujeitos = Kruskal-Wallis. Teste t independente = Mann-Whitney. Regressão não tem equivalente direto não-paramétrico simples."},
{id:"r14q06",text:"A correlação de Spearman (ρ) mede:",options:["A relação linear entre duas variáveis contínuas normais","A associação monotônica entre duas variáveis, usando ranks","A diferença de médias entre dois grupos","A proporção de variância explicada por regressão"],answer:1,difficulty:"easy",explain_correct:"Spearman ρ é a correlação de Pearson aplicada aos ranks dos dados — mede associação monotônica (não necessariamente linear) e é robusta a outliers e não-normalidade.",explain_wrong:"Relação linear + normalidade = Pearson. Diferença de médias = teste t. Variância explicada = R²."},
{id:"r14q07",text:"ThorMento diz que testes não-paramétricos são sempre piores que paramétricos. Odin Dinho corrige listando uma vantagem:",options:["Não-paramétricos sempre têm mais poder","Não-paramétricos são robustos a outliers e distribuições assimétricas, sendo mais adequados quando pressupostos paramétricos são violados","Não-paramétricos exigem amostras maiores","Não-paramétricos só funcionam com dados nominais"],answer:1,difficulty:"easy",explain_correct:"Quando pressupostos são violados, não-paramétricos podem ser mais poderosos que paramétricos. Sua robustez a outliers e assimetria é uma vantagem real.",explain_wrong:"Sob normalidade, paramétricos têm mais poder. Não-paramétricos funcionam com amostras menores. Funcionam com dados ordinais e contínuos, não só nominais."},
{id:"r14q08",text:"Após um Kruskal-Wallis significativo, o post-hoc mais comum é:",options:["Tukey HSD","Teste de Dunn com correção para comparações múltiplas","Teste de Levene","Análise discriminante"],answer:1,difficulty:"easy",explain_correct:"O teste de Dunn compara pares de grupos usando ranks, com correção de Bonferroni ou Holm para múltiplas comparações — é o follow-up padrão do Kruskal-Wallis.",explain_wrong:"Tukey HSD é post-hoc paramétrico da ANOVA. Levene testa homocedasticidade. Análise discriminante é follow-up da MANOVA."},
{id:"r14q09",text:"O tau de Kendall (τ) difere do ρ de Spearman principalmente porque:",options:["Kendall usa valores brutos, Spearman usa ranks","Kendall conta concordâncias e discordâncias entre pares, sendo mais interpretável e robusto com amostras pequenas e empates","Kendall é paramétrico e Spearman não-paramétrico","Kendall só funciona com variáveis nominais"],answer:1,difficulty:"easy",explain_correct:"Kendall τ baseia-se em pares concordantes e discordantes, é mais robusto com empates e amostras pequenas, e tem propriedades estatísticas melhores (variância menor) que Spearman.",explain_wrong:"Ambos usam ranks. Ambos são não-paramétricos. Kendall funciona com dados ordinais e contínuos."},
{id:"r14q10",text:"Uma desvantagem dos testes não-paramétricos em relação aos paramétricos é:",options:["Não podem ser usados com amostras pequenas","Tendem a ter menor poder estatístico quando os pressupostos paramétricos são satisfeitos","Exigem normalidade dos dados","Não podem testar diferenças entre grupos"],answer:1,difficulty:"easy",explain_correct:"Quando os dados são normais, não-paramétricos descartam informação ao usar ranks, resultando em menor poder (~95% da eficiência do paramétrico para Mann-Whitney vs. teste t).",explain_wrong:"Não-paramétricos são especialmente úteis com amostras pequenas. Não exigem normalidade. Podem testar diferenças entre grupos."},
{id:"r14q11",text:"Um guerreiro de Niflheim comparou a força de dois clãs (n₁ = 8, n₂ = 10) com dados fortemente assimétricos. Escolheu Mann-Whitney. O tamanho de efeito adequado para reportar é:",options:["Cohen's d","r = Z / √N, onde Z é o escore Z do teste e N é o total de observações","Eta-quadrado parcial","Odds ratio"],answer:1,difficulty:"medium",explain_correct:"Para Mann-Whitney, o tamanho de efeito r = Z/√N é o padrão. Usa-se a aproximação Z da estatística U. Interpretação: r = .1 pequeno, .3 médio, .5 grande.",explain_wrong:"Cohen's d e ηₚ² são para testes paramétricos. Odds ratio é para dados dicotômicos/regressão logística."},
{id:"r14q12",text:"Huginn provoca: 'O teste de Mann-Whitney testa se as distribuições dos dois grupos são diferentes. Mais precisamente, a hipótese nula é:'",options:["As médias são iguais","As distribuições dos dois grupos são idênticas (sob forma homogênea, testa diferença de localização/medianas)","As variâncias são iguais","As correlações são iguais"],answer:1,difficulty:"medium",explain_correct:"A H₀ formal de Mann-Whitney é que as distribuições são idênticas. Na prática, quando as formas são similares, testa-se diferença de localização (medianas/médias dos ranks).",explain_wrong:"Formalmente não testa médias. Não testa variâncias nem correlações. É um teste de localização/distribuição."},
{id:"r14q13",text:"Um pesquisador tem 4 condições pareadas com dados ordinais (escalas Likert de 5 pontos). O teste adequado é:",options:["ANOVA de medidas repetidas","Friedman","Mann-Whitney U","Kruskal-Wallis"],answer:1,difficulty:"medium",explain_correct:"Friedman é para 3+ condições pareadas com dados ordinais — exatamente este cenário (4 condições, mesmos sujeitos, escala Likert ordinal).",explain_wrong:"ANOVA de medidas repetidas requer dados contínuos e normalidade. Mann-Whitney é para 2 grupos independentes. Kruskal-Wallis é para 3+ grupos independentes."},
{id:"r14q14",text:"Após um teste de Friedman significativo, o post-hoc apropriado é:",options:["Tukey HSD","Comparações pareadas de Wilcoxon Signed-Rank com correção de Bonferroni ou teste de Nemenyi","Teste de Dunn","Análise de regressão"],answer:1,difficulty:"medium",explain_correct:"O follow-up do Friedman usa comparações pareadas de Wilcoxon com correção para múltiplas comparações (Bonferroni/Holm), ou o teste de Nemenyi como alternativa integrada.",explain_wrong:"Tukey é paramétrico. Dunn é post-hoc do Kruskal-Wallis (independentes). Regressão não é follow-up de Friedman."},
{id:"r14q15",text:"Muninn lembra: 'A eficiência assintótica relativa (ARE) de Mann-Whitney comparado ao teste t, sob normalidade, é aproximadamente:'",options:["50% — muito inferior","95.5% — quase tão eficiente","100% — idêntica","120% — superior"],answer:1,difficulty:"medium",explain_correct:"A ARE de Mann-Whitney vs. teste t sob normalidade é π/3 ≈ 0.955. Ou seja, perde-se apenas ~4.5% de eficiência usando ranks quando os dados são perfeitamente normais.",explain_wrong:"Não é 50% (a perda é mínima). Não é 100% (há alguma perda). Não é superior sob normalidade (paramétrico é ótimo quando pressupostos valem)."},
{id:"r14q16",text:"ThorMento insiste em usar teste t com n = 5 por grupo e dados com outliers extremos. Odin Dinho recomenda Mann-Whitney porque:",options:["Mann-Whitney exige amostras grandes para funcionar","Com n pequeno, normalidade é difícil de verificar; outliers extremos distorcem a média e o desvio-padrão, enquanto ranks são resistentes a valores atípicos","Mann-Whitney é paramétrico e mais poderoso","Teste t nunca funciona com menos de 30 observações"],answer:1,difficulty:"medium",explain_correct:"Ranks são robustos a outliers — o maior valor vira o maior rank, independente de quão extremo seja. Com n = 5, normalidade é inverificável e a média é muito sensível a outliers.",explain_wrong:"Mann-Whitney funciona bem com amostras pequenas. Não é paramétrico. Teste t pode funcionar com n < 30 se dados forem normais (sem outliers)."},
{id:"r14q17",text:"Quando os dados são contínuos e a única violação é assimetria moderada, com n > 30 por grupo, a escolha entre teste t e Mann-Whitney deve considerar:",options:["Sempre usar Mann-Whitney com qualquer assimetria","O teste t é robusto a assimetria moderada com n razoável (TCL), então pode ser adequado; Mann-Whitney é alternativa segura se a assimetria for preocupante","Nenhum dos dois é adequado — usar qui-quadrado","A assimetria invalida ambos os testes"],answer:1,difficulty:"medium",explain_correct:"Pelo TCL, com n > 30, a distribuição amostral da média se aproxima da normal mesmo com dados assimétricos. O teste t pode ser robusto. Mann-Whitney é alternativa conservadora.",explain_wrong:"Não é necessário sempre usar Mann-Whitney com qualquer assimetria. Qui-quadrado é para frequências. A assimetria moderada não invalida ambos."},
{id:"r14q18",text:"A correlação de Spearman entre a classificação de guerreiros em combate e sua posição em tiro com arco é ρ = .82, p < .001. Isso indica:",options:["Relação causal entre habilidade de combate e tiro com arco","Forte associação monotônica positiva: guerreiros que ranqueiam alto em combate tendem a ranquear alto em tiro com arco","Que exatamente 82% da variância é compartilhada","Que a relação é necessariamente linear"],answer:1,difficulty:"medium",explain_correct:"ρ = .82 indica associação monotônica forte e positiva. Não implica causalidade, não é R² (seria .67), e pode ser monotônica sem ser linear.",explain_wrong:"Correlação nunca prova causalidade. ρ² (≈ .67) seria a variância compartilhada, não ρ. Monotônica inclui relações curvilíneas crescentes."},
{id:"r14q19",text:"Huginn desafia: 'Qual a principal razão para preferir Kendall τ sobre Spearman ρ quando há muitos empates nos dados?'",options:["Kendall é paramétrico e lida melhor com empates","Kendall τ tem melhor tratamento de empates por sua formulação baseada em concordâncias/discordâncias, e seu erro padrão é mais confiável com amostras pequenas","Spearman não pode ser calculado com empates","Kendall sempre dá valores maiores que Spearman"],answer:1,difficulty:"medium",explain_correct:"Kendall τ lida com empates de forma mais natural (pares empatados são tratados explicitamente). Além disso, a distribuição de τ converge mais rapidamente para a normal, tornando inferências mais confiáveis com n pequeno.",explain_wrong:"Kendall é não-paramétrico. Spearman pode ser calculado com empates (via correção). Kendall geralmente produz valores menores, não maiores, que Spearman."},
{id:"r14q20",text:"Um pesquisador comparou 5 aldeias vikings (grupos independentes) em satisfação com o jarl (escala ordinal). Kruskal-Wallis deu H(4) = 15.2, p = .004. O tamanho de efeito ε² (epsilon-quadrado) foi .31. A interpretação do tamanho de efeito é:",options:["Efeito negligenciável — as aldeias são iguais","Efeito grande — cerca de 31% da variabilidade nos ranks é explicada pelas diferenças entre aldeias","Efeito perfeito — todas as aldeias são completamente diferentes","O valor é impossível — ε² não se aplica a Kruskal-Wallis"],answer:1,difficulty:"medium",explain_correct:"ε² = H/((N²−1)/(N+1)) varia de 0 a 1. Valor .31 indica efeito grande (análogo a η² > .14). As diferenças entre aldeias explicam 31% da variabilidade nos ranks.",explain_wrong:"Não é negligenciável (.31 é substancial). Não é perfeito (seria ~1.0). ε² é uma medida legítima de efeito para Kruskal-Wallis."}
]
};

function submitRegister(){
  var name=document.getElementById('reg-name').value.trim();
  var ra=document.getElementById('reg-ra').value.trim();
  var course=document.getElementById('reg-course').value;
  var email=document.getElementById('reg-email').value.trim();
  var valid=true;
  ['name','ra','course','email'].forEach(function(f){document.getElementById('err-'+f).style.display='none';});
  if(!name){document.getElementById('err-name').style.display='block';valid=false;}
  if(!ra){document.getElementById('err-ra').style.display='block';valid=false;}
  if(!course){document.getElementById('err-course').style.display='block';valid=false;}

}

function selectTheme(themeId){
  var bank=QUESTION_BANK[themeId];
  if(!bank)return;
  APP.theme=THEMES.find(function(t){return t.id===themeId;});
  APP.answers=[];APP.current=0;APP.abandoned=false;
  var easy=bank.filter(function(q){return q.difficulty==='easy';});
  var medium=bank.filter(function(q){return q.difficulty==='medium';});
  easy=shuffle(easy).slice(0,5);medium=shuffle(medium).slice(0,5);
  APP.questions=shuffle(easy.concat(medium));
  renderQuestion();
}

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

// ━━ QUIZ ENGINE ━━
function renderQuestion(){
  if(APP.current>=APP.questions.length){showResults(false);return;}
  var q=APP.questions[APP.current];
  var pct=Math.round((APP.current/APP.questions.length)*100);
  var diffLabel=q.difficulty==='easy'?'Fácil':'Média';
  var optionsHTML=q.options.map(function(opt,idx){
    return '<button class="option-btn" onclick="answerQuestion('+idx+')">'+LETTERS[idx]+') '+opt+'</button>';
  }).join('');
  $app().innerHTML =
    '<div class="quiz-progress"><div class="qp-label">⚔️ Questão '+(APP.current+1)+'/'+APP.questions.length+'</div><div class="qp-bar-bg"><div class="qp-bar-fill" style="width:'+pct+'%"></div></div><div class="qp-count">'+APP.theme.title.split(':')[0]+'</div></div>' +
    '<div class="timer-display" id="timer-text">⏱️ 30s</div>' +
    '<div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>' +
    '<div class="question-card"><div class="q-number">Desafio '+(APP.current+1)+' <span class="q-difficulty '+q.difficulty+'">'+diffLabel+'</span></div><div class="q-text">'+q.text+'</div><div class="options-grid" id="options-area">'+optionsHTML+'</div><div id="feedback-area"></div></div>' +
    '<div style="text-align:center;margin-top:12px"><button class="btn-back" onclick="abandonQuiz()">🚪 Sair do Quiz</button></div>';
  APP.timeLeft=30;startTimer();
}

function startTimer(){
  clearInterval(APP.timer);
  APP.timer=setInterval(function(){
    APP.timeLeft--;
    var pct=(APP.timeLeft/30)*100;
    var fill=document.getElementById('timer-fill');var text=document.getElementById('timer-text');
    if(!fill||!text){clearInterval(APP.timer);return;}
    fill.style.width=pct+'%';text.textContent='⏱️ '+APP.timeLeft+'s';
    if(APP.timeLeft<=5){fill.className='timer-fill danger';text.className='timer-display danger';}
    else if(APP.timeLeft<=10){fill.className='timer-fill warning';text.className='timer-display warning';}
    if(APP.timeLeft<=0){clearInterval(APP.timer);timeoutQuestion();}
  },1000);
}

function answerQuestion(idx){
  clearInterval(APP.timer);
  var q=APP.questions[APP.current];
  var isCorrect=(idx===q.answer);
  APP.answers.push({qIndex:APP.current,question:q.text,selected:idx,selectedLetter:LETTERS[idx],selectedText:q.options[idx],correct:q.answer,correctLetter:LETTERS[q.answer],correctText:q.options[q.answer],isCorrect:isCorrect,timedOut:false});
  var btns=document.querySelectorAll('#options-area .option-btn');
  btns.forEach(function(b,i){b.classList.add('disabled');b.onclick=null;if(i===q.answer)b.classList.add('correct');if(i===idx&&!isCorrect)b.classList.add('wrong');});
  var fb=document.getElementById('feedback-area');
  if(isCorrect){fb.innerHTML='<div class="feedback-box correct">✅ '+q.explain_correct+'</div>';}
  else{fb.innerHTML='<div class="feedback-box wrong">❌ '+q.explain_wrong+'</div>';}
  fb.innerHTML+='<button class="continue-btn" onclick="nextQuestion()">Próxima ➡</button>';
}

function timeoutQuestion(){
  var q=APP.questions[APP.current];
  APP.answers.push({qIndex:APP.current,question:q.text,selected:-1,selectedLetter:'-',selectedText:'(Tempo esgotado)',correct:q.answer,correctLetter:LETTERS[q.answer],correctText:q.options[q.answer],isCorrect:false,timedOut:true});
  var btns=document.querySelectorAll('#options-area .option-btn');
  btns.forEach(function(b,i){b.classList.add('disabled');b.onclick=null;if(i===q.answer)b.classList.add('reveal-correct');});
  var fb=document.getElementById('feedback-area');
  fb.innerHTML='<div class="feedback-box timeout">⏱️ Tempo esgotado! A resposta correta era: <strong>'+LETTERS[q.answer]+') '+q.options[q.answer]+'</strong></div>';
  fb.innerHTML+='<button class="continue-btn" onclick="nextQuestion()">Próxima ➡</button>';
}

function nextQuestion(){APP.current++;renderQuestion();}

function abandonQuiz(){
  if(!confirm('Tem certeza que deseja sair? Suas respostas até agora serão registradas.'))return;
  clearInterval(APP.timer);APP.abandoned=true;showResults(true);
}

// ━━ RESULTADOS ━━
function showResults(wasAbandoned){
  clearInterval(APP.timer);
  var hits=APP.answers.filter(function(a){return a.isCorrect;}).length;
  var total=APP.answers.length;
  var totalQ=APP.questions.length;
  var pct=total>0?Math.round((hits/total)*100):0;
  var rank,rankColor;
  if(pct>=90){rank='⚔️ Guerreiro Supremo';rankColor='var(--gold)';}
  else if(pct>=70){rank='🛡️ Protetor de Valhalla';rankColor='var(--odin-blue)';}
  else if(pct>=50){rank='📜 Aprendiz Esforçado';rankColor='var(--text-dim)';}
  else{rank='💀 Precisa Treinar Mais';rankColor='var(--thor-red)';}

  var detailHTML=APP.answers.map(function(a,i){
    var statusClass=a.timedOut?'rd-timeout':(a.isCorrect?'rd-correct':'rd-wrong');
    var statusText=a.timedOut?'⏱️ Tempo':(a.isCorrect?'✅ Correto':'❌ Errado');
    return '<div class="rd-item"><strong>Q'+(i+1)+':</strong> '+a.question.substring(0,80)+'...<br><span class="rd-status '+statusClass+'">'+statusText+'</span>'+
      ' · Marcou: <em>'+a.selectedLetter+') '+a.selectedText.substring(0,50)+'</em>'+
      (!a.isCorrect?' · Correta: <em style="color:var(--success)">'+a.correctLetter+') '+a.correctText.substring(0,50)+'</em>':'')+
      '</div>';
  }).join('');

  var statusMsg=wasAbandoned?'<div style="color:var(--gold);font-family:Bangers,cursive;font-size:1.2em;margin:12px 0">⚠️ Quiz abandonado — '+total+' de '+totalQ+' questões respondidas</div>':'';

  $app().innerHTML =
    '<div class="result-screen"><h2>Resultado do Quiz</h2>'+statusMsg+
    '<div class="result-rank" style="color:'+rankColor+'">'+rank+'</div>' +
    '<div class="result-stats">' +
      '<div class="stat-row"><span class="stat-label">Reino</span><span class="stat-value">'+APP.theme.title+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">Aluno</span><span class="stat-value">'+APP.student.name+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">RA</span><span class="stat-value">'+APP.student.ra+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">Acertos</span><span class="stat-value" style="color:var(--success)">'+hits+' / '+total+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">Percentual</span><span class="stat-value">'+pct+'%</span></div>' +
      '<div class="stat-row"><span class="stat-label">Tempo esgotado</span><span class="stat-value" style="color:var(--gold)">'+APP.answers.filter(function(a){return a.timedOut;}).length+'</span></div>' +
    '</div>' +
    '<div class="result-detail"><h4>🐦 Detalhamento das Respostas</h4>'+detailHTML+'</div>' +
    '<div style="margin-top:20px"><button class="btn-download" onclick="downloadResults()">⬇️ Baixar Minhas Respostas</button></div>' +
    '<div id="sheets-status-area"></div>' +
    '<button class="btn-back" onclick="showThemes()" style="margin-top:20px">Voltar aos Reinos</button>' +
    '</div><div class="signature">Prof. Dr. Leonardo Vils · PPGA · UNINOVE · MTPQI · 2026</div>';

  sendToSheets(wasAbandoned,hits,total,pct);
}

// ━━ DOWNLOAD DE RESULTADOS ━━
function downloadResults(){
  var hits=APP.answers.filter(function(a){return a.isCorrect;}).length;
  var total=APP.answers.length;
  var pct=total>0?Math.round((hits/total)*100):0;
  var now=new Date();
  var lines=[];
  lines.push('QUIZ MTPQI — Resultado Individual');
  lines.push('========================================');
  lines.push('Data: '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR'));
  lines.push('Aluno: '+APP.student.name);
  lines.push('RA: '+APP.student.ra);
  lines.push('Programa: '+APP.student.course);
  lines.push('Email: '+APP.student.email);
  lines.push('Reino: '+APP.theme.title);
  lines.push('Acertos: '+hits+' / '+total+' ('+pct+'%)');
  lines.push('Status: '+(APP.abandoned?'Abandonado':'Completo'));
  lines.push('========================================');
  lines.push('');
  APP.answers.forEach(function(a,i){
    var st=a.timedOut?'[TEMPO ESGOTADO]':(a.isCorrect?'[CORRETO]':'[ERRADO]');
    lines.push('Q'+(i+1)+' '+st);
    lines.push('  Pergunta: '+a.question);
    lines.push('  Resposta marcada: '+a.selectedLetter+') '+a.selectedText);
    lines.push('  Resposta correta: '+a.correctLetter+') '+a.correctText);
    lines.push('');
  });
  lines.push('========================================');
  lines.push('Prof. Dr. Leonardo Vils · PPGA · UNINOVE · MTPQI · 2026');

  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='Quiz_MTPQI_'+APP.student.ra+'_'+APP.theme.id+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ━━ ENVIO PARA GOOGLE SHEETS (via formulário oculto — bypass CORS) ━━
function sendToSheets(wasAbandoned,hits,total,pct){
  var area=document.getElementById('sheets-status-area');
  if(!area)return;

  if(GOOGLE_SHEETS_URL==='COLE_SUA_URL_DO_APPS_SCRIPT_AQUI'){
    area.innerHTML='<div class="sheets-status error">⚠️ Google Sheets não configurado. Os resultados estão disponíveis para download acima.</div>';
    return;
  }

  area.innerHTML='<div class="sheets-status sending">📨 Enviando resultados para a planilha do professor...</div>';

  fetch('https://api.ipify.org?format=json').then(function(r){return r.json();}).then(function(ipData){
    submitToSheets(ipData.ip,wasAbandoned,hits,total,pct,area);
  }).catch(function(){
    submitToSheets('N/A',wasAbandoned,hits,total,pct,area);
  });
}

function submitToSheets(ip,wasAbandoned,hits,total,pct,area){
  var now=new Date();
  var payload={
    timestamp: now.toISOString(),
    nome: APP.student.name,
    ra: APP.student.ra,
    programa: APP.student.course,
    email: APP.student.email,
    tema: APP.theme.title,
    status: wasAbandoned?'Abandonado':'Completo',
    acertos: hits,
    total: total,
    percentual: pct,
    ip: ip,
    questoes: APP.answers.map(function(a,i){
      return {
        numero: i+1,
        enunciado: a.question,
        letra_marcada: a.selectedLetter,
        resposta_marcada: a.selectedText,
        letra_correta: a.correctLetter,
        resposta_correta: a.correctText,
        resultado: a.timedOut?'Tempo esgotado':(a.isCorrect?'Correto':'Errado')
      };
    })
  };

  var iframeName='sheets-iframe-'+Date.now();
  var iframe=document.createElement('iframe');
  iframe.name=iframeName;iframe.style.display='none';
  document.body.appendChild(iframe);

  var form=document.createElement('form');
  form.method='POST';form.action=GOOGLE_SHEETS_URL;form.target=iframeName;
  var input=document.createElement('input');
  input.type='hidden';input.name='data';input.value=JSON.stringify(payload);
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);

  setTimeout(function(){
    area.innerHTML='<div class="sheets-status sent">✅ Resultados enviados para a planilha do professor.</div>';
    try{document.body.removeChild(iframe);}catch(e){}
  },3000);
}

// ━━ BEFOREUNLOAD ━━
window.addEventListener('beforeunload',function(e){
  if(APP.student&&APP.questions.length>0&&APP.current<APP.questions.length&&!APP.abandoned){
    e.preventDefault();e.returnValue='Você tem um quiz em andamento. Deseja sair?';
  }
});

// ━━ INICIAR ━━
showRegister();
</script>
