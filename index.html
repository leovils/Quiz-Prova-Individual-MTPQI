<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz MTPQI — Odin Dinho</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{--bg-dark:#0d1117;--bg-card:#161b22;--bg-panel:#1c2333;--odin-blue:#58a6ff;--thor-red:#f85149;--corvo-purple:#bc8cff;--gold:#f0c040;--silver:#8b949e;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--border:#30363d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-dark);color:var(--text);font-family:'Patrick Hand',cursive;font-size:18px;min-height:100vh;overflow-x:hidden}
#app{max-width:860px;margin:0 auto;padding:20px;min-height:100vh}

.quiz-header{text-align:center;padding:30px 20px 10px;animation:fadeIn 1s}
.quiz-header h1{font-family:'Bangers',cursive;font-size:2.6em;color:var(--gold);text-shadow:2px 2px 8px rgba(240,192,64,.3);line-height:1.1}
.quiz-header h2{font-family:'Permanent Marker',cursive;font-size:1.3em;color:var(--odin-blue);margin-top:6px}
.quiz-header .subtitle{color:var(--text-dim);font-size:1em;margin-top:12px}

.register-box{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;margin:24px auto;max-width:480px;animation:slideIn .5s}
.register-box h3{font-family:'Bangers',cursive;color:var(--gold);font-size:1.5em;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.95em;color:var(--text-dim);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:12px 14px;background:var(--bg-dark);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Patrick Hand',cursive;font-size:1em;transition:border-color .3s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--odin-blue)}
.form-group select option{background:var(--bg-dark);color:var(--text)}
.form-error{color:var(--thor-red);font-size:.85em;margin-top:4px;display:none}
.btn-primary{display:block;width:100%;margin-top:20px;background:linear-gradient(135deg,var(--odin-blue),var(--corvo-purple));border:none;color:#fff;font-family:'Bangers',cursive;font-size:1.3em;padding:14px;border-radius:10px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(88,166,255,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin:24px 0;animation:fadeIn .6s}
.theme-card{background:var(--bg-card);border:2px solid var(--border);border-radius:14px;padding:24px 20px;cursor:pointer;transition:all .3s;text-align:center;position:relative;overflow:hidden}
.theme-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 6px 24px rgba(240,192,64,.15)}
.theme-card .theme-icon{font-size:2.5em;margin-bottom:10px}
.theme-card .theme-title{font-family:'Bangers',cursive;font-size:1.3em;color:var(--gold);margin-bottom:6px}
.theme-card .theme-desc{font-size:.9em;color:var(--text-dim);line-height:1.4}
.theme-card .theme-badge{display:inline-block;margin-top:10px;background:var(--bg-panel);padding:4px 12px;border-radius:12px;font-size:.8em;color:var(--odin-blue)}

.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px}
.quiz-progress .qp-label{font-family:'Bangers',cursive;color:var(--gold);font-size:1em;white-space:nowrap}
.quiz-progress .qp-bar-bg{flex:1;height:12px;background:var(--bg-dark);border-radius:6px;overflow:hidden}
.quiz-progress .qp-bar-fill{height:100%;background:linear-gradient(90deg,var(--odin-blue),var(--gold));border-radius:6px;transition:width .4s}
.quiz-progress .qp-count{font-family:'Bangers',cursive;color:var(--text);font-size:1em;min-width:50px;text-align:right}

.timer-bar{height:6px;background:var(--bg-dark);border-radius:3px;overflow:hidden;margin-bottom:16px}
.timer-bar .timer-fill{height:100%;background:var(--success);border-radius:3px;transition:width .25s linear,background .3s}
.timer-bar .timer-fill.warning{background:var(--gold)}
.timer-bar .timer-fill.danger{background:var(--thor-red)}

.timer-display{text-align:center;font-family:'Bangers',cursive;font-size:1.4em;margin-bottom:10px;transition:color .3s}
.timer-display.warning{color:var(--gold)}
.timer-display.danger{color:var(--thor-red);animation:pulse .5s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.5}}

.question-card{background:var(--bg-panel);border:2px solid var(--gold);border-radius:12px;padding:24px;margin:16px 0;animation:slideIn .4s}
.question-card .q-number{font-family:'Bangers',cursive;font-size:1.2em;color:var(--gold);margin-bottom:8px}
.question-card .q-text{line-height:1.5;font-size:1.05em;margin-bottom:16px}
.question-card .q-difficulty{display:inline-block;padding:2px 10px;border-radius:8px;font-size:.75em;font-family:'Bangers',cursive;margin-bottom:12px}
.q-difficulty.easy{background:#0d2818;color:var(--success);border:1px solid var(--success)}
.q-difficulty.medium{background:#2a2000;color:var(--gold);border:1px solid var(--gold)}

.options-grid{display:flex;flex-direction:column;gap:10px}
.option-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Patrick Hand',cursive;font-size:1.05em;padding:14px 18px;border-radius:10px;cursor:pointer;text-align:left;transition:all .25s;line-height:1.4}
.option-btn:hover:not(.disabled):not(.correct):not(.wrong){border-color:var(--odin-blue);background:#1a2233}
.option-btn.correct{border-color:var(--success);background:#0d2818;color:var(--success)}
.option-btn.wrong{border-color:var(--thor-red);background:#2d1116;color:var(--thor-red)}
.option-btn.disabled{cursor:default;opacity:.7}
.option-btn.reveal-correct{border-color:var(--success);background:#0d2818;color:var(--success);opacity:1!important}

.feedback-box{border-radius:10px;padding:14px 18px;margin:14px 0;animation:fadeIn .4s;line-height:1.5;font-size:.95em}
.feedback-box.correct{background:#0d2818;border:1px solid var(--success);color:var(--success)}
.feedback-box.wrong{background:#2d1116;border:1px solid var(--thor-red);color:var(--thor-red)}
.feedback-box.timeout{background:#2a2000;border:1px solid var(--gold);color:var(--gold)}

.continue-btn{display:block;margin:16px auto 0;background:transparent;border:2px solid var(--odin-blue);color:var(--odin-blue);font-family:'Bangers',cursive;font-size:1.1em;padding:10px 32px;border-radius:10px;cursor:pointer;transition:all .25s}
.continue-btn:hover{background:var(--odin-blue);color:var(--bg-dark)}

.result-screen{text-align:center;padding:40px 20px;animation:fadeIn .8s}
.result-screen h2{font-family:'Bangers',cursive;font-size:2.2em;color:var(--gold);margin-bottom:8px}
.result-rank{font-family:'Permanent Marker',cursive;font-size:1.5em;margin:12px 0}
.result-stats{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px auto;text-align:left;max-width:400px}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}.stat-value{font-family:'Bangers',cursive;color:var(--odin-blue)}
.result-detail{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin:16px auto;max-width:600px;text-align:left}
.result-detail h4{font-family:'Bangers',cursive;color:var(--corvo-purple);margin-bottom:10px;font-size:1.1em}
.rd-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:.9em;line-height:1.4}
.rd-item:last-child{border-bottom:none}
.rd-item .rd-status{font-family:'Bangers',cursive;font-size:.85em}
.rd-correct{color:var(--success)}.rd-wrong{color:var(--thor-red)}.rd-timeout{color:var(--gold)}

.sheets-status{margin-top:16px;padding:12px;border-radius:8px;font-size:.9em}
.sheets-status.sending{background:var(--bg-panel);color:var(--text-dim);border:1px solid var(--border)}
.sheets-status.sent{background:#0d2818;color:var(--success);border:1px solid var(--success)}
.sheets-status.error{background:#2d1116;color:var(--thor-red);border:1px solid var(--thor-red)}

.btn-download{display:inline-block;margin:10px 6px;background:var(--bg-card);border:2px solid var(--success);color:var(--success);font-family:'Bangers',cursive;font-size:1.1em;padding:12px 28px;border-radius:10px;cursor:pointer;transition:all .25s;text-decoration:none}
.btn-download:hover{background:var(--success);color:var(--bg-dark)}
.btn-back{display:inline-block;margin-top:20px;background:transparent;border:2px solid var(--text-dim);color:var(--text-dim);font-family:'Bangers',cursive;font-size:1em;padding:10px 28px;border-radius:10px;cursor:pointer;transition:all .25s}
.btn-back:hover{border-color:var(--text);color:var(--text)}

.signature{text-align:center;color:var(--text-dim);font-size:.75em;margin-top:40px;padding-bottom:20px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .quiz-header h1{font-size:2em}
  .quiz-header h2{font-size:1.1em}
  #app{padding:12px}
  .theme-grid{grid-template-columns:1fr}
  .register-box{padding:20px 16px}
  .question-card{padding:16px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════════════════
// QUIZ MTPQI — Prof. Dr. Leonardo Vils · PPGA · UNINOVE · 2026
// ════════════════════════════════════════════════════════════════

// ━━ CONFIGURAÇÃO GOOGLE SHEETS ━━
// Cole aqui a URL do seu Google Apps Script (Web App)
// Veja o guia de configuração para criar o script
var GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxmzuYCp8tXBCGxjgJziSFPECxL3IUk7lIZgLHSNHn5OGRZsCscBbU9FxTfcISR_k_QQA/exec';

// ━━ ESTADO DO APP ━━
var APP = {
  student: null,
  theme: null,
  questions: [],
  current: 0,
  answers: [],
  timer: null,
  timeLeft: 30,
  abandoned: false
};

var $app = function(){ return document.getElementById('app'); };

// ━━ LETRAS DAS ALTERNATIVAS ━━
var LETTERS = ['a','b','c','d'];

// ━━ BANCO DE PERGUNTAS (60 total: 20 por tema) ━━
var QUESTION_BANK = {

"hipoteses": [
  {id:"h01",text:"Qual é a definição correta de hipótese nula (H₀)?",options:["A hipótese que o pesquisador deseja provar","A hipótese de que não existe efeito ou diferença na população","A hipótese alternativa formulada antes da coleta","A hipótese com maior probabilidade estatística"],answer:1,difficulty:"easy",
  explain_correct:"H₀ é a hipótese de ausência de efeito — o ponto de partida que tentamos rejeitar.",explain_wrong:"H₀ não é o que queremos provar — é o que testamos para tentar rejeitar."},

  {id:"h02",text:"O p-valor representa:",options:["A probabilidade de H₀ ser verdadeira","A probabilidade de H₁ ser verdadeira","A probabilidade de obter os dados observados (ou mais extremos) se H₀ for verdadeira","A probabilidade de cometer Erro Tipo II"],answer:2,difficulty:"easy",
  explain_correct:"O p-valor é P(dados | H₀ verdadeira) — a probabilidade dos dados sob a hipótese nula.",explain_wrong:"O p-valor NÃO é a probabilidade de H₀ ser verdadeira — essa é a falácia da probabilidade inversa."},

  {id:"h03",text:"Se α = 0,05 e p = 0,03, qual a decisão?",options:["Aceitar H₀","Rejeitar H₀","Não é possível decidir","Aumentar a amostra"],answer:1,difficulty:"easy",
  explain_correct:"Como p (0,03) < α (0,05), rejeitamos H₀.",explain_wrong:"Quando p < α, a evidência é suficiente para rejeitar H₀."},

  {id:"h04",text:"O Erro Tipo I ocorre quando:",options:["Não rejeitamos H₀ sendo ela falsa","Rejeitamos H₀ sendo ela verdadeira","Aceitamos H₁ corretamente","Aumentamos o tamanho da amostra"],answer:1,difficulty:"easy",
  explain_correct:"Erro Tipo I = rejeitar H₀ verdadeira — um falso positivo.",explain_wrong:"Erro Tipo I é o falso positivo: dizer que há efeito quando não há."},

  {id:"h05",text:"O Erro Tipo II ocorre quando:",options:["Rejeitamos H₀ sendo ela verdadeira","Não rejeitamos H₀ sendo ela falsa","Rejeitamos H₁ corretamente","O p-valor é exatamente 0,05"],answer:1,difficulty:"easy",
  explain_correct:"Erro Tipo II = não rejeitar H₀ falsa — um falso negativo.",explain_wrong:"Erro Tipo II é o falso negativo: deixar passar um efeito real."},

  {id:"h06",text:"O que significa 'significância estatística' ao nível de 5%?",options:["Há 5% de chance de H₀ ser verdadeira","Se H₀ for verdadeira, há no máximo 5% de chance de obter resultados tão extremos","O efeito tem importância prática de 5%","95% dos dados apoiam H₁"],answer:1,difficulty:"easy",
  explain_correct:"Significância a 5% define o limiar de rejeição — a taxa de falsos positivos tolerada.",explain_wrong:"Significância estatística não diz nada sobre importância prática ou a probabilidade de H₀."},

  {id:"h07",text:"Qual é o nível de significância (α) mais comum em ciências sociais?",options:["0,01","0,05","0,10","0,50"],answer:1,difficulty:"easy",
  explain_correct:"O α = 0,05 é a convenção mais usada, embora não seja mágico.",explain_wrong:"α = 0,05 é a convenção padrão — mas lembre que é arbitrário, não sagrado."},

  {id:"h08",text:"Em um teste bilateral, as regiões de rejeição estão:",options:["Apenas na cauda direita","Apenas na cauda esquerda","Nas duas caudas da distribuição","No centro da distribuição"],answer:2,difficulty:"easy",
  explain_correct:"Teste bilateral = rejeição nas duas caudas, α/2 em cada.",explain_wrong:"Bilateral significa que testamos desvios em ambas as direções."},

  {id:"h09",text:"O teste qui-quadrado de independência serve para:",options:["Comparar médias de dois grupos","Testar a associação entre duas variáveis categóricas","Calcular a correlação linear","Testar normalidade dos dados"],answer:1,difficulty:"easy",
  explain_correct:"Qui-quadrado testa se duas variáveis categóricas são independentes.",explain_wrong:"O qui-quadrado trabalha com frequências de variáveis categóricas, não com médias."},

  {id:"h10",text:"No qui-quadrado, os 'valores esperados' representam:",options:["Os valores observados na amostra","As frequências previstas se não houver associação entre as variáveis","A média aritmética das frequências","Os valores após a correção de Yates"],answer:1,difficulty:"easy",
  explain_correct:"Valores esperados = frequências teóricas sob a hipótese de independência.",explain_wrong:"Esperados são as frequências que observaríamos se as variáveis fossem independentes."},

  {id:"h11",text:"Um pesquisador obteve p = 0,048. Outro replicou o estudo e obteve p = 0,052. Qual interpretação é mais adequada?",options:["O primeiro provou o efeito; o segundo provou que não existe","Os dois resultados são essencialmente consistentes — ambos sugerem evidência fraca","O primeiro é significativo e o segundo não, portanto são contraditórios","O segundo precisa aumentar a amostra para 'consertar' o p"],answer:1,difficulty:"medium",
  explain_correct:"0,048 e 0,052 são praticamente idênticos — o limiar 0,05 é arbitrário. Cliff effect é pensar que 0,049 e 0,051 são fundamentalmente diferentes.",explain_wrong:"Tratar 0,048 e 0,052 como resultados opostos é o cliff effect — a linha de 0,05 é convencional, não mágica."},

  {id:"h12",text:"A 'falácia da probabilidade inversa' ocorre quando interpretamos o p-valor como:",options:["P(dados | H₀)","P(H₀ | dados)","P(Erro Tipo I)","P(rejeitar H₀)"],answer:1,difficulty:"medium",
  explain_correct:"A falácia é inverter: o p-valor é P(dados|H₀), não P(H₀|dados). Para a segunda, precisamos de Bayes.",explain_wrong:"P(H₀|dados) exigiria inferência bayesiana com priors — o p-valor não fornece isso."},

  {id:"h13",text:"Um p = 0,001 indica que:",options:["O efeito é grande e importante na prática","Os dados são muito improváveis sob H₀","H₀ é certamente falsa","A amostra é suficientemente grande"],answer:1,difficulty:"medium",
  explain_correct:"P pequeno = dados improváveis se H₀ for verdadeira. Não diz nada sobre tamanho do efeito ou importância prática.",explain_wrong:"p-valor pequeno não significa efeito grande — com N enorme, até efeitos triviais dão p pequeno."},

  {id:"h14",text:"Power (poder estatístico) é definido como:",options:["A probabilidade de rejeitar H₀ quando ela é verdadeira","A probabilidade de rejeitar H₀ quando ela é falsa","A probabilidade de não cometer Erro Tipo I","1 menos o p-valor"],answer:1,difficulty:"medium",
  explain_correct:"Poder = 1 − β = probabilidade de detectar um efeito real.",explain_wrong:"Poder é a capacidade de rejeitar H₀ falsa — de detectar efeitos que realmente existem."},

  {id:"h15",text:"Qual prática é considerada p-hacking?",options:["Definir hipóteses antes da coleta","Reportar effect sizes com intervalos de confiança","Remover outliers seletivamente até obter p < 0,05","Usar correção de Bonferroni"],answer:2,difficulty:"medium",
  explain_correct:"Remover dados seletivamente para 'achar' significância é p-hacking — inflaciona Erro Tipo I.",explain_wrong:"P-hacking envolve manipular análises até obter p < 0,05 — viola a lógica do NHST."},

  {id:"h16",text:"No qui-quadrado, se uma célula tem frequência esperada < 5, devemos:",options:["Ignorar e prosseguir normalmente","Considerar agrupar categorias ou usar teste exato de Fisher","Multiplicar a frequência observada por 2","Trocar para um teste t"],answer:1,difficulty:"medium",
  explain_correct:"Frequências esperadas < 5 violam pressupostos do χ². Agrupar categorias ou usar Fisher resolve.",explain_wrong:"Com esperadas < 5, a aproximação χ² fica imprecisa — agrupe categorias ou use Fisher."},

  {id:"h17",text:"Em um teste χ² com 3 linhas e 4 colunas, os graus de liberdade são:",options:["12","7","6","3"],answer:2,difficulty:"medium",
  explain_correct:"gl = (linhas − 1) × (colunas − 1) = 2 × 3 = 6.",explain_wrong:"A fórmula é (r−1)(c−1) = (3−1)(4−1) = 6."},

  {id:"h18",text:"A correção de Bonferroni para 4 comparações com α = 0,05 resulta em α corrigido de:",options:["0,05","0,20","0,0125","0,01"],answer:2,difficulty:"medium",
  explain_correct:"Bonferroni: α/k = 0,05/4 = 0,0125. Conservador, mas controla o erro familywise.",explain_wrong:"Bonferroni divide α pelo número de comparações: 0,05/4 = 0,0125."},

  {id:"h19",text:"Qual das alternativas descreve corretamente o que acontece quando aumentamos o tamanho amostral?",options:["O p-valor sempre aumenta","O poder estatístico diminui","Efeitos triviais podem se tornar 'significativos'","O Erro Tipo I aumenta proporcionalmente"],answer:2,difficulty:"medium",
  explain_correct:"Com N grande, até efeitos minúsculos geram p < 0,05 — por isso ES é essencial.",explain_wrong:"Amostras grandes detectam qualquer desvio de H₀, por menor que seja — daí a importância do tamanho de efeito."},

  {id:"h20",text:"'HARKing' (Hypothesizing After Results are Known) é problemático porque:",options:["Impede o uso de testes bilaterais","Transforma análises exploratórias em confirmatórias, inflando falsos positivos","Reduz o poder estatístico","Invalida o uso do qui-quadrado"],answer:1,difficulty:"medium",
  explain_correct:"HARKing = formular hipóteses depois de ver os dados e apresentá-las como a priori. Infla erro Tipo I.",explain_wrong:"HARKing disfarça exploração como confirmação — é uma QRP que infla falsos positivos."}
],

"testes_t": [
  {id:"t01",text:"O teste t independente compara:",options:["Médias do mesmo grupo em dois momentos","Médias de dois grupos diferentes","Proporções de duas populações","Variâncias de três grupos"],answer:1,difficulty:"easy",
  explain_correct:"Teste t independente compara médias de dois grupos distintos (between-subjects).",explain_wrong:"Independente = dois grupos separados. Para o mesmo grupo em dois momentos, use t pareado."},

  {id:"t02",text:"O teste t pareado (dependente) é usado quando:",options:["Os dois grupos são independentes","As mesmas pessoas são medidas em dois momentos ou condições","Temos mais de dois grupos","Os dados são categóricos"],answer:1,difficulty:"easy",
  explain_correct:"Pareado = mesmas pessoas em duas condições — pré/pós, antes/depois, etc.",explain_wrong:"Pareado significa que os dados estão vinculados — mesma pessoa, duas medições."},

  {id:"t03",text:"Qual pressuposto NÃO é do teste t independente?",options:["Distribuição normal dos dados (ou N grande)","Homogeneidade de variâncias","Independência das observações","Dados devem ser ordinais"],answer:3,difficulty:"easy",
  explain_correct:"O teste t trabalha com dados contínuos/intervalares, não ordinais.",explain_wrong:"O teste t exige normalidade, homogeneidade de variâncias e independência — não dados ordinais."},

  {id:"t04",text:"Se as variâncias dos dois grupos são significativamente diferentes, devemos usar:",options:["O teste t de Student padrão","A correção de Welch","O teste qui-quadrado","A ANOVA de um fator"],answer:1,difficulty:"easy",
  explain_correct:"Welch ajusta os graus de liberdade para variâncias desiguais — é mais robusto.",explain_wrong:"Com variâncias desiguais, Welch é preferível ao Student clássico."},

  {id:"t05",text:"O Cohen's d mede:",options:["A significância estatística","O tamanho do efeito em unidades de desvio padrão","Os graus de liberdade","A variância explicada"],answer:1,difficulty:"easy",
  explain_correct:"Cohen's d expressa a diferença entre médias em unidades de DP — é uma medida de tamanho de efeito.",explain_wrong:"d = diferença de médias / DP. Quanto maior o d, maior a separação entre os grupos."},

  {id:"t06",text:"Na convenção de Cohen, d = 0,80 é considerado um efeito:",options:["Pequeno","Médio","Grande","Negligenciável"],answer:2,difficulty:"easy",
  explain_correct:"Cohen: d ≈ 0,20 = pequeno, 0,50 = médio, 0,80 = grande.",explain_wrong:"Benchmarks de Cohen: 0,20 (pequeno), 0,50 (médio), 0,80 (grande)."},

  {id:"t07",text:"Qual a diferença principal entre Hedges' g e Cohen's d?",options:["Hedges' g usa a mediana","Hedges' g aplica correção para amostras pequenas","Hedges' g é para dados não-paramétricos","Não há diferença"],answer:1,difficulty:"easy",
  explain_correct:"Hedges' g corrige o viés de superestimação do d em amostras pequenas (fator J).",explain_wrong:"Hedges' g é Cohen's d com correção para amostras pequenas — preferível em muitos contextos."},

  {id:"t08",text:"O teste t produz um valor t. O que ele representa?",options:["A diferença bruta entre as médias","A razão entre a diferença observada e o erro padrão da diferença","A probabilidade de H₀","O tamanho do efeito"],answer:1,difficulty:"easy",
  explain_correct:"t = diferença / erro padrão da diferença. É uma razão sinal/ruído.",explain_wrong:"O t é a diferença observada relativizada pelo erro padrão — quanto mais longe de zero, mais improvável sob H₀."},

  {id:"t09",text:"TOST significa:",options:["Test of Statistical Truth","Two One-Sided Tests","Total Observation of Sample T-values","Threshold of Statistical Testing"],answer:1,difficulty:"easy",
  explain_correct:"TOST = Two One-Sided Tests — o procedimento para testar equivalência de médias.",explain_wrong:"TOST é Two One-Sided Tests: dois testes unilaterais para demonstrar equivalência."},

  {id:"t10",text:"O teste de equivalência (TOST) serve para demonstrar que:",options:["Dois grupos são significativamente diferentes","A diferença entre dois grupos é pequena o suficiente para ser irrelevante","O p-valor é maior que 0,05","As variâncias são iguais"],answer:1,difficulty:"easy",
  explain_correct:"TOST testa se a diferença está dentro de limites de equivalência (Δ) — ausência de efeito prático.",explain_wrong:"TOST inverte a lógica: a H₀ é 'os grupos são diferentes' e H₁ é 'são equivalentes'."},

  {id:"t11",text:"Em um teste t pareado, os graus de liberdade são:",options:["N − 1, onde N é o número de pares","N₁ + N₂ − 2","N − 2","2N − 1"],answer:0,difficulty:"medium",
  explain_correct:"No pareado, gl = N − 1, pois trabalhamos com as diferenças (um valor por par).",explain_wrong:"No teste t pareado, calculamos as diferenças d = X₁ − X₂ para cada par, então gl = N − 1."},

  {id:"t12",text:"Um pesquisador de Midgard obteve t(28) = 2,10, p = 0,045, d = 0,38. Como reportar em formato APA?",options:["t = 2,10 (significativo)","t(28) = 2.10, p = .045, d = 0.38","t(28) = 2.10, p < .05, d = 0.38, 95% CI [0.01, 0.75]","Apenas p < 0,05 é suficiente"],answer:2,difficulty:"medium",
  explain_correct:"Formato APA completo: estatística(gl) = valor, p = valor, ES com IC — o padrão ouro.",explain_wrong:"APA exige: estatística, gl, p exato, tamanho de efeito E intervalo de confiança do ES."},

  {id:"t13",text:"No TOST, os limites de equivalência (Δ) devem ser definidos:",options:["Depois de ver os resultados","Com base no que daria p < 0,05","A priori, com base no menor efeito de interesse prático","Sempre como ±0,5 desvio padrão"],answer:2,difficulty:"medium",
  explain_correct:"Δ deve ser definido a priori com base em relevância prática — nunca ajustado após ver os dados.",explain_wrong:"Os limites Δ são teóricos/práticos, definidos ANTES da análise — senão é p-hacking disfarçado."},

  {id:"t14",text:"Se o IC de 90% para a diferença entre grupos fica inteiramente dentro de [−Δ, +Δ], podemos concluir:",options:["Que há diferença significativa","Que há equivalência estatística","Que o teste t deu p < 0,05","Que a amostra é grande demais"],answer:1,difficulty:"medium",
  explain_correct:"IC 90% da diferença dentro dos limites Δ = equivalência (TOST usa α = 0,05 por teste, gerando IC 90%).",explain_wrong:"TOST com α = 0,05 gera IC de 90% para a diferença — se cabe em [−Δ, +Δ], declara equivalência."},

  {id:"t15",text:"Um ferreiro testou a dureza de espadas forjadas por dois métodos. Obteve: Grupo A (M=85, DP=10, n=15), Grupo B (M=90, DP=12, n=15). O Cohen's d aproximado é:",options:["d ≈ 0,50","d ≈ 0,45","d ≈ 5,00","d ≈ 0,05"],answer:1,difficulty:"medium",
  explain_correct:"d = (90−85) / DP_pooled ≈ 5/11,05 ≈ 0,45. Efeito entre pequeno e médio.",explain_wrong:"d = diferença / DP_pooled. DP_pooled ≈ √((10² + 12²)/2) ≈ 11,05. d ≈ 5/11,05 ≈ 0,45."},

  {id:"t16",text:"O poder de 0,80 (80%) significa que:",options:["Há 80% de chance de H₀ ser verdadeira","Se o efeito real existir, detectaremos em 80% das vezes","20% das observações são outliers","O α corrigido é 0,80"],answer:1,difficulty:"medium",
  explain_correct:"Poder = 80% → em 100 estudos com efeito real, 80 rejeitariam H₀. Os outros 20 seriam Erros Tipo II.",explain_wrong:"Poder = P(rejeitar H₀ | H₀ falsa). 80% é o patamar mínimo recomendado."},

  {id:"t17",text:"Qual situação justifica um teste unilateral em vez de bilateral?",options:["Quando o pesquisador quer p menor","Quando há teoria forte prevendo a direção do efeito, definida a priori","Quando a amostra é pequena","Sempre que se usa teste t"],answer:1,difficulty:"medium",
  explain_correct:"Unilateral só se justifica com previsão direcional teórica a priori — nunca para 'facilitar' a rejeição.",explain_wrong:"Teste unilateral exige justificativa teórica sólida para a direção — senão é manipulação."},

  {id:"t18",text:"Ao comparar o peso de barris de hidromel antes e depois de fermentação (mesmo barril), qual teste usar?",options:["Teste t independente","Teste t pareado","Qui-quadrado","ANOVA de um fator"],answer:1,difficulty:"medium",
  explain_correct:"Mesmo barril medido em dois momentos = dados pareados → teste t pareado.",explain_wrong:"As medidas são vinculadas (mesmo barril, antes/depois) = dentro-sujeitos = pareado."},

  {id:"t19",text:"No TOST, se o p-valor do teste superior é 0,02 e do teste inferior é 0,06 (α = 0,05), a conclusão é:",options:["Equivalência demonstrada","Equivalência NÃO demonstrada — ambos precisam ser significativos","Inconclusivo — calcular mais testes","Demonstrada parcialmente"],answer:1,difficulty:"medium",
  explain_correct:"No TOST, AMBOS os testes unilaterais precisam rejeitar. Se um falha (0,06 > 0,05), não há equivalência.",explain_wrong:"TOST exige que os DOIS p-valores sejam < α. Basta um falhar para não declarar equivalência."},

  {id:"t20",text:"A vantagem do IC sobre o p-valor no contexto do teste t é que o IC:",options:["Sempre rejeita H₀","Fornece a direção, magnitude e precisão da estimativa","E mais fácil de calcular","Não precisa de pressupostos"],answer:1,difficulty:"medium",
  explain_correct:"O IC mostra o quê (magnitude), para onde (direção) e com quanta certeza (largura) — muito mais informativo que p sozinho.",explain_wrong:"IC é mais informativo: mostra a faixa plausível de valores, não apenas 'sim/não' como o p-valor."}
],

"anova": [
  {id:"a01",text:"A ANOVA de um fator é usada para comparar:",options:["Dois grupos com dados pareados","Médias de três ou mais grupos independentes","Proporções entre categorias","Duas variáveis contínuas"],answer:1,difficulty:"easy",
  explain_correct:"ANOVA one-way compara médias de 3+ grupos independentes usando a razão F.",explain_wrong:"Para 3+ grupos independentes, use ANOVA — múltiplos testes t inflariam o Erro Tipo I."},

  {id:"a02",text:"O que a Razão F compara na ANOVA?",options:["Médias dos grupos diretamente","Variância entre grupos vs. variância dentro dos grupos","Desvios padrão de cada grupo","Frequências observadas vs. esperadas"],answer:1,difficulty:"easy",
  explain_correct:"F = variância entre grupos (sinal) / variância dentro dos grupos (ruído).",explain_wrong:"F compara sinal (entre) vs. ruído (dentro). F grande = grupos diferem mais do que o acaso explicaria."},

  {id:"a03",text:"Se F é grande e significativo, podemos concluir que:",options:["Todos os grupos diferem entre si","Pelo menos um par de grupos tem médias diferentes","O primeiro grupo é o melhor","A variância dentro dos grupos é zero"],answer:1,difficulty:"easy",
  explain_correct:"F significativo = 'há diferença em algum lugar' — mas não diz ONDE. Precisamos de post-hoc.",explain_wrong:"ANOVA diz que há diferença, mas não identifica quais pares — para isso, use testes post-hoc."},

  {id:"a04",text:"Testes post-hoc (ex: Tukey, Bonferroni) servem para:",options:["Verificar normalidade","Identificar QUAIS pares de grupos diferem após ANOVA significativa","Calcular o tamanho amostral","Substituir a ANOVA"],answer:1,difficulty:"easy",
  explain_correct:"Post-hoc localizam as diferenças específicas após F significativo, com correção de α.",explain_wrong:"Após ANOVA significativa, post-hoc identifica quais pares diferem, controlando o erro familywise."},

  {id:"a05",text:"Na ANOVA de um fator com k=4 grupos e N=40 total, os gl do numerador e denominador são:",options:["gl = 4 e 40","gl = 3 e 36","gl = 3 e 37","gl = 4 e 36"],answer:1,difficulty:"easy",
  explain_correct:"gl_modelo = k−1 = 3, gl_resíduo = N−k = 36.",explain_wrong:"gl numerador = k−1 = 4−1 = 3. gl denominador = N−k = 40−4 = 36."},

  {id:"a06",text:"Qual pressuposto NÃO é da ANOVA?",options:["Normalidade dos resíduos","Homogeneidade de variâncias (homocedasticidade)","Independência das observações","Os dados devem ser dicotômicos"],answer:3,difficulty:"easy",
  explain_correct:"ANOVA exige dados contínuos, não dicotômicos. Normalidade, homocedasticidade e independência são os 3 pressupostos.",explain_wrong:"ANOVA trabalha com variáveis contínuas — dados dicotômicos pedem qui-quadrado ou regressão logística."},

  {id:"a07",text:"O ω² (ômega quadrado) é preferido a η² porque:",options:["É mais fácil de calcular","É menos enviesado — corrige a superestimação do η²","Sempre dá valores maiores","Não precisa de graus de liberdade"],answer:1,difficulty:"easy",
  explain_correct:"η² superestima o efeito na população. ω² aplica correção e é menos enviesado.",explain_wrong:"η² tende a inflar o efeito. ω² corrige isso — é uma estimativa mais honesta do efeito populacional."},

  {id:"a08",text:"ANOVA de medidas repetidas é usada quando:",options:["Cada grupo tem participantes diferentes","Os mesmos participantes são medidos em todas as condições","Temos apenas dois grupos","Os dados são categóricos"],answer:1,difficulty:"easy",
  explain_correct:"Medidas repetidas = mesmos sujeitos em todas as condições — design within-subjects.",explain_wrong:"Medidas repetidas = cada pessoa participa de TODAS as condições — reduz variabilidade inter-sujeitos."},

  {id:"a09",text:"O pressuposto de esfericidade na ANOVA de medidas repetidas se refere a:",options:["Os dados serem esféricos no espaço multivariado","A igualdade das variâncias das diferenças entre todos os pares de condições","A normalidade multivariada","A independência dos resíduos"],answer:1,difficulty:"easy",
  explain_correct:"Esfericidade = as variâncias de todas as diferenças pareadas são iguais. Teste de Mauchly verifica isso.",explain_wrong:"Esfericidade exige que σ²(A−B) = σ²(A−C) = σ²(B−C) para todas as combinações de condições."},

  {id:"a10",text:"Quando a esfericidade é violada, a correção mais usada é:",options:["Bonferroni","Greenhouse-Geisser","Welch","Fisher's LSD"],answer:1,difficulty:"easy",
  explain_correct:"Greenhouse-Geisser (ε) corrige os gl, tornando o teste F mais conservador quando esfericidade é violada.",explain_wrong:"Greenhouse-Geisser ajusta os gl para baixo, compensando a violação de esfericidade."},

  {id:"a11",text:"No Salão de Banquetes, 5 chefs (k=5) servem pratos a 50 degustadores (N=50). F(4,45) = 3,82, p = 0,009, ω² = 0,18. Como interpretar ω²?",options:["18% da variância nas notas é explicada pelas diferenças entre chefs","O efeito é negligenciável","ω² = 0,18 é pequeno pela convenção de Cohen","O poder do teste é 18%"],answer:0,difficulty:"medium",
  explain_correct:"ω² = 0,18 → 18% da variância é explicada pelo fator (chef). Pela convenção: 0,01=pequeno, 0,06=médio, 0,14=grande — logo, efeito grande.",explain_wrong:"ω² é a proporção de variância explicada. 0,18 > 0,14 = efeito grande pela convenção de Cohen/Kirk."},

  {id:"a12",text:"O teste de Levene é usado para verificar:",options:["Normalidade","Homogeneidade de variâncias entre grupos","Esfericidade","Independência"],answer:1,difficulty:"medium",
  explain_correct:"Levene testa se as variâncias dos grupos são iguais — pressuposto da ANOVA.",explain_wrong:"Levene testa homocedasticidade. Se significativo, as variâncias são desiguais → considere Welch ANOVA."},

  {id:"a13",text:"Na ANOVA de medidas repetidas com 4 condições e 20 sujeitos, os gl do efeito são:",options:["gl = 4","gl = 3","gl = 19","gl = 57"],answer:1,difficulty:"medium",
  explain_correct:"gl_efeito = k−1 = 4−1 = 3. gl_erro = (k−1)(n−1) = 3×19 = 57.",explain_wrong:"Para medidas repetidas: gl_efeito = k−1, gl_erro = (k−1)(n−1)."},

  {id:"a14",text:"Welch ANOVA é preferível à ANOVA clássica quando:",options:["Os tamanhos amostrais são iguais","As variâncias dos grupos são desiguais","Há mais de 10 grupos","Os dados são pareados"],answer:1,difficulty:"medium",
  explain_correct:"Welch ANOVA não assume variâncias iguais — mais robusta com heterocedasticidade.",explain_wrong:"Quando Levene é significativo (variâncias desiguais), Welch ANOVA é a alternativa robusta."},

  {id:"a15",text:"Qual teste post-hoc é mais conservador?",options:["Fisher's LSD","Tukey's HSD","Bonferroni","Games-Howell"],answer:2,difficulty:"medium",
  explain_correct:"Bonferroni é o mais conservador — divide α por k comparações. Tukey é equilibrado. LSD é o mais liberal.",explain_wrong:"Do mais liberal ao mais conservador: LSD → Tukey → Bonferroni. Games-Howell é para variâncias desiguais."},

  {id:"a16",text:"Epsilon de Greenhouse-Geisser (ε) varia entre:",options:["0 e 1","1/(k−1) e 1","−1 e 1","0 e infinito"],answer:1,difficulty:"medium",
  explain_correct:"ε varia de 1/(k−1) (violação máxima) a 1 (esfericidade perfeita). Multiplica os gl.",explain_wrong:"ε_GG ∈ [1/(k−1), 1]. Quando ε = 1, esfericidade é perfeita e nenhuma correção é necessária."},

  {id:"a17",text:"Um Jarl comparou 3 aldeias (n=20 cada) na produção de trigo. ANOVA deu F(2,57) = 0,85, p = 0,43. A conclusão é:",options:["Há diferença significativa entre aldeias","Não há evidência de diferença entre as aldeias","Devemos fazer post-hoc para descobrir qual é diferente","O teste está errado"],answer:1,difficulty:"medium",
  explain_correct:"p = 0,43 > 0,05 → não rejeitamos H₀. Não há evidência de diferença significativa entre aldeias.",explain_wrong:"F não significativo → não há evidência para rejeitar H₀. Isso NÃO prova que são iguais — apenas que não detectamos diferença."},

  {id:"a18",text:"Na ANOVA de medidas repetidas, a vantagem sobre a ANOVA independente é:",options:["Sempre dá resultados significativos","Remove a variabilidade entre sujeitos, aumentando o poder","Não precisa de pressupostos","Funciona com qualquer tipo de dado"],answer:1,difficulty:"medium",
  explain_correct:"Medidas repetidas elimina variação entre sujeitos do erro → SSR menor → F maior → mais poder.",explain_wrong:"Como cada pessoa é seu próprio controle, a variabilidade entre sujeitos é removida do denominador de F."},

  {id:"a19",text:"Se Mauchly's W = 0,62, p = 0,01, e ε_GG = 0,74, como reportar o F corrigido com gl originais (3, 57)?",options:["F(3, 57) sem correção","F(2.22, 42.18) com gl corrigidos por Greenhouse-Geisser","F(0.74, 0.74) usando ε diretamente","Não é possível reportar"],answer:1,difficulty:"medium",
  explain_correct:"Mauchly significativo → esfericidade violada. gl corrigidos = gl × ε: 3×0,74 = 2,22 e 57×0,74 = 42,18.",explain_wrong:"Com esfericidade violada, multiplicamos os gl por ε_GG: 3×0,74=2,22 e 57×0,74=42,18."},

  {id:"a20",text:"Planned contrasts (contrastes planejados) diferem de post-hoc porque:",options:["São mais conservadores","São definidos a priori com base em hipóteses teóricas","Sempre dão p < 0,05","Não precisam de ANOVA significativa"],answer:1,difficulty:"medium",
  explain_correct:"Contrastes planejados são a priori e testam hipóteses específicas — mais poderosos e não exigem F significativo.",explain_wrong:"Contrastes planejados: hipótese teórica prévia → mais poder, menos penalidade. Post-hoc: exploratório → correção de α."}
]
};

function submitRegister(){
  var name=document.getElementById('reg-name').value.trim();
  var ra=document.getElementById('reg-ra').value.trim();
  var course=document.getElementById('reg-course').value;
  var email=document.getElementById('reg-email').value.trim();
  var valid=true;
  ['name','ra','course','email'].forEach(function(f){document.getElementById('err-'+f).style.display='none';});
  if(!name){document.getElementById('err-name').style.display='block';valid=false;}
  if(!ra){document.getElementById('err-ra').style.display='block';valid=false;}
  if(!course){document.getElementById('err-course').style.display='block';valid=false;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){document.getElementById('err-email').style.display='block';valid=false;}
  if(!valid)return;
  APP.student={name:name,ra:ra,course:course,email:email};
  showThemes();
}

function showThemes(){
  var cards=THEMES.map(function(t){
    return '<div class="theme-card" onclick="selectTheme(\''+t.id+'\')">' +
      '<div class="theme-icon">'+t.icon+'</div>' +
      '<div class="theme-title">'+t.title+'</div>' +
      '<div class="theme-desc">'+t.desc+'</div>' +
      '<div class="theme-badge">'+t.badge+'</div>' +
    '</div>';
  }).join('');
  $app().innerHTML = '<div class="quiz-header"><h1>Quiz MTPQI</h1>' +
    '<h2>Bem-vindo(a), '+APP.student.name.split(' ')[0]+'!</h2>' +
    '<p class="subtitle">Escolha um tema para iniciar. Serão sorteadas 10 perguntas — 30 segundos cada.</p></div>' +
    '<div class="theme-grid">'+cards+'</div>' +
    '<div class="signature">Prof. Dr. Leonardo Vils · PPGA · UNINOVE · MTPQI · 2026</div>';
}

function selectTheme(themeId){
  var bank=QUESTION_BANK[themeId];
  if(!bank)return;
  APP.theme=THEMES.find(function(t){return t.id===themeId;});
  APP.answers=[];APP.current=0;APP.abandoned=false;
  var easy=bank.filter(function(q){return q.difficulty==='easy';});
  var medium=bank.filter(function(q){return q.difficulty==='medium';});
  easy=shuffle(easy).slice(0,5);medium=shuffle(medium).slice(0,5);
  APP.questions=shuffle(easy.concat(medium));
  renderQuestion();
}

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}

// ━━ QUIZ ENGINE ━━
function renderQuestion(){
  if(APP.current>=APP.questions.length){showResults(false);return;}
  var q=APP.questions[APP.current];
  var pct=Math.round((APP.current/APP.questions.length)*100);
  var diffLabel=q.difficulty==='easy'?'Fácil':'Média';
  var optionsHTML=q.options.map(function(opt,idx){
    return '<button class="option-btn" onclick="answerQuestion('+idx+')">'+LETTERS[idx]+') '+opt+'</button>';
  }).join('');
  $app().innerHTML =
    '<div class="quiz-progress"><div class="qp-label">⚔️ Questão '+(APP.current+1)+'/'+APP.questions.length+'</div><div class="qp-bar-bg"><div class="qp-bar-fill" style="width:'+pct+'%"></div></div><div class="qp-count">'+APP.theme.title.split(' ')[0]+'</div></div>' +
    '<div class="timer-display" id="timer-text">⏱️ 30s</div>' +
    '<div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>' +
    '<div class="question-card"><div class="q-number">Desafio '+(APP.current+1)+' <span class="q-difficulty '+q.difficulty+'">'+diffLabel+'</span></div><div class="q-text">'+q.text+'</div><div class="options-grid" id="options-area">'+optionsHTML+'</div><div id="feedback-area"></div></div>' +
    '<div style="text-align:center;margin-top:12px"><button class="btn-back" onclick="abandonQuiz()">🚪 Sair do Quiz</button></div>';
  APP.timeLeft=30;startTimer();
}

function startTimer(){
  clearInterval(APP.timer);
  APP.timer=setInterval(function(){
    APP.timeLeft--;
    var pct=(APP.timeLeft/30)*100;
    var fill=document.getElementById('timer-fill');var text=document.getElementById('timer-text');
    if(!fill||!text){clearInterval(APP.timer);return;}
    fill.style.width=pct+'%';text.textContent='⏱️ '+APP.timeLeft+'s';
    if(APP.timeLeft<=5){fill.className='timer-fill danger';text.className='timer-display danger';}
    else if(APP.timeLeft<=10){fill.className='timer-fill warning';text.className='timer-display warning';}
    if(APP.timeLeft<=0){clearInterval(APP.timer);timeoutQuestion();}
  },1000);
}

function answerQuestion(idx){
  clearInterval(APP.timer);
  var q=APP.questions[APP.current];
  var isCorrect=(idx===q.answer);
  APP.answers.push({qIndex:APP.current,question:q.text,selected:idx,selectedLetter:LETTERS[idx],selectedText:q.options[idx],correct:q.answer,correctLetter:LETTERS[q.answer],correctText:q.options[q.answer],isCorrect:isCorrect,timedOut:false});
  var btns=document.querySelectorAll('#options-area .option-btn');
  btns.forEach(function(b,i){b.classList.add('disabled');b.onclick=null;if(i===q.answer)b.classList.add('correct');if(i===idx&&!isCorrect)b.classList.add('wrong');});
  var fb=document.getElementById('feedback-area');
  if(isCorrect){fb.innerHTML='<div class="feedback-box correct">✅ '+q.explain_correct+'</div>';}
  else{fb.innerHTML='<div class="feedback-box wrong">❌ '+q.explain_wrong+'</div>';}
  fb.innerHTML+='<button class="continue-btn" onclick="nextQuestion()">Próxima ➡</button>';
}

function timeoutQuestion(){
  var q=APP.questions[APP.current];
  APP.answers.push({qIndex:APP.current,question:q.text,selected:-1,selectedLetter:'-',selectedText:'(Tempo esgotado)',correct:q.answer,correctLetter:LETTERS[q.answer],correctText:q.options[q.answer],isCorrect:false,timedOut:true});
  var btns=document.querySelectorAll('#options-area .option-btn');
  btns.forEach(function(b,i){b.classList.add('disabled');b.onclick=null;if(i===q.answer)b.classList.add('reveal-correct');});
  var fb=document.getElementById('feedback-area');
  fb.innerHTML='<div class="feedback-box timeout">⏱️ Tempo esgotado! A resposta correta era: <strong>'+LETTERS[q.answer]+') '+q.options[q.answer]+'</strong></div>';
  fb.innerHTML+='<button class="continue-btn" onclick="nextQuestion()">Próxima ➡</button>';
}

function nextQuestion(){APP.current++;renderQuestion();}

function abandonQuiz(){
  if(!confirm('Tem certeza que deseja sair? Suas respostas até agora serão registradas.'))return;
  clearInterval(APP.timer);APP.abandoned=true;showResults(true);
}

// ━━ RESULTADOS ━━
function showResults(wasAbandoned){
  clearInterval(APP.timer);
  var hits=APP.answers.filter(function(a){return a.isCorrect;}).length;
  var total=APP.answers.length;
  var totalQ=APP.questions.length;
  var pct=total>0?Math.round((hits/total)*100):0;
  var rank,rankColor;
  if(pct>=90){rank='⚔️ Guerreiro Supremo';rankColor='var(--gold)';}
  else if(pct>=70){rank='🛡️ Protetor de Valhalla';rankColor='var(--odin-blue)';}
  else if(pct>=50){rank='📜 Aprendiz Esforçado';rankColor='var(--text-dim)';}
  else{rank='💀 Precisa Treinar Mais';rankColor='var(--thor-red)';}

  var detailHTML=APP.answers.map(function(a,i){
    var statusClass=a.timedOut?'rd-timeout':(a.isCorrect?'rd-correct':'rd-wrong');
    var statusText=a.timedOut?'⏱️ Tempo':(a.isCorrect?'✅ Correto':'❌ Errado');
    return '<div class="rd-item"><strong>Q'+(i+1)+':</strong> '+a.question.substring(0,80)+'...<br><span class="rd-status '+statusClass+'">'+statusText+'</span>'+
      ' · Marcou: <em>'+a.selectedLetter+') '+a.selectedText.substring(0,50)+'</em>'+
      (!a.isCorrect?' · Correta: <em style="color:var(--success)">'+a.correctLetter+') '+a.correctText.substring(0,50)+'</em>':'')+
      '</div>';
  }).join('');

  var statusMsg=wasAbandoned?'<div style="color:var(--gold);font-family:Bangers,cursive;font-size:1.2em;margin:12px 0">⚠️ Quiz abandonado — '+total+' de '+totalQ+' questões respondidas</div>':'';

  $app().innerHTML =
    '<div class="result-screen"><h2>Resultado do Quiz</h2>'+statusMsg+
    '<div class="result-rank" style="color:'+rankColor+'">'+rank+'</div>' +
    '<div class="result-stats">' +
      '<div class="stat-row"><span class="stat-label">Tema</span><span class="stat-value">'+APP.theme.title+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">Aluno</span><span class="stat-value">'+APP.student.name+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">RA</span><span class="stat-value">'+APP.student.ra+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">Acertos</span><span class="stat-value" style="color:var(--success)">'+hits+' / '+total+'</span></div>' +
      '<div class="stat-row"><span class="stat-label">Percentual</span><span class="stat-value">'+pct+'%</span></div>' +
      '<div class="stat-row"><span class="stat-label">Tempo esgotado</span><span class="stat-value" style="color:var(--gold)">'+APP.answers.filter(function(a){return a.timedOut;}).length+'</span></div>' +
    '</div>' +
    '<div class="result-detail"><h4>🐦 Detalhamento das Respostas</h4>'+detailHTML+'</div>' +
    '<div style="margin-top:20px"><button class="btn-download" onclick="downloadResults()">⬇️ Baixar Minhas Respostas</button></div>' +
    '<div id="sheets-status-area"></div>' +
    '<button class="btn-back" onclick="showThemes()" style="margin-top:20px">Voltar aos Temas</button>' +
    '</div><div class="signature">Prof. Dr. Leonardo Vils · PPGA · UNINOVE · MTPQI · 2026</div>';

  sendToSheets(wasAbandoned,hits,total,pct);
}

// ━━ DOWNLOAD DE RESULTADOS ━━
function downloadResults(){
  var hits=APP.answers.filter(function(a){return a.isCorrect;}).length;
  var total=APP.answers.length;
  var pct=total>0?Math.round((hits/total)*100):0;
  var now=new Date();
  var lines=[];
  lines.push('QUIZ MTPQI — Resultado Individual');
  lines.push('========================================');
  lines.push('Data: '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR'));
  lines.push('Aluno: '+APP.student.name);
  lines.push('RA: '+APP.student.ra);
  lines.push('Programa: '+APP.student.course);
  lines.push('Email: '+APP.student.email);
  lines.push('Tema: '+APP.theme.title);
  lines.push('Acertos: '+hits+' / '+total+' ('+pct+'%)');
  lines.push('Status: '+(APP.abandoned?'Abandonado':'Completo'));
  lines.push('========================================');
  lines.push('');
  APP.answers.forEach(function(a,i){
    var st=a.timedOut?'[TEMPO ESGOTADO]':(a.isCorrect?'[CORRETO]':'[ERRADO]');
    lines.push('Q'+(i+1)+' '+st);
    lines.push('  Pergunta: '+a.question);
    lines.push('  Resposta marcada: '+a.selectedLetter+') '+a.selectedText);
    lines.push('  Resposta correta: '+a.correctLetter+') '+a.correctText);
    lines.push('');
  });
  lines.push('========================================');
  lines.push('Prof. Dr. Leonardo Vils · PPGA · UNINOVE · MTPQI · 2026');

  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='Quiz_MTPQI_'+APP.student.ra+'_'+APP.theme.id+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ━━ ENVIO PARA GOOGLE SHEETS (via formulário oculto — bypass CORS) ━━
function sendToSheets(wasAbandoned,hits,total,pct){
  var area=document.getElementById('sheets-status-area');
  if(!area)return;

  if(GOOGLE_SHEETS_URL==='COLE_SUA_URL_DO_APPS_SCRIPT_AQUI'){
    area.innerHTML='<div class="sheets-status error">⚠️ Google Sheets não configurado. Os resultados estão disponíveis para download acima.</div>';
    return;
  }

  area.innerHTML='<div class="sheets-status sending">📨 Enviando resultados para a planilha do professor...</div>';

  // Buscar IP do aluno e depois enviar tudo
  fetch('https://api.ipify.org?format=json').then(function(r){return r.json();}).then(function(ipData){
    submitToSheets(ipData.ip,wasAbandoned,hits,total,pct,area);
  }).catch(function(){
    submitToSheets('N/A',wasAbandoned,hits,total,pct,area);
  });
}

function submitToSheets(ip,wasAbandoned,hits,total,pct,area){
  var now=new Date();
  var payload={
    timestamp: now.toISOString(),
    nome: APP.student.name,
    ra: APP.student.ra,
    programa: APP.student.course,
    email: APP.student.email,
    tema: APP.theme.title,
    status: wasAbandoned?'Abandonado':'Completo',
    acertos: hits,
    total: total,
    percentual: pct,
    ip: ip,
    questoes: APP.answers.map(function(a,i){
      return {
        numero: i+1,
        enunciado: a.question,
        letra_marcada: a.selectedLetter,
        resposta_marcada: a.selectedText,
        letra_correta: a.correctLetter,
        resposta_correta: a.correctText,
        resultado: a.timedOut?'Tempo esgotado':(a.isCorrect?'Correto':'Errado')
      };
    })
  };

  // Iframe oculto para receber o POST sem navegar
  var iframeName='sheets-iframe-'+Date.now();
  var iframe=document.createElement('iframe');
  iframe.name=iframeName;iframe.style.display='none';
  document.body.appendChild(iframe);

  // Formulário oculto — sem restrição de CORS
  var form=document.createElement('form');
  form.method='POST';form.action=GOOGLE_SHEETS_URL;form.target=iframeName;
  var input=document.createElement('input');
  input.type='hidden';input.name='data';input.value=JSON.stringify(payload);
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);

  // Feedback após breve espera (form submit não retorna promise)
  setTimeout(function(){
    area.innerHTML='<div class="sheets-status sent">✅ Resultados enviados para a planilha do professor.</div>';
    try{document.body.removeChild(iframe);}catch(e){}
  },3000);
}

// ━━ BEFOREUNLOAD ━━
window.addEventListener('beforeunload',function(e){
  if(APP.student&&APP.questions.length>0&&APP.current<APP.questions.length&&!APP.abandoned){
    e.preventDefault();e.returnValue='Você tem um quiz em andamento. Deseja sair?';
  }
});

// ━━ INICIAR ━━
showRegister();
</script>
