<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz MTPQI — Odin Dinho</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{--bg-dark:#0d1117;--bg-card:#161b22;--bg-panel:#1c2333;--odin-blue:#58a6ff;--thor-red:#f85149;--corvo-purple:#bc8cff;--gold:#f0c040;--silver:#8b949e;--text:#e6edf3;--text-dim:#8b949e;--success:#3fb950;--border:#30363d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-dark);color:var(--text);font-family:'Patrick Hand',cursive;font-size:18px;min-height:100vh;overflow-x:hidden}
#app{max-width:860px;margin:0 auto;padding:20px;min-height:100vh}

.quiz-header{text-align:center;padding:30px 20px 10px;animation:fadeIn 1s}
.quiz-header h1{font-family:'Bangers',cursive;font-size:2.6em;color:var(--gold);text-shadow:2px 2px 8px rgba(240,192,64,.3);line-height:1.1}
.quiz-header h2{font-family:'Permanent Marker',cursive;font-size:1.3em;color:var(--odin-blue);margin-top:6px}
.quiz-header .subtitle{color:var(--text-dim);font-size:1em;margin-top:12px}

.register-box{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;margin:24px auto;max-width:480px;animation:slideIn .5s}
.register-box h3{font-family:'Bangers',cursive;color:var(--gold);font-size:1.5em;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.95em;color:var(--text-dim);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:12px 14px;background:var(--bg-dark);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Patrick Hand',cursive;font-size:1em;transition:border-color .3s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--odin-blue)}
.form-group select option{background:var(--bg-dark);color:var(--text)}
.form-error{color:var(--thor-red);font-size:.85em;margin-top:4px;display:none}
.btn-primary{display:block;width:100%;margin-top:20px;background:linear-gradient(135deg,var(--odin-blue),var(--corvo-purple));border:none;color:#fff;font-family:'Bangers',cursive;font-size:1.3em;padding:14px;border-radius:10px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(88,166,255,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.theme-section-title{font-family:'Bangers',cursive;font-size:1.3em;color:var(--corvo-purple);margin:24px 0 8px;padding-left:4px;border-left:3px solid var(--corvo-purple);padding-left:12px}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:0 0 20px 0;animation:fadeIn .6s}
.theme-card{background:var(--bg-card);border:2px solid var(--border);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .3s;text-align:center;position:relative;overflow:hidden}
.theme-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 6px 24px rgba(240,192,64,.15)}
.theme-card .theme-icon{font-size:2.2em;margin-bottom:8px}
.theme-card .theme-title{font-family:'Bangers',cursive;font-size:1.1em;color:var(--gold);margin-bottom:4px;line-height:1.2}
.theme-card .theme-desc{font-size:.8em;color:var(--text-dim);line-height:1.3}
.theme-card .theme-badge{display:inline-block;margin-top:8px;background:var(--bg-panel);padding:3px 10px;border-radius:12px;font-size:.72em;color:var(--odin-blue)}

.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px}
.quiz-progress .qp-label{font-family:'Bangers',cursive;color:var(--gold);font-size:1em;white-space:nowrap}
.quiz-progress .qp-bar-bg{flex:1;height:12px;background:var(--bg-dark);border-radius:6px;overflow:hidden}
.quiz-progress .qp-bar-fill{height:100%;background:linear-gradient(90deg,var(--odin-blue),var(--gold));border-radius:6px;transition:width .4s}
.quiz-progress .qp-count{font-family:'Bangers',cursive;color:var(--text);font-size:1em;min-width:50px;text-align:right}

.timer-bar{height:6px;background:var(--bg-dark);border-radius:3px;overflow:hidden;margin-bottom:16px}
.timer-bar .timer-fill{height:100%;background:var(--success);border-radius:3px;transition:width .25s linear,background .3s}
.timer-bar .timer-fill.warning{background:var(--gold)}
.timer-bar .timer-fill.danger{background:var(--thor-red)}

.timer-display{text-align:center;font-family:'Bangers',cursive;font-size:1.4em;margin-bottom:10px;transition:color .3s}
.timer-display.warning{color:var(--gold)}
.timer-display.danger{color:var(--thor-red);animation:pulse .5s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.5}}

.question-card{background:var(--bg-panel);border:2px solid var(--gold);border-radius:12px;padding:24px;margin:16px 0;animation:slideIn .4s}
.question-card .q-number{font-family:'Bangers',cursive;font-size:1.2em;color:var(--gold);margin-bottom:8px}
.question-card .q-text{line-height:1.5;font-size:1.05em;margin-bottom:16px}
.question-card .q-difficulty{display:inline-block;padding:2px 10px;border-radius:8px;font-size:.75em;font-family:'Bangers',cursive;margin-bottom:12px}
.q-difficulty.easy{background:#0d2818;color:var(--success);border:1px solid var(--success)}
.q-difficulty.medium{background:#2a2000;color:var(--gold);border:1px solid var(--gold)}

.options-grid{display:flex;flex-direction:column;gap:10px}
.option-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-family:'Patrick Hand',cursive;font-size:1.05em;padding:14px 18px;border-radius:10px;cursor:pointer;text-align:left;transition:all .25s;line-height:1.4}
.option-btn:hover:not(.disabled):not(.correct):not(.wrong){border-color:var(--odin-blue);background:#1a2233}
.option-btn.correct{border-color:var(--success);background:#0d2818;color:var(--success)}
.option-btn.wrong{border-color:var(--thor-red);background:#2d1116;color:var(--thor-red)}
.option-btn.disabled{cursor:default;opacity:.7}
.option-btn.reveal-correct{border-color:var(--success);background:#0d2818;color:var(--success);opacity:1!important}

.feedback-box{border-radius:10px;padding:14px 18px;margin:14px 0;animation:fadeIn .4s;line-height:1.5;font-size:.95em}
.feedback-box.correct{background:#0d2818;border:1px solid var(--success);color:var(--success)}
.feedback-box.wrong{background:#2d1116;border:1px solid var(--thor-red);color:var(--thor-red)}
.feedback-box.timeout{background:#2a2000;border:1px solid var(--gold);color:var(--gold)}

.continue-btn{display:block;margin:16px auto 0;background:transparent;border:2px solid var(--odin-blue);color:var(--odin-blue);font-family:'Bangers',cursive;font-size:1.1em;padding:10px 32px;border-radius:10px;cursor:pointer;transition:all .25s}
.continue-btn:hover{background:var(--odin-blue);color:var(--bg-dark)}

.result-screen{text-align:center;padding:40px 20px;animation:fadeIn .8s}
.result-screen h2{font-family:'Bangers',cursive;font-size:2.2em;color:var(--gold);margin-bottom:8px}
.result-rank{font-family:'Permanent Marker',cursive;font-size:1.5em;margin:12px 0}
.result-stats{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px auto;text-align:left;max-width:400px}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}.stat-value{font-family:'Bangers',cursive;color:var(--odin-blue)}
.result-detail{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin:16px auto;max-width:600px;text-align:left}
.result-detail h4{font-family:'Bangers',cursive;color:var(--corvo-purple);margin-bottom:10px;font-size:1.1em}
.rd-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:.9em;line-height:1.4}
.rd-item:last-child{border-bottom:none}
.rd-item .rd-status{font-family:'Bangers',cursive;font-size:.85em}
.rd-correct{color:var(--success)}.rd-wrong{color:var(--thor-red)}.rd-timeout{color:var(--gold)}

.sheets-status{margin-top:16px;padding:12px;border-radius:8px;font-size:.9em}
.sheets-status.sending{background:var(--bg-panel);color:var(--text-dim);border:1px solid var(--border)}
.sheets-status.sent{background:#0d2818;color:var(--success);border:1px solid var(--success)}
.sheets-status.error{background:#2d1116;color:var(--thor-red);border:1px solid var(--thor-red)}

.btn-download{display:inline-block;margin:10px 6px;background:var(--bg-card);border:2px solid var(--success);color:var(--success);font-family:'Bangers',cursive;font-size:1.1em;padding:12px 28px;border-radius:10px;cursor:pointer;transition:all .25s;text-decoration:none}
.btn-download:hover{background:var(--success);color:var(--bg-dark)}
.btn-back{display:inline-block;margin-top:20px;background:transparent;border:2px solid var(--text-dim);color:var(--text-dim);font-family:'Bangers',cursive;font-size:1em;padding:10px 28px;border-radius:10px;cursor:pointer;transition:all .25s}
.btn-back:hover{border-color:var(--text);color:var(--text)}

.signature{text-align:center;color:var(--text-dim);font-size:.75em;margin-top:40px;padding-bottom:20px}

.realm-count{text-align:center;font-family:'Bangers',cursive;color:var(--text-dim);font-size:.95em;margin-bottom:8px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .quiz-header h1{font-size:2em}
  .quiz-header h2{font-size:1.1em}
  #app{padding:12px}
  .theme-grid{grid-template-columns:1fr}
  .register-box{padding:20px 16px}
  .question-card{padding:16px}
}
</style>
</head>

<div id="app"></div>
<script>
// ════════════════════════════════════════════════════════════════
// QUIZ MTPQI — Prof. Dr. Leonardo Vils · PPGA · UNINOVE · 2026
// 14 Reinos · 280 Questões · 50% Fácil · 50% Médio
// ════════════════════════════════════════════════════════════════

// ━━ CONFIGURAÇÃO GOOGLE SHEETS ━━
var GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxmzuYCp8tXBCGxjgJziSFPECxL3IUk7lIZgLHSNHn5OGRZsCscBbU9FxTfcISR_k_QQA/exec';

// ━━ ESTADO DO APP ━━
var APP = {
  student: null,
  theme: null,
  questions: [],
  current: 0,
  answers: [],
  timer: null,
  timeLeft: 30,
  abandoned: false
};

var $app = function(){ return document.getElementById('app'); };
var LETTERS = ['a','b','c','d'];

// ━━ BANCO DE PERGUNTAS (280 total: 20 por reino) ━━
var QUESTION_BANK = {

"reino1": [
{id:"r1q01",text:"Odin Dinho quer contar quantos guerreiros de cada clã sobreviveram à batalha. Que tipo de pesquisa ele está conduzindo?",options:["Qualitativa exploratória","Quantitativa descritiva","Qualitativa etnográfica","Estudo de caso"],answer:1,difficulty:"easy",explain_correct:"Contar frequências e descrever numericamente um fenômeno é pesquisa quantitativa descritiva.",explain_wrong:"Pesquisa qualitativa busca significados e interpretações profundas, não contagens numéricas."},
{id:"r1q02",text:"Um jarl quer saber se o tipo de treinamento (com espada ou com machado) afeta o número de vitórias em combate. Qual é a variável dependente?",options:["Tipo de treinamento","Número de vitórias","Idade do guerreiro","Clã de origem"],answer:1,difficulty:"easy",explain_correct:"A variável dependente (VD) é o resultado que se mede — neste caso, o número de vitórias que se espera ser afetado pelo treinamento.",explain_wrong:"O tipo de treinamento é a variável independente (VI), pois é a condição manipulada pelo pesquisador."},
{id:"r1q03",text:"Muninn sussurra: 'Quando classificamos os guerreiros em leves, médios e pesados pela armadura, que escala de medida usamos?'",options:["Nominal","Ordinal","Intervalar","Razão"],answer:1,difficulty:"easy",explain_correct:"A escala ordinal estabelece uma ordem ou hierarquia entre as categorias (leve < médio < pesado), mas sem intervalos iguais entre elas.",explain_wrong:"A escala nominal não tem ordem; escalas intervalar e razão exigem intervalos iguais entre valores."},
{id:"r1q04",text:"Em qual escala de medida se enquadra o peso (em quilos) dos sacos de ouro saqueados pelos vikings?",options:["Nominal","Ordinal","Intervalar","Razão"],answer:3,difficulty:"easy",explain_correct:"Peso em quilos é escala razão: tem zero absoluto (zero quilos = ausência de peso) e permite todas as operações matemáticas.",explain_wrong:"Escala intervalar não tem zero absoluto (como temperatura em Celsius). Peso possui zero verdadeiro."},
{id:"r1q05",text:"Huginn provoca: 'Se o jarl simplesmente observa os guerreiros sem manipular nenhuma condição, que tipo de delineamento é esse?'",options:["Experimental","Quasi-experimental","Não-experimental (survey/observacional)","Pré-experimental"],answer:2,difficulty:"easy",explain_correct:"Sem manipulação de variáveis, temos um delineamento não-experimental — apenas observação e mensuração do que já ocorre.",explain_wrong:"Delineamentos experimentais e quasi-experimentais envolvem algum grau de manipulação da variável independente."},
{id:"r1q06",text:"A hipótese 'Guerreiros treinados com escudo têm mais sobrevivência do que guerreiros sem escudo' é de qual tipo?",options:["Hipótese nula","Hipótese direcional (unilateral)","Hipótese não-direcional (bilateral)","Hipótese estatística descritiva"],answer:1,difficulty:"easy",explain_correct:"A hipótese especifica a direção do efeito ('mais sobrevivência'), o que a torna direcional ou unilateral.",explain_wrong:"Hipótese não-direcional apenas afirma que há diferença, sem especificar qual grupo é superior."},
{id:"r1q07",text:"Odin Dinho pergunta a todos os 200 habitantes de uma aldeia viking sobre suas preferências alimentares. Isso é:",options:["Amostragem aleatória","Amostragem estratificada","Censo","Amostragem por conveniência"],answer:2,difficulty:"easy",explain_correct:"Quando se consulta toda a população (todos os 200 habitantes), temos um censo, não uma amostragem.",explain_wrong:"Amostragem envolve selecionar parte da população; censo é a coleta com todos os membros."},
{id:"r1q08",text:"A confiabilidade de um instrumento de pesquisa refere-se a:",options:["Medir o que se propõe a medir","Produzir resultados consistentes em medições repetidas","Poder generalizar resultados para outras populações","Ausência de viés do pesquisador"],answer:1,difficulty:"easy",explain_correct:"Confiabilidade é a consistência dos resultados: se o instrumento é aplicado várias vezes, produz resultados semelhantes.",explain_wrong:"Medir o que se propõe é validade, não confiabilidade. Um instrumento pode ser confiável sem ser válido."},
{id:"r1q09",text:"A variável 'região de origem' dos guerreiros (Midgard, Asgard, Alfheim) está em qual escala?",options:["Nominal","Ordinal","Intervalar","Razão"],answer:0,difficulty:"easy",explain_correct:"Região de origem é categórica sem ordem natural entre as categorias — escala nominal.",explain_wrong:"Não há hierarquia entre regiões; ordinal exige uma ordenação lógica."},
{id:"r1q10",text:"Operacionalizar um construto significa:",options:["Criar uma teoria sobre o fenômeno","Definir como o construto será medido de forma concreta","Aumentar a amostra para maior poder estatístico","Garantir que o estudo pode ser replicado"],answer:1,difficulty:"easy",explain_correct:"Operacionalização é traduzir um conceito abstrato (como 'bravura') em indicadores mensuráveis (ex.: número de batalhas enfrentadas).",explain_wrong:"Criar teoria é etapa conceitual. Operacionalização é a ponte entre conceito abstrato e medição prática."},
{id:"r1q11",text:"Um ferreiro de Midgard testa se a temperatura da forja (alta vs. baixa) afeta a resistência das espadas, mas não consegue designar aleatoriamente quais espadas vão para cada forno — cada aprendiz escolhe o seu. Que delineamento é esse?",options:["Experimental puro","Quasi-experimental","Survey descritivo","Estudo de caso"],answer:1,difficulty:"medium",explain_correct:"Há manipulação da VI (temperatura), mas sem designação aleatória dos participantes às condições — isso define um quasi-experimento.",explain_wrong:"Experimento puro exige manipulação E designação aleatória. Sem randomização, perde-se o controle sobre variáveis estranhas."},
{id:"r1q12",text:"ThorMento quer provar que guerreiros mais altos vencem mais batalhas. Ele mede apenas guerreiros altos que venceram e ignora os que perderam. Que ameaça à validade isso representa?",options:["Ameaça à validade externa por amostra restrita","Viés de seleção (ameaça à validade interna)","Erro tipo I","Baixa confiabilidade do instrumento"],answer:1,difficulty:"medium",explain_correct:"Selecionar participantes com base no resultado que se quer encontrar é viés de seleção — grave ameaça à validade interna.",explain_wrong:"Validade externa refere-se à generalização; aqui o problema é a lógica causal interna do estudo estar comprometida."},
{id:"r1q13",text:"Um pesquisador mede 'habilidade de combate' usando: (1) número de vitórias, (2) avaliação do mestre-de-armas, (3) tempo de reação. Ele busca evidência de validade de:",options:["Conteúdo","Critério preditivo","Construto (convergente)","Face"],answer:2,difficulty:"medium",explain_correct:"Usar múltiplos indicadores que convergem para medir o mesmo construto é evidência de validade convergente (tipo de validade de construto).",explain_wrong:"Validade de conteúdo avalia se os itens cobrem o domínio teórico. Aqui, o foco é na convergência entre medidas distintas."},
{id:"r1q14",text:"Muninn lembra: 'Se a temperatura em Celsius é escala intervalar, por que a temperatura em Kelvin é escala razão?' A resposta é:",options:["Kelvin usa números maiores","Kelvin tem intervalos desiguais","Kelvin possui zero absoluto verdadeiro","Kelvin é mais preciso que Celsius"],answer:2,difficulty:"medium",explain_correct:"A escala Kelvin tem zero absoluto (0K = ausência total de energia térmica), permitindo afirmações como '200K é o dobro de 100K'.",explain_wrong:"Ambas têm intervalos iguais. A diferença crucial é a existência de um zero absoluto que permite proporções."},
{id:"r1q15",text:"Odin Dinho conduz um experimento: aldeias são aleatoriamente designadas para receber novo tipo de arado (grupo experimental) ou manter o antigo (controle). Após a colheita, compara a produção. Qual ameaça à validade interna é MAIS provável?",options:["Efeito de maturação","Difusão do tratamento entre aldeias vizinhas","Efeito de teto no instrumento","Desejabilidade social"],answer:1,difficulty:"medium",explain_correct:"Aldeias vizinhas podem compartilhar o novo arado, contaminando o grupo controle — isso é difusão do tratamento.",explain_wrong:"Maturação é mudança natural ao longo do tempo; aqui o risco principal é a contaminação entre grupos próximos geograficamente."},
{id:"r1q16",text:"Um jarl mede a 'lealdade' dos guerreiros por uma escala Likert de 5 pontos (1 = nada leal a 5 = extremamente leal). Essa variável é tipicamente tratada como:",options:["Nominal","Ordinal (com debate sobre intervalar)","Razão","Dicotômica"],answer:1,difficulty:"medium",explain_correct:"Escalas Likert são originalmente ordinais, mas há intenso debate na literatura sobre tratá-las como intervalares quando compostas em scores somados.",explain_wrong:"Não é razão porque não existe zero absoluto de lealdade; não é nominal porque há ordem entre os pontos."},
{id:"r1q17",text:"Se uma variável 'experiência do guerreiro' explica parte da relação entre 'tipo de arma' e 'sucesso em batalha' sem ser manipulada, ela atua como:",options:["Variável independente","Variável mediadora","Variável moderadora","Variável de controle"],answer:3,difficulty:"medium",explain_correct:"Uma variável de controle é incluída para isolar o efeito da VI sobre a VD, removendo explicações alternativas — aqui, experiência é controlada.",explain_wrong:"Mediadora transmite o efeito (VI → mediadora → VD). Moderadora altera a força/direção do efeito. Controle é eliminada estatisticamente."},
{id:"r1q18",text:"Huginn questiona: 'Se o pesquisador treina os guerreiros do grupo experimental com mais entusiasmo que os do controle, que ameaça à validade é essa?'",options:["Instrumentação","Viés do experimentador (efeito Rosenthal)","Regressão à média","Mortalidade experimental"],answer:1,difficulty:"medium",explain_correct:"Quando o pesquisador trata os grupos de forma diferente (além da VI), suas expectativas influenciam os resultados — efeito Rosenthal.",explain_wrong:"Instrumentação é mudança no instrumento de medida. Aqui o problema é o comportamento diferencial do experimentador."},
{id:"r1q19",text:"Uma pesquisa com mercadores de 9 reinos usa a mesma escala traduzida para cada idioma. Para verificar se a escala funciona igualmente em todos os reinos, o pesquisador deve avaliar:",options:["Confiabilidade teste-reteste","Validade de critério concorrente","Equivalência transcultural (invariância de medida)","Validade preditiva"],answer:2,difficulty:"medium",explain_correct:"Verificar se um instrumento mede o mesmo construto da mesma forma em culturas diferentes é invariância de medida ou equivalência transcultural.",explain_wrong:"Teste-reteste avalia estabilidade temporal, não equivalência entre grupos culturais distintos."},
{id:"r1q20",text:"ThorMento fez uma pesquisa com 15 guerreiros voluntários que apareceram na taverna. Os resultados mostraram que 'todos os vikings preferem machado'. Qual é a principal limitação?",options:["Tamanho amostral pequeno, mas representativo","Amostragem por conveniência com viés de autosseleção","Erro tipo II","Falta de grupo controle"],answer:1,difficulty:"medium",explain_correct:"Guerreiros que frequentam a taverna não representam todos os vikings — é amostra por conveniência com viés de autosseleção, limitando a generalização.",explain_wrong:"O problema não é apenas o tamanho da amostra, mas sim que os participantes não foram selecionados aleatoriamente da população."}
],

"reino2": [
{id:"r2q01",text:"O ferreiro registrou o peso de 5 espadas: 2, 3, 3, 4, 8 kg. Qual é a mediana?",options:["3","4","3,5","8"],answer:0,difficulty:"easy",explain_correct:"Com 5 valores ordenados (2, 3, 3, 4, 8), a mediana é o valor central — o 3º valor = 3.",explain_wrong:"A média seria 4, mas a mediana é o valor que divide a distribuição ao meio, não a média aritmética."},
{id:"r2q02",text:"Na aldeia viking, 12 famílias têm 2 cabras, 8 famílias têm 3 cabras e 5 famílias têm 7 cabras. Qual é a moda?",options:["2","3","5","7"],answer:0,difficulty:"easy",explain_correct:"A moda é o valor mais frequente. 12 famílias têm 2 cabras — maior frequência — logo a moda é 2.",explain_wrong:"Não confunda a frequência (12 famílias) com o valor (2 cabras). A moda é o valor que mais aparece, não a contagem."},
{id:"r2q03",text:"Odin Dinho explica que o desvio padrão mede:",options:["O valor mais comum da distribuição","A dispersão média dos dados em relação à média","A diferença entre o maior e o menor valor","A posição central dos dados"],answer:1,difficulty:"easy",explain_correct:"O desvio padrão quantifica, em média, o quanto cada observação se afasta da média — é a principal medida de dispersão.",explain_wrong:"A amplitude (maior - menor) é outra medida de dispersão, mas muito sensível a outliers. O DP considera todos os dados."},
{id:"r2q04",text:"Qual medida de tendência central é MAIS afetada por outliers?",options:["Moda","Mediana","Média","Nenhuma é afetada"],answer:2,difficulty:"easy",explain_correct:"A média é puxada na direção de valores extremos porque usa todos os valores no cálculo. Um saque de 10.000 moedas distorce a média.",explain_wrong:"A mediana e a moda são resistentes a outliers — a mediana depende apenas da posição central, não dos valores extremos."},
{id:"r2q05",text:"Muninn sussurra: 'O box plot mostra 5 informações-chave.' Quais são?",options:["Média, moda, variância, DP, amplitude","Mínimo, Q1, mediana, Q3, máximo","Frequência absoluta, relativa, acumulada, percentual, total","Média, mediana, moda, assimetria, curtose"],answer:1,difficulty:"easy",explain_correct:"O box plot exibe os cinco números de Tukey: valor mínimo, primeiro quartil (Q1), mediana (Q2), terceiro quartil (Q3) e valor máximo.",explain_wrong:"O box plot não mostra média nem moda diretamente; sua estrutura é baseada em quartis e valores extremos."},
{id:"r2q06",text:"Se a distribuição de saques de ouro tem assimetria positiva (à direita), então:",options:["A média é menor que a mediana","A média é igual à mediana","A média é maior que a mediana","A moda é maior que a média"],answer:2,difficulty:"easy",explain_correct:"Na assimetria positiva, a cauda se estende para a direita, puxando a média para valores maiores que a mediana.",explain_wrong:"Na assimetria negativa (à esquerda) é que a média seria menor que a mediana. Positiva = cauda à direita = média > mediana."},
{id:"r2q07",text:"A variância é calculada como:",options:["A soma dos desvios em relação à média","A média dos desvios ao quadrado em relação à média","A raiz quadrada do desvio padrão","O quadrado da amplitude"],answer:1,difficulty:"easy",explain_correct:"A variância é a média (ou quase-média, com n−1) dos desvios ao quadrado — elevamos ao quadrado para eliminar sinais negativos.",explain_wrong:"A soma dos desvios simples em relação à média sempre resulta em zero, por isso se usa o quadrado."},
{id:"r2q08",text:"O IQR (Intervalo Interquartil) é definido como:",options:["Máximo − Mínimo","Q3 − Q1","Média ± 1 desvio padrão","Mediana − Moda"],answer:1,difficulty:"easy",explain_correct:"O IQR = Q3 − Q1, representando a faixa onde estão os 50% centrais dos dados. É resistente a outliers.",explain_wrong:"Máximo − Mínimo é a amplitude total, muito sensível a extremos. O IQR foca nos quartis centrais."},
{id:"r2q09",text:"ThorMento diz: 'Tanto faz usar média ou mediana!' Em qual situação ele estaria CORRETO?",options:["Quando há muitos outliers","Quando a distribuição é simétrica","Quando os dados são nominais","Quando o desvio padrão é muito grande"],answer:1,difficulty:"easy",explain_correct:"Em distribuições simétricas, média e mediana coincidem ou ficam muito próximas — nesse caso, tanto faz usar uma ou outra.",explain_wrong:"Com outliers, a média é distorcida e a mediana é preferível. Em dados nominais, só se usa moda."},
{id:"r2q10",text:"Na regra empírica (68-95-99,7), aproximadamente 95% dos dados de uma distribuição normal estão dentro de:",options:["1 desvio padrão da média","2 desvios padrão da média","3 desvios padrão da média","0,5 desvio padrão da média"],answer:1,difficulty:"easy",explain_correct:"A regra empírica diz que ~68% estão a ±1 DP, ~95% a ±2 DP e ~99,7% a ±3 DP da média.",explain_wrong:"±1 DP cobre ~68%, não 95%. É preciso ir até ±2 DP para cobrir aproximadamente 95% dos dados."},
{id:"r2q11",text:"O jarl de Birka coletou a renda mensal (em moedas de ouro) de 200 famílias. A média foi 50 e a mediana 32. O que isso indica sobre a distribuição?",options:["Distribuição simétrica","Assimetria negativa (à esquerda)","Assimetria positiva (à direita)","Distribuição bimodal"],answer:2,difficulty:"medium",explain_correct:"Média (50) > mediana (32) indica que valores altos puxam a média para a direita — assimetria positiva. Comum em dados de renda.",explain_wrong:"Se fosse assimetria negativa, a média seria menor que a mediana. A distância entre elas indica a intensidade da assimetria."},
{id:"r2q12",text:"Dois clãs têm mesma produção média de hidromel (100 litros). Clã A tem DP = 5 e Clã B tem DP = 25. O coeficiente de variação (CV) do Clã B é:",options:["5%","10%","25%","50%"],answer:2,difficulty:"medium",explain_correct:"CV = (DP / Média) × 100 = (25/100) × 100 = 25%. O Clã B tem variabilidade relativa cinco vezes maior que o Clã A (5%).",explain_wrong:"O CV permite comparar variabilidade entre grupos com médias iguais ou diferentes, expressando o DP como percentual da média."},
{id:"r2q13",text:"Huginn provoca: 'Uma distribuição com curtose muito alta (leptocúrtica) comparada à normal significa que...'",options:["Os dados estão mais espalhados nas caudas e no pico","Os dados estão uniformemente distribuídos","Não há outliers","A média é igual à mediana"],answer:0,difficulty:"medium",explain_correct:"Distribuição leptocúrtica tem pico mais acentuado E caudas mais pesadas — mais dados extremos e mais dados concentrados no centro.",explain_wrong:"Leptocúrtica não significa ausência de outliers; pelo contrário, indica caudas mais pesadas com mais valores extremos."},
{id:"r2q14",text:"Odin Dinho tem dados de tempo de forja de espadas: 10, 12, 11, 13, 12, 11, 60 minutos. Qual medida de tendência central é MAIS adequada para reportar?",options:["Média (18,4 min)","Mediana (12 min)","Moda (11 e 12 min)","Amplitude (50 min)"],answer:1,difficulty:"medium",explain_correct:"O valor 60 é um outlier extremo que infla a média para 18,4. A mediana (12) representa melhor o centro típico dos dados.",explain_wrong:"A média de 18,4 min não representa nenhuma espada típica — é um artefato do outlier. Amplitude não é medida de tendência central."},
{id:"r2q15",text:"Em um box plot, um valor é considerado outlier quando está além de:",options:["1 DP da média","1,5 × IQR abaixo de Q1 ou acima de Q3","2 DP da média","Acima do Q3 ou abaixo do Q1"],answer:1,difficulty:"medium",explain_correct:"A regra clássica do box plot define outliers como valores abaixo de Q1 − 1,5×IQR ou acima de Q3 + 1,5×IQR.",explain_wrong:"Simplesmente estar fora do IQR não basta — precisa ultrapassar 1,5 vezes o IQR além dos quartis."},
{id:"r2q16",text:"A produção de grãos em 4 aldeias: A=100(DP=10), B=500(DP=50), C=200(DP=30), D=50(DP=15). Qual aldeia tem MAIOR variabilidade relativa?",options:["Aldeia A (CV=10%)","Aldeia B (CV=10%)","Aldeia C (CV=15%)","Aldeia D (CV=30%)"],answer:3,difficulty:"medium",explain_correct:"CV da Aldeia D = 15/50 × 100 = 30%. É a maior variabilidade relativa, apesar de ter o menor DP absoluto.",explain_wrong:"DP absoluto pode enganar quando as médias são muito diferentes. O CV padroniza a comparação pela média de cada grupo."},
{id:"r2q17",text:"Muninn lembra: 'Se adicionarmos 10 moedas de bônus a cada guerreiro, o que acontece com a média e o desvio padrão?'",options:["Ambos aumentam em 10","A média aumenta 10; o DP não muda","Ambos não mudam","A média não muda; o DP aumenta 10"],answer:1,difficulty:"medium",explain_correct:"Somar uma constante a todos os dados desloca a média pelo mesmo valor, mas não altera a dispersão — o DP permanece idêntico.",explain_wrong:"A dispersão mede espalhamento relativo entre os dados. Se todos ganham o mesmo bônus, as distâncias entre eles não mudam."},
{id:"r2q18",text:"Uma distribuição de notas de combate tem assimetria = 0 e curtose = 3 (excesso = 0). Isso significa que a distribuição é:",options:["Leptocúrtica e assimétrica","Platicúrtica e simétrica","Mesocúrtica e simétrica (similar à normal)","Bimodal e assimétrica"],answer:2,difficulty:"medium",explain_correct:"Assimetria = 0 indica simetria. Curtose = 3 (excesso de curtose = 0) é o padrão da normal — mesocúrtica.",explain_wrong:"Curtose > 3 seria leptocúrtica; < 3 seria platicúrtica. Excesso de curtose = 0 é exatamente a distribuição normal."},
{id:"r2q19",text:"ThorMento calculou que a média de uma aldeia é 100 e o DP é 0. Isso é possível? O que significaria?",options:["É impossível — DP nunca é zero","É possível — significa que todos os valores são iguais a 100","É possível — significa que a amostra tem apenas 1 observação","É possível — significa que houve erro de cálculo"],answer:1,difficulty:"medium",explain_correct:"DP = 0 significa zero dispersão: todos os valores são exatamente iguais. Se todos produzem 100, não há variação.",explain_wrong:"DP = 0 é matematicamente possível e válido; indica homogeneidade total dos dados."},
{id:"r2q20",text:"Huginn insiste: 'Se multiplicarmos todos os dados por 2, o que acontece com a média e com a variância?'",options:["Média dobra; variância dobra","Média dobra; variância quadruplica","Ambas dobram","Ambas quadruplicam"],answer:1,difficulty:"medium",explain_correct:"Multiplicar por constante k: nova média = k × média (dobra). Nova variância = k² × variância (quadruplica, pois 2² = 4).",explain_wrong:"A variância usa o quadrado dos desvios, então ao multiplicar por 2, cada desvio dobra e o quadrado quadruplica."}
],

"reino3": [
{id:"r3q01",text:"Ao lançar um dado rúnico de 6 faces, qual a probabilidade de obter a face com o símbolo de Odin (1 face entre 6)?",options:["1/2","1/3","1/6","1/12"],answer:2,difficulty:"easy",explain_correct:"Com 6 faces equiprováveis, a probabilidade de uma face específica é 1/6 ≈ 16,7%.",explain_wrong:"Cada face tem a mesma chance. Não é 1/2 (isso seria uma moeda) nem 1/3."},
{id:"r3q02",text:"Dois eventos são mutuamente excludentes quando:",options:["A ocorrência de um não afeta a probabilidade do outro","Ambos podem acontecer ao mesmo tempo","A ocorrência de um impede a ocorrência do outro","Têm a mesma probabilidade"],answer:2,difficulty:"easy",explain_correct:"Eventos mutuamente excludentes não podem ocorrer simultaneamente — se um guerreiro está vivo, não pode estar morto ao mesmo tempo.",explain_wrong:"Eventos independentes são aqueles cuja ocorrência de um não afeta a probabilidade do outro — conceito diferente de mutuamente excludentes."},
{id:"r3q03",text:"Na distribuição normal, a curva é:",options:["Assimétrica à direita","Simétrica em torno da média","Sempre bimodal","Uniforme"],answer:1,difficulty:"easy",explain_correct:"A distribuição normal é perfeitamente simétrica em torno da média, com formato de sino — média = mediana = moda.",explain_wrong:"Distribuição uniforme tem todos os valores com mesma probabilidade. Normal tem o pico no centro e caudas decrescentes."},
{id:"r3q04",text:"Um z-score de +2 significa que o valor observado está:",options:["2 desvios padrão acima da média","2 desvios padrão abaixo da média","Na média da distribuição","2 vezes a média"],answer:0,difficulty:"easy",explain_correct:"O z-score indica quantos desvios padrão um valor está acima (+) ou abaixo (−) da média. Z = +2 → 2 DP acima.",explain_wrong:"Z negativo indica abaixo da média. Z = 0 significa estar exatamente na média."},
{id:"r3q05",text:"Muninn sussurra: 'O espaço amostral de lançar uma moeda viking duas vezes é...'",options:["{cara, coroa}","{CC, CK, KC, KK}","{cara, coroa, empate}","{2 caras, 2 coroas}"],answer:1,difficulty:"easy",explain_correct:"Dois lançamentos produzem 4 resultados possíveis: CC, CK, KC, KK — cada combinação é um ponto do espaço amostral.",explain_wrong:"{cara, coroa} é o espaço amostral de um único lançamento, não de dois."},
{id:"r3q06",text:"A probabilidade de um evento impossível é:",options:["0","0,5","1","−1"],answer:0,difficulty:"easy",explain_correct:"Evento impossível tem probabilidade 0. Evento certo tem probabilidade 1. Probabilidades estão sempre entre 0 e 1.",explain_wrong:"Probabilidade 0,5 indica evento com 50% de chance. Probabilidades negativas não existem."},
{id:"r3q07",text:"Se P(A) = 0,3 e P(B) = 0,4, e A e B são mutuamente excludentes, então P(A ou B) é:",options:["0,12","0,70","0,58","0,10"],answer:1,difficulty:"easy",explain_correct:"Para eventos mutuamente excludentes: P(A ou B) = P(A) + P(B) = 0,3 + 0,4 = 0,7.",explain_wrong:"0,12 seria P(A) × P(B), que é a regra da multiplicação para eventos independentes, não a regra da adição."},
{id:"r3q08",text:"O Teorema Central do Limite afirma que, com amostras suficientemente grandes:",options:["A população se torna normal","A média amostral se distribui normalmente, independente da forma da população","Todos os outliers desaparecem","A variância se torna zero"],answer:1,difficulty:"easy",explain_correct:"O TCL garante que a distribuição das médias amostrais tende à normalidade conforme n aumenta, mesmo que a população original não seja normal.",explain_wrong:"A população não muda de forma — é a distribuição amostral das médias que se torna normal."},
{id:"r3q09",text:"A distribuição binomial é usada quando:",options:["A variável é contínua","Cada tentativa tem exatamente dois resultados possíveis e probabilidade constante","Queremos modelar o tempo entre eventos","A média e a variância são iguais"],answer:1,difficulty:"easy",explain_correct:"Binomial: n tentativas independentes, cada uma com sucesso/fracasso, probabilidade constante p. Ex.: 10 flechas, acerta ou erra.",explain_wrong:"Variáveis contínuas usam distribuição normal ou outras contínuas. Binomial é para contagem de sucessos em tentativas discretas."},
{id:"r3q10",text:"A área total sob a curva de qualquer distribuição de probabilidade é igual a:",options:["0","0,5","1","Depende da distribuição"],answer:2,difficulty:"easy",explain_correct:"A área total sob qualquer curva de densidade de probabilidade é sempre 1 (100%), pois representa todos os resultados possíveis.",explain_wrong:"Não depende da distribuição — é uma propriedade fundamental de qualquer distribuição de probabilidade válida."},
{id:"r3q11",text:"Na feira de Birka, 60% dos mercadores vendem hidromel e 40% vendem especiarias. Entre os que vendem hidromel, 30% também vendem chifres decorados. Qual a probabilidade de um mercador vender hidromel E chifres?",options:["0,90","0,18","0,30","0,12"],answer:1,difficulty:"medium",explain_correct:"P(H e C) = P(H) × P(C|H) = 0,60 × 0,30 = 0,18. Usamos a regra da multiplicação com probabilidade condicional.",explain_wrong:"0,30 é a probabilidade condicional P(C|H), não a probabilidade conjunta. Precisamos multiplicar pela P(H)."},
{id:"r3q12",text:"Huginn provoca: 'Se z = −1,5, qual é a posição desse guerreiro na distribuição de força?'",options:["Acima da média, na cauda superior","Exatamente na média","1,5 desvios padrão abaixo da média, cauda inferior","Fora da distribuição"],answer:2,difficulty:"medium",explain_correct:"Z = −1,5 indica que o valor está 1,5 desvios padrão abaixo da média — na porção inferior da distribuição.",explain_wrong:"Z negativo sempre indica abaixo da média. Nenhum valor de z está 'fora' da distribuição — a normal vai de −∞ a +∞."},
{id:"r3q13",text:"Em uma população de 1000 guerreiros, 5% têm uma doença rara. Um teste tem sensibilidade de 90% e especificidade de 95%. Se um guerreiro testa positivo, qual a probabilidade de realmente estar doente (aprox.)?",options:["90%","Cerca de 49%","95%","5%"],answer:1,difficulty:"medium",explain_correct:"Pelo Teorema de Bayes: P(D|+) = (0,90 × 0,05) / [(0,90 × 0,05) + (0,05 × 0,95)] = 0,045/0,0925 ≈ 48,6%. A prevalência baixa reduz drasticamente o valor preditivo positivo.",explain_wrong:"Sensibilidade (90%) é P(+|D), não P(D|+). A confusão entre essas probabilidades é o erro mais comum com o Teorema de Bayes."},
{id:"r3q14",text:"Odin Dinho lança 3 moedas justas. Qual a probabilidade de obter exatamente 2 caras?",options:["1/8","2/8","3/8","4/8"],answer:2,difficulty:"medium",explain_correct:"Usando binomial: C(3,2) × (0,5)² × (0,5)¹ = 3 × 0,25 × 0,5 = 3/8. As combinações possíveis são CCK, CKC, KCC.",explain_wrong:"São 8 resultados possíveis (2³). Dos 8, exatamente 3 têm duas caras. Logo 3/8, não 2/8."},
{id:"r3q15",text:"Se A e B são eventos independentes com P(A) = 0,4 e P(B) = 0,5, então P(A e B) é:",options:["0,90","0,20","0,10","0,45"],answer:1,difficulty:"medium",explain_correct:"Para eventos independentes: P(A e B) = P(A) × P(B) = 0,4 × 0,5 = 0,20.",explain_wrong:"0,90 seria P(A) + P(B), que é a regra da adição (e mesmo assim incorreta para não-excludentes). Para 'e', multiplica-se."},
{id:"r3q16",text:"Muninn lembra: 'À medida que n aumenta no TCL, o que acontece com o erro padrão?'",options:["Aumenta proporcionalmente","Permanece constante","Diminui (proporcional a 1/√n)","Vira zero"],answer:2,difficulty:"medium",explain_correct:"O erro padrão = σ/√n. Conforme n aumenta, √n cresce e o erro padrão diminui — estimativas ficam mais precisas.",explain_wrong:"O erro padrão nunca chega a zero (precisaria de n infinito). Ele diminui, mas nunca desaparece com amostras finitas."},
{id:"r3q17",text:"ThorMento confunde: 'P(A|B) é a mesma coisa que P(B|A)!' Quando isso seria verdade?",options:["Sempre","Nunca","Somente quando P(A) = P(B)","Somente quando A e B são mutuamente excludentes"],answer:2,difficulty:"medium",explain_correct:"P(A|B) = P(A∩B)/P(B) e P(B|A) = P(A∩B)/P(A). Só são iguais quando P(A) = P(B), pois os denominadores coincidem.",explain_wrong:"Geralmente P(A|B) ≠ P(B|A) — confundir essas probabilidades é a chamada 'falácia da condicional transposta'."},
{id:"r3q18",text:"Uma distribuição normal tem média 70 e DP 10. Qual a probabilidade aproximada de um valor estar entre 50 e 90?",options:["68%","95%","99,7%","50%"],answer:1,difficulty:"medium",explain_correct:"50 e 90 estão a 2 DP da média (70 ± 20). Pela regra empírica, ~95% dos dados estão a ±2 DP.",explain_wrong:"±1 DP (60 a 80) cobriria ~68%. ±3 DP (40 a 100) cobriria ~99,7%. A faixa 50–90 é exatamente ±2 DP."},
{id:"r3q19",text:"Se P(A ou B) = P(A) + P(B) − P(A e B), por que subtraímos P(A e B)?",options:["Porque A e B são mutuamente excludentes","Para corrigir a dupla contagem da interseção","Porque P(A e B) é sempre negativo","Para normalizar a probabilidade"],answer:1,difficulty:"medium",explain_correct:"Ao somar P(A) e P(B), a interseção (A∩B) é contada duas vezes — uma em cada evento. Subtraímos para contar apenas uma vez.",explain_wrong:"Se fossem mutuamente excludentes, P(A∩B) = 0 e não precisaríamos subtrair nada. A subtração corrige a dupla contagem."},
{id:"r3q20",text:"Huginn questiona: 'Uma moeda justa deu 10 caras seguidas. Qual a probabilidade de a próxima ser cara?'",options:["Menos de 50%, pois coroa está 'devendo'","Mais de 50%, pois a moeda está 'quente'","Exatamente 50%","Impossível calcular sem mais dados"],answer:2,difficulty:"medium",explain_correct:"Cada lançamento é independente. Resultados anteriores não influenciam o próximo — a probabilidade continua 50%.",explain_wrong:"Acreditar que resultados passados afetam eventos independentes futuros é a 'falácia do jogador' (gambler's fallacy)."}
],

"reino4": [
{id:"r4q01",text:"Odin Dinho quer estudar todos os 10.000 guerreiros dos Nove Reinos, mas só consegue avaliar 500. Os 10.000 são a:",options:["Amostra","População","Estatística","Parâmetro"],answer:1,difficulty:"easy",explain_correct:"A população é o conjunto completo de todos os elementos de interesse — aqui, os 10.000 guerreiros. Os 500 selecionados são a amostra.",explain_wrong:"A amostra é o subconjunto selecionado da população. Parâmetro é uma medida da população; estatística é uma medida da amostra."},
{id:"r4q02",text:"Na amostragem aleatória simples, cada membro da população tem:",options:["Probabilidade diferente de ser escolhido","Probabilidade zero de ser escolhido","A mesma probabilidade de ser escolhido","Probabilidade proporcional ao seu tamanho"],answer:2,difficulty:"easy",explain_correct:"Na amostragem aleatória simples, todos os membros da população têm igual probabilidade de serem selecionados.",explain_wrong:"Probabilidade proporcional ao tamanho é amostragem por conglomerados com PPS, não aleatória simples."},
{id:"r4q03",text:"Um pesquisador divide os guerreiros em 3 grupos (arqueiros, espadachins, cavaleiros) e sorteia proporcionalmente de cada grupo. Isso é amostragem:",options:["Por conveniência","Aleatória simples","Estratificada","Sistemática"],answer:2,difficulty:"easy",explain_correct:"Dividir a população em estratos (subgrupos homogêneos) e sortear de cada um é amostragem estratificada.",explain_wrong:"Na aleatória simples não há divisão prévia em grupos — todos vão para o mesmo 'bolo' de sorteio."},
{id:"r4q04",text:"Muninn sussurra: 'O erro amostral é...'",options:["Um erro cometido pelo pesquisador ao coletar dados","A diferença natural entre a estatística amostral e o parâmetro populacional","O mesmo que viés amostral","Um erro que pode ser eliminado aumentando o tamanho da amostra infinitamente"],answer:1,difficulty:"easy",explain_correct:"Erro amostral é a diferença inevitável entre o valor obtido na amostra e o verdadeiro valor da população — resultado do acaso.",explain_wrong:"Erro amostral não é erro do pesquisador (isso seria viés). É inerente ao processo de amostragem e diminui com n maior."},
{id:"r4q05",text:"ThorMento pesquisa apenas os guerreiros que estão na taverna porque é mais fácil. Esse tipo de amostragem é:",options:["Aleatória simples","Estratificada","Por conglomerados","Por conveniência"],answer:3,difficulty:"easy",explain_correct:"Selecionar quem está disponível ou acessível, sem critério probabilístico, é amostragem por conveniência.",explain_wrong:"Amostragem por conveniência não é probabilística — não permite generalizar com confiança para a população."},
{id:"r4q06",text:"O erro padrão da média é calculado como:",options:["σ / n","σ × √n","σ / √n","σ²/ n"],answer:2,difficulty:"easy",explain_correct:"O erro padrão = σ/√n. Ele mede a variabilidade esperada da média amostral em torno da média populacional.",explain_wrong:"Dividir σ por n (sem raiz) subestimaria o erro padrão. A fórmula correta usa a raiz quadrada de n."},
{id:"r4q07",text:"Uma amostra é considerada enviesada quando:",options:["É pequena demais","Sistematicamente favorece certos membros da população","Tem alta variabilidade","Usa distribuição não-normal"],answer:1,difficulty:"easy",explain_correct:"Viés amostral ocorre quando o processo de seleção sistematicamente favorece certos tipos de indivíduos, distorcendo os resultados.",explain_wrong:"Amostra pequena aumenta o erro amostral, mas não necessariamente causa viés. Viés é distorção sistemática, não aleatória."},
{id:"r4q08",text:"Na amostragem por conglomerados, o pesquisador:",options:["Divide a população em estratos homogêneos e sorteia de cada","Seleciona grupos inteiros (clusters) aleatoriamente","Escolhe os indivíduos mais acessíveis","Seleciona um indivíduo a cada k posições na lista"],answer:1,difficulty:"easy",explain_correct:"Na amostragem por conglomerados, sorteia-se grupos inteiros (aldeias, escolas, unidades) e avalia-se todos os membros dos grupos selecionados.",explain_wrong:"Na estratificada, sorteia-se indivíduos dentro de cada estrato. Na por conglomerados, sorteia-se os clusters inteiros."},
{id:"r4q09",text:"Um parâmetro é uma medida que descreve:",options:["A amostra","A população","O erro amostral","A margem de erro"],answer:1,difficulty:"easy",explain_correct:"Parâmetro descreve a população (ex.: μ, σ). Estatística descreve a amostra (ex.: x̄, s).",explain_wrong:"Medidas amostrais são estatísticas, não parâmetros. Parâmetros são geralmente desconhecidos e estimados pelas estatísticas."},
{id:"r4q10",text:"A margem de erro em uma pesquisa reflete:",options:["O viés do pesquisador","A precisão da estimativa: quão longe o resultado amostral pode estar do real","O número de perguntas do questionário","A taxa de resposta da pesquisa"],answer:1,difficulty:"easy",explain_correct:"A margem de erro indica a faixa de variação esperada da estimativa amostral em torno do valor verdadeiro da população.",explain_wrong:"A margem de erro está ligada ao erro amostral e ao nível de confiança, não ao viés ou ao desenho do questionário."},
{id:"r4q11",text:"Um jarl tem 3 aldeias: A (1000 habitantes), B (200 habitantes), C (50 habitantes). Ele quer uma amostra estratificada proporcional de 125. Quantos selecionar da Aldeia A?",options:["42","50","100","125"],answer:2,difficulty:"medium",explain_correct:"Proporção de A = 1000/1250 = 80%. Amostra de A = 0,80 × 125 = 100. Na alocação proporcional, cada estrato contribui na proporção do seu tamanho.",explain_wrong:"Dividir igualmente (42 cada) seria alocação uniforme, não proporcional. A proporcional reflete o peso de cada estrato na população."},
{id:"r4q12",text:"Huginn provoca: 'Se aumentarmos a amostra de 100 para 400, o erro padrão...'",options:["Cai pela metade","Cai para um quarto","Dobra","Não muda"],answer:0,difficulty:"medium",explain_correct:"EP = σ/√n. De √100=10 para √400=20, o denominador dobra, então o EP cai pela metade. Quadruplicar n reduz EP por fator de 2.",explain_wrong:"O EP diminui com √n, não com n. Para reduzir o EP pela metade, é preciso quadruplicar n, não dobrar."},
{id:"r4q13",text:"Um intervalo de confiança de 95% para a média de idade dos guerreiros é [25, 35]. A interpretação CORRETA é:",options:["95% dos guerreiros têm entre 25 e 35 anos","Há 95% de probabilidade de a média populacional estar entre 25 e 35","Se repetirmos o estudo muitas vezes, 95% dos intervalos construídos conterão a média verdadeira","A média é certamente 30"],answer:2,difficulty:"medium",explain_correct:"A interpretação frequentista correta é sobre o método: 95% dos intervalos gerados por esse procedimento conterão o parâmetro verdadeiro.",explain_wrong:"O IC não diz que há 95% de chance do parâmetro estar no intervalo — o parâmetro é fixo, o intervalo é que varia entre amostras."},
{id:"r4q14",text:"ThorMento fez uma pesquisa online e só responderam guerreiros que usam redes sociais nórdicas. Isso gera:",options:["Erro amostral aleatório","Viés de seleção/cobertura","Erro tipo I","Distribuição bimodal"],answer:1,difficulty:"medium",explain_correct:"Apenas guerreiros online podem responder — quem não tem acesso é sistematicamente excluído. Isso é viés de cobertura (subcobertura).",explain_wrong:"Erro amostral é aleatório e esperado. Viés é sistemático — o problema aqui é que a amostra não representa toda a população."},
{id:"r4q15",text:"Para um IC de 95%, o nível de significância (α) e o valor crítico z são aproximadamente:",options:["α = 0,10 e z = 1,28","α = 0,05 e z = 1,96","α = 0,01 e z = 2,576","α = 0,05 e z = 1,645"],answer:1,difficulty:"medium",explain_correct:"IC 95% → α = 0,05 (bilateral). O valor z que deixa 2,5% em cada cauda é 1,96.",explain_wrong:"z = 1,645 é para IC de 90% ou teste unilateral a 5%. z = 2,576 é para IC de 99%."},
{id:"r4q16",text:"Odin Dinho quer estimar a proporção de guerreiros canhotos com margem de erro de 3% e 95% de confiança. Sem estimativa prévia, o n mínimo é aproximadamente:",options:["100","267","1068","10000"],answer:2,difficulty:"medium",explain_correct:"n = (z²×p×q)/E² = (1,96²×0,5×0,5)/0,03² = (3,8416×0,25)/0,0009 ≈ 1068. Usa-se p=0,5 para máxima variância quando não há estimativa prévia.",explain_wrong:"Usar p = 0,5 é o cenário conservador que produz o maior n necessário. Valores menores de n dariam margem de erro maior que 3%."},
{id:"r4q17",text:"Muninn lembra: 'A diferença entre amostragem estratificada e por conglomerados é...'",options:["Estratificada usa grupos heterogêneos internamente; conglomerados usa grupos homogêneos internamente","Estratificada seleciona indivíduos de todos os estratos; conglomerados seleciona clusters inteiros","Não há diferença — são sinônimos","Estratificada é não-probabilística; conglomerados é probabilística"],answer:1,difficulty:"medium",explain_correct:"Na estratificada, amostra-se dentro de todos os estratos. Na por conglomerados, sorteia-se clusters inteiros e estuda-se todos os membros dos selecionados.",explain_wrong:"Idealmente, estratos são homogêneos internamente (e diferentes entre si); conglomerados são heterogêneos internamente (microcosmo da população)."},
{id:"r4q18",text:"Se a margem de erro de uma pesquisa é ±5% e o resultado obtido para 'prefere espada' é 52%, isso significa que:",options:["52% é o valor exato da população","O verdadeiro valor provavelmente está entre 47% e 57%","A pesquisa é inválida","Espada vence com certeza"],answer:1,difficulty:"medium",explain_correct:"Com margem de ±5%, o IC vai de 47% a 57%. Como inclui 50%, não se pode afirmar com certeza que a maioria prefere espada.",explain_wrong:"A margem de erro mostra a faixa de incerteza. Se o IC cruza 50%, a 'vitória' de espada não é estatisticamente clara."},
{id:"r4q19",text:"Huginn questiona: 'O que acontece com o IC se passarmos de 95% para 99% de confiança, mantendo a mesma amostra?'",options:["O intervalo fica mais estreito","O intervalo fica mais largo","Não muda","O intervalo desaparece"],answer:1,difficulty:"medium",explain_correct:"Maior confiança exige maior valor crítico de z (de 1,96 para 2,576), alargando o intervalo. Mais confiança = menos precisão.",explain_wrong:"Há um trade-off entre confiança e precisão: para ter mais certeza de capturar o parâmetro, o intervalo precisa ser mais amplo."},
{id:"r4q20",text:"Uma pesquisa com 50 aldeias viking obteve média de produção de 200 sacos de grãos (EP = 10). O IC de 95% é aproximadamente:",options:["[180, 220]","[190, 210]","[180,4, 219,6]","[170, 230]"],answer:2,difficulty:"medium",explain_correct:"IC 95% = média ± z × EP = 200 ± 1,96 × 10 = 200 ± 19,6 = [180,4; 219,6].",explain_wrong:"200 ± 10 daria [190, 210], que seria ±1 EP — equivalente a ~68% de confiança, não 95%."}
],

"reino5": [
{id:"r5q01",text:"No Tribunal de Asgard, Odin Dinho julga se uma nova técnica de forja produz espadas mais resistentes. Qual é a hipótese nula (H₀) correta?",options:["A nova técnica produz espadas mais resistentes","A nova técnica não altera a resistência das espadas","A nova técnica produz espadas menos resistentes","A nova técnica é melhor que a antiga"],answer:1,difficulty:"easy",explain_correct:"H₀ sempre representa o status quo — a ausência de efeito ou diferença. Aqui, significa que a técnica nova não muda nada na resistência.",explain_wrong:"As demais opções representam hipóteses alternativas (H₁) ou direcionais, não a hipótese nula que assume ausência de efeito."},
{id:"r5q02",text:"ThorMento diz que p-valor é 'a probabilidade de H₀ ser verdadeira'. Muninn sussurra a definição correta. Qual é?",options:["A probabilidade de H₀ ser verdadeira dado os dados","A probabilidade de obter resultados tão ou mais extremos que os observados, assumindo H₀ verdadeira","A probabilidade de H₁ ser falsa","A probabilidade de cometer erro Tipo II"],answer:1,difficulty:"easy",explain_correct:"O p-valor é a probabilidade de observar dados tão ou mais extremos que os obtidos, sob a suposição de que H₀ é verdadeira. Não é a probabilidade de H₀ ser verdadeira.",explain_wrong:"Confundir p-valor com a probabilidade de H₀ ser verdadeira é a falácia mais comum — o p-valor é calculado assumindo H₀, não avaliando sua veracidade."},
{id:"r5q03",text:"Um guerreiro viking comete erro Tipo I no Tribunal de Asgard. O que aconteceu?",options:["Absolveu um culpado (não rejeitou H₀ falsa)","Condenou um inocente (rejeitou H₀ verdadeira)","Acertou o veredito","Não conseguiu decidir"],answer:1,difficulty:"easy",explain_correct:"Erro Tipo I é rejeitar H₀ quando ela é verdadeira — como condenar um inocente. É o falso positivo.",explain_wrong:"Absolver um culpado seria erro Tipo II (falso negativo). Os demais não descrevem erros estatísticos formais."},
{id:"r5q04",text:"O nível de significância α = 0,05 estabelecido pelo Tribunal de Asgard representa:",options:["A probabilidade de H₁ ser verdadeira","A probabilidade máxima tolerada de cometer erro Tipo I","A probabilidade de cometer erro Tipo II","O tamanho do efeito mínimo aceitável"],answer:1,difficulty:"easy",explain_correct:"O α define o limiar de tolerância para falsos positivos — a probabilidade máxima de rejeitar H₀ quando ela é verdadeira.",explain_wrong:"α não se refere a H₁, nem ao erro Tipo II (que é β), nem ao tamanho de efeito. É exclusivamente o critério de risco de falso positivo."},
{id:"r5q05",text:"Odin Dinho quer testar se a proporção de guerreiros canhotos difere de 50%. Qual teste usar?",options:["Teste t pareado","Qui-quadrado de aderência (goodness-of-fit)","ANOVA de um fator","Regressão logística"],answer:1,difficulty:"easy",explain_correct:"O qui-quadrado de aderência compara frequências observadas com frequências esperadas sob uma distribuição teórica — ideal para testar se proporções diferem de um valor esperado.",explain_wrong:"Teste t e ANOVA são para médias contínuas, não proporções. Regressão logística modela variáveis dependentes binárias, mas não testa aderência a uma proporção simples."},
{id:"r5q06",text:"Num teste qui-quadrado com 4 categorias de armas (espada, machado, lança, arco), quantos graus de liberdade existem no teste de aderência?",options:["2","3","4","5"],answer:1,difficulty:"easy",explain_correct:"Graus de liberdade no χ² de aderência = k − 1, onde k é o número de categorias. Com 4 categorias: 4 − 1 = 3.",explain_wrong:"Não é k (4), nem k − 2, nem k + 1. A fórmula é sempre número de categorias menos 1."},
{id:"r5q07",text:"Para o teste qui-quadrado ser válido, qual é a regra clássica sobre frequências esperadas?",options:["Todas as frequências observadas devem ser maiores que 10","Todas as frequências esperadas devem ser pelo menos 5","O total da amostra deve ser maior que 100","As frequências observadas devem seguir distribuição normal"],answer:1,difficulty:"easy",explain_correct:"A regra clássica exige que todas as células tenham frequência esperada ≥ 5 para que a aproximação qui-quadrado seja confiável.",explain_wrong:"A regra se refere a frequências esperadas (não observadas), não ao N total, e o χ² não exige normalidade dos dados brutos."},
{id:"r5q08",text:"Huginn provoca: 'Se p = 0,03 e α = 0,05, o resultado é estatisticamente significante. Isso garante importância prática?' A resposta correta é:",options:["Sim, significância estatística sempre implica relevância prática","Não, significância estatística indica apenas que o efeito provavelmente não é zero — mas pode ser trivialmente pequeno","Sim, se p < α o efeito é sempre grande","Não, porque p = 0,03 está muito perto de 0,05"],answer:1,difficulty:"easy",explain_correct:"Significância estatística apenas rejeita a hipótese de efeito zero. Com amostras grandes, efeitos minúsculos e irrelevantes na prática podem ser 'significantes'.",explain_wrong:"Significância estatística não informa sobre a magnitude ou relevância prática do efeito. A proximidade de p com α também não é o ponto central."},
{id:"r5q09",text:"Um teste bilateral (bicaudal) difere de um unilateral porque:",options:["O bilateral tem maior poder estatístico","O bilateral avalia desvios em ambas as direções da hipótese nula","O bilateral só se aplica a amostras grandes","O bilateral usa α = 0,10 em vez de 0,05"],answer:1,difficulty:"easy",explain_correct:"O teste bilateral distribui α nas duas caudas, testando se o efeito pode ir em qualquer direção — maior ou menor que o esperado sob H₀.",explain_wrong:"O teste bilateral tem menor poder (não maior) para detectar efeito em uma direção específica. Não depende do tamanho amostral nem altera o α automaticamente."},
{id:"r5q10",text:"No Tribunal de Asgard, erro Tipo II significa:",options:["Rejeitar H₀ quando ela é verdadeira","Não rejeitar H₀ quando ela é falsa","Rejeitar H₁ quando ela é verdadeira","Aceitar H₁ sem evidência suficiente"],answer:1,difficulty:"easy",explain_correct:"Erro Tipo II (β) ocorre quando falhamos em rejeitar H₀ sendo que H₁ é verdadeira — deixamos escapar um efeito real. É o falso negativo.",explain_wrong:"Rejeitar H₀ verdadeira é erro Tipo I. As demais opções não correspondem a definições formais de erros em testes de hipótese."},
{id:"r5q11",text:"Odin Dinho analisa se o tipo de arma (espada, machado, lança) e o resultado da batalha (vitória, derrota) são independentes. Obtém χ² = 8,41 com gl = 2. O valor crítico para α = 0,05 é 5,991. Qual a conclusão?",options:["Não rejeitar H₀ — as variáveis são independentes","Rejeitar H₀ — há associação significante entre tipo de arma e resultado","Inconclusivo — precisa de mais dados","Rejeitar H₁ — as variáveis são dependentes"],answer:1,difficulty:"medium",explain_correct:"Como χ²(2) = 8,41 > 5,991 (valor crítico), rejeitamos H₀ de independência. Há evidência de associação significante entre tipo de arma e resultado.",explain_wrong:"Quando o valor calculado supera o crítico, rejeitamos H₀. Nunca 'rejeitamos H₁' formalmente, e o resultado não é inconclusivo com dados suficientes."},
{id:"r5q12",text:"Um pesquisador viking testa 20 hipóteses simultâneas usando α = 0,05 sem correção. Quantos falsos positivos esperamos por acaso?",options:["Nenhum, se os dados forem bons","Exatamente 1","Aproximadamente 1","Exatamente 5"],answer:2,difficulty:"medium",explain_correct:"Com 20 testes e α = 0,05, esperamos 20 × 0,05 = 1 falso positivo em média. O 'aproximadamente' é correto porque é um valor esperado, não exato.",explain_wrong:"Não é zero (o acaso produz falsos positivos), nem 5 (esse seria 20 × 0,25). O valor esperado é 1, mas como é probabilístico, pode ser 0, 1 ou mais em qualquer amostra específica."},
{id:"r5q13",text:"ThorMento aplicou a correção de Bonferroni em 10 comparações com α = 0,05. Qual o novo α por comparação?",options:["0,05","0,01","0,005","0,025"],answer:2,difficulty:"medium",explain_correct:"Bonferroni divide α pelo número de comparações: 0,05 / 10 = 0,005. Cada teste individual usa esse limiar mais rigoroso.",explain_wrong:"Manter 0,05 ignora a correção. 0,01 seria para 5 comparações. 0,025 seria para 2 comparações. A fórmula é α/k."},
{id:"r5q14",text:"Huginn questiona: 'Um pesquisador coletou dados, encontrou p = 0,12, então adicionou mais variáveis até obter p = 0,04. Qual prática questionável é essa?'",options:["HARKing","p-hacking","Erro Tipo II","Correção de Bonferroni"],answer:1,difficulty:"medium",explain_correct:"p-hacking é manipular análises (adicionar variáveis, excluir outliers, mudar critérios) até obter p < 0,05. Isso infla drasticamente a taxa de falsos positivos.",explain_wrong:"HARKing é formular hipóteses após ver os resultados. Erro Tipo II é falhar em detectar efeito real. Bonferroni é uma correção legítima, não uma prática questionável."},
{id:"r5q15",text:"Muninn lembra: 'HARKing significa Hypothesizing After Results are Known.' Qual cenário ilustra HARKing?",options:["Definir hipóteses antes de coletar dados e reportá-las como planejadas","Encontrar um resultado inesperado e reescrever a introdução como se a hipótese fosse original","Usar correção de Bonferroni para múltiplas comparações","Replicar um estudo com amostra maior"],answer:1,difficulty:"medium",explain_correct:"HARKing ocorre quando o pesquisador descobre um resultado post-hoc e apresenta como se fosse a hipótese original a priori — distorcendo o processo científico.",explain_wrong:"Definir hipóteses antes é o correto. Bonferroni é uma correção legítima. Replicação é boa prática. Só reescrever hipóteses após ver resultados é HARKing."},
{id:"r5q16",text:"Num qui-quadrado de independência com tabela 3×4 (3 tipos de escudo × 4 regiões), quantos graus de liberdade temos?",options:["12","7","6","11"],answer:2,difficulty:"medium",explain_correct:"gl = (linhas − 1)(colunas − 1) = (3 − 1)(4 − 1) = 2 × 3 = 6. A fórmula retira uma restrição de cada dimensão.",explain_wrong:"12 seria linhas × colunas. 7 e 11 não correspondem à fórmula correta. Os gl refletem a informação livre após fixar as marginais."},
{id:"r5q17",text:"Odin Dinho obtém p = 0,048 em um teste com α = 0,05. ThorMento comemora: 'Quase não passou, mas é significante!' Qual a melhor interpretação?",options:["O resultado é significante, portanto o efeito é grande e importante","O resultado é marginalmente significante e deve ser interpretado com cautela, considerando tamanho de efeito e IC","O resultado não é significante porque p está muito perto de 0,05","Devemos reduzir α para 0,01 e retestar"],answer:1,difficulty:"medium",explain_correct:"Embora p < 0,05, um valor tão próximo do limiar exige cautela. A decisão binária (significante/não) é simplista — o tamanho de efeito e o IC fornecem informação mais rica.",explain_wrong:"Dizer que o efeito é grande só pelo p é a falácia da significância. p = 0,048 tecnicamente é significante a 0,05, mas a proximidade do limiar pede prudência interpretativa."},
{id:"r5q18",text:"Um pesquisador testa se o número de espadas vendidas em 5 feiras segue distribuição uniforme. Observou: 30, 25, 20, 35, 40 (total = 150). Qual a frequência esperada por feira sob H₀?",options:["25","30","35","Depende da média ponderada"],answer:1,difficulty:"medium",explain_correct:"Sob distribuição uniforme, a frequência esperada é o total dividido pelo número de categorias: 150/5 = 30 por feira.",explain_wrong:"25, 35 e a média ponderada não se aplicam. Na aderência uniforme, cada categoria recebe fração igual do total."},
{id:"r5q19",text:"Huginn provoca: 'Se você testa 5 hipóteses e obtém p = 0,03 em uma delas sem correção, qual é o problema?' A melhor resposta é:",options:["Nenhum problema — p < 0,05 basta","O α efetivo da família de testes é maior que 0,05, inflando a taxa de falso positivo","O teste perde poder com múltiplas hipóteses","Precisamos de p < 0,01 para 5 testes"],answer:1,difficulty:"medium",explain_correct:"Com 5 testes sem correção, a probabilidade de ao menos um falso positivo sobe para 1 − (0,95)⁵ ≈ 0,226 — muito além dos 5% nominais. A taxa de erro familiar está inflada.",explain_wrong:"Não é apenas sobre o limiar individual. O problema é a acumulação de risco de falso positivo quando múltiplos testes são realizados simultaneamente."},
{id:"r5q20",text:"No Tribunal de Asgard, Odin Dinho explica que um teste com baixo poder estatístico é perigoso. Por quê?",options:["Porque aumenta a chance de erro Tipo I","Porque aumenta a chance de erro Tipo II — efeitos reais passam despercebidos","Porque invalida o nível de significância α","Porque torna o p-valor maior que 1"],answer:1,difficulty:"medium",explain_correct:"Poder = 1 − β. Baixo poder significa alta probabilidade de erro Tipo II: não detectar um efeito que realmente existe. Estudos subpotentes desperdiçam recursos e geram resultados inconclusivos.",explain_wrong:"Baixo poder não afeta diretamente o erro Tipo I (controlado por α), não invalida α, e p-valores nunca excedem 1. O problema é exclusivamente a falha em detectar efeitos reais."}
],

"reino6": [
{id:"r6q01",text:"Na Arena de Valhalla, Odin Dinho quer comparar a resistência média de espadas forjadas em uma aldeia com o padrão de Asgard (μ = 100). Qual teste t usar?",options:["Teste t independente","Teste t pareado","Teste t para uma amostra","Qui-quadrado de aderência"],answer:2,difficulty:"easy",explain_correct:"O teste t para uma amostra compara a média de um grupo com um valor de referência fixo (μ conhecido). Ideal para comparar com um padrão.",explain_wrong:"O t independente compara dois grupos. O pareado compara medidas repetidas. O qui-quadrado testa frequências, não médias."},
{id:"r6q02",text:"Dois clãs vikings treinam separadamente. Para comparar o tempo médio de combate entre eles, qual teste t é adequado?",options:["Teste t para uma amostra","Teste t pareado","Teste t para amostras independentes","Nenhum teste t se aplica"],answer:2,difficulty:"easy",explain_correct:"O teste t independente compara médias de dois grupos distintos e não pareados — dois clãs separados são grupos independentes.",explain_wrong:"Para uma amostra exige valor de referência fixo. O pareado requer dados emparelhados (mesmo sujeito, duas condições). Ambos são inadequados aqui."},
{id:"r6q03",text:"Guerreiros são testados antes e depois de um treinamento especial. Para comparar seu desempenho nos dois momentos, usamos:",options:["Teste t independente","Teste t pareado","Teste t para uma amostra","ANOVA de medidas repetidas"],answer:1,difficulty:"easy",explain_correct:"O teste t pareado compara duas medidas do mesmo indivíduo em condições diferentes (antes/depois). Os dados são dependentes — cada guerreiro é seu próprio controle.",explain_wrong:"O t independente exige grupos diferentes. O t para uma amostra compara com valor fixo. ANOVA seria para 3+ condições."},
{id:"r6q04",text:"Quais são os três pressupostos clássicos do teste t independente?",options:["Normalidade, homocedasticidade e independência das observações","Linearidade, normalidade e ausência de outliers","Homocedasticidade, aleatoriedade e escala ordinal","Normalidade, multicolinearidade e independência"],answer:0,difficulty:"easy",explain_correct:"Os três pressupostos são: (1) distribuição normal das populações, (2) variâncias iguais (homocedasticidade) e (3) independência das observações.",explain_wrong:"Linearidade e multicolinearidade pertencem à regressão. Escala ordinal não se aplica ao t (que exige intervalar/razão). Ausência de outliers é desejável mas não é pressuposto formal."},
{id:"r6q05",text:"O teste de Levene serve para verificar qual pressuposto do teste t?",options:["Normalidade dos dados","Independência das observações","Homogeneidade de variâncias (homocedasticidade)","Ausência de outliers"],answer:2,difficulty:"easy",explain_correct:"O teste de Levene avalia se as variâncias dos grupos são estatisticamente iguais — pressuposto de homocedasticidade do teste t independente.",explain_wrong:"Normalidade é testada por Shapiro-Wilk ou Kolmogorov-Smirnov. Independência vem do delineamento. Outliers são detectados por boxplots ou critérios como z > 3."},
{id:"r6q06",text:"Quando o teste de Levene é significante (p < 0,05), indica variâncias desiguais. Qual a correção apropriada para o teste t?",options:["Usar teste t pareado em vez de independente","Aplicar a correção de Welch (que ajusta os graus de liberdade)","Aumentar o tamanho da amostra","Usar α = 0,01 em vez de 0,05"],answer:1,difficulty:"easy",explain_correct:"A correção de Welch ajusta os graus de liberdade para compensar variâncias desiguais, mantendo o teste t válido sem exigir homocedasticidade.",explain_wrong:"Mudar para pareado altera o delineamento. Aumentar N ou mudar α não corrige variâncias desiguais. Welch é a solução padrão."},
{id:"r6q07",text:"Cohen's d = 0,80 é considerado um efeito:",options:["Pequeno","Médio","Grande","Muito grande"],answer:2,difficulty:"easy",explain_correct:"Pelos benchmarks de Cohen: d = 0,20 (pequeno), d = 0,50 (médio), d = 0,80 (grande). Logo, d = 0,80 é efeito grande.",explain_wrong:"Os limites convencionais de Cohen são bem estabelecidos: 0,20/0,50/0,80. Porém, devem ser interpretados no contexto da área de pesquisa."},
{id:"r6q08",text:"Muninn sussurra: 'No formato APA, como se reporta um teste t?' A forma correta é:",options:["t = 2,45; p = 0,02; d = 0,61","t(28) = 2,45, p = 0,018, d = 0,61","T(28) = 2.45, P = .018, D = .61","t[28] = 2,45, p = 0,018, d = 0,61"],answer:1,difficulty:"easy",explain_correct:"Formato APA: t em itálico, graus de liberdade entre parênteses, p exato com três decimais, tamanho de efeito. Exemplo: t(28) = 2,45, p = 0,018, d = 0,61.",explain_wrong:"Falta de gl, uso de colchetes, letras maiúsculas ou ausência de gl são desvios do padrão APA."},
{id:"r6q09",text:"No teste t para amostras independentes com n₁ = 15 e n₂ = 15, quantos graus de liberdade temos (assumindo variâncias iguais)?",options:["15","28","29","30"],answer:1,difficulty:"easy",explain_correct:"gl = n₁ + n₂ − 2 = 15 + 15 − 2 = 28. Subtraímos 2 porque estimamos duas médias amostrais.",explain_wrong:"15 seria n − 1 de um grupo. 29 ou 30 não seguem a fórmula correta. São sempre N total menos 2 para t independente com variâncias iguais."},
{id:"r6q10",text:"Hedges' g é preferido sobre Cohen's d quando:",options:["As amostras são muito grandes (N > 500)","As amostras são pequenas, pois Hedges' g corrige o viés de superestimação","Os dados não são normais","Há mais de dois grupos"],answer:1,difficulty:"easy",explain_correct:"Com amostras pequenas, Cohen's d superestima o tamanho de efeito. Hedges' g aplica um fator de correção (J) que remove esse viés, sendo mais preciso.",explain_wrong:"Em amostras grandes, d e g convergem. A normalidade não é o critério de escolha entre d e g. Para mais de dois grupos, usam-se outras métricas (η²)."},
{id:"r6q11",text:"Odin Dinho compara dois métodos de forja. Grupo A (n=12): M=85, DP=10. Grupo B (n=12): M=78, DP=12. O teste t(22) = 1,54, p = 0,138. A conclusão correta é:",options:["Os métodos são comprovadamente iguais","Não há evidência suficiente para afirmar que os métodos diferem","O método A é significantemente melhor que o B","O teste é inválido com amostras tão pequenas"],answer:1,difficulty:"medium",explain_correct:"p = 0,138 > 0,05: não rejeitamos H₀. Isso não prova igualdade — apenas que não temos evidência suficiente para afirmar diferença. Ausência de evidência não é evidência de ausência.",explain_wrong:"'Comprovar igualdade' requer TOST. O método A não é significantemente melhor (p > 0,05). N = 12 por grupo pode ter baixo poder, mas não invalida o teste."},
{id:"r6q12",text:"Um pesquisador obtém t(30) = 2,10, p = 0,044, d = 0,15. Huginn provoca: 'Significante com efeito minúsculo — como isso é possível?'",options:["É impossível — se d é pequeno, p não pode ser significante","Com amostra suficientemente grande, até efeitos triviais alcançam significância","O pesquisador cometeu erro de cálculo","O d está errado porque deveria ser Hedges' g"],answer:1,difficulty:"medium",explain_correct:"Com N grande, o erro padrão diminui e até diferenças mínimas produzem t significante. É por isso que reportar tamanho de efeito é essencial — p não informa magnitude.",explain_wrong:"É perfeitamente possível ter d pequeno e p significante. Não indica erro. A escolha entre d e g não explica a discrepância — o fenômeno é do poder estatístico."},
{id:"r6q13",text:"Para o teste t pareado, qual alternativa NÃO é um pressuposto?",options:["As diferenças entre os pares devem ser aproximadamente normais","As observações dentro de cada par devem ser dependentes","As variâncias dos dois grupos devem ser iguais","A variável dependente deve ser intervalar ou de razão"],answer:2,difficulty:"medium",explain_correct:"No teste t pareado, não se exige homocedasticidade (variâncias iguais entre grupos). O que deve ser normal é a distribuição das diferenças entre pares, não os grupos individualmente.",explain_wrong:"Normalidade das diferenças, dependência dos pares e escala intervalar/razão são pressupostos reais. Homocedasticidade é pressuposto do t independente, não do pareado."},
{id:"r6q14",text:"Odin Dinho calcula IC 95% para a diferença de médias entre dois clãs: [−2,3; 8,7]. O que podemos concluir?",options:["A diferença é significante porque o IC é amplo","A diferença não é significante a α = 0,05 porque o IC inclui zero","A diferença é significante porque o limite superior é positivo","Precisamos do p-valor para decidir — o IC não basta"],answer:1,difficulty:"medium",explain_correct:"Se o IC 95% para a diferença inclui zero, não podemos rejeitar H₀ a α = 0,05. O zero dentro do intervalo indica que ausência de diferença é uma possibilidade plausível.",explain_wrong:"IC amplo não implica significância. O limite superior positivo sozinho não basta. O IC é equivalente ao teste t bilateral — se contém zero, p > 0,05."},
{id:"r6q15",text:"ThorMento quer usar teste unilateral para 'facilitar' a significância. Quando o teste unilateral é legítimo?",options:["Sempre que o p bilateral for maior que 0,05","Apenas quando há justificativa teórica a priori para a direção do efeito","Quando a amostra é pequena","Quando o pesquisador espera efeito grande"],answer:1,difficulty:"medium",explain_correct:"O teste unilateral só é legítimo quando a direção do efeito foi hipotetizada antes da coleta, com base teórica sólida. Escolher após ver os dados é p-hacking.",explain_wrong:"Mudar para unilateral após ver p bilateral alto é manipulação. Tamanho amostral ou do efeito esperado não justifica a escolha direcional — a teoria a priori sim."},
{id:"r6q16",text:"Um estudo com n = 8 por grupo encontra d = 0,50, p = 0,21. Odin Dinho explica que o poder estatístico é baixo. Qual é a implicação?",options:["O efeito de d = 0,50 é falso positivo","O estudo não tinha amostra suficiente para detectar um efeito médio — alto risco de Tipo II","O teste t é inapropriado para n < 10","Precisamos usar teste não-paramétrico"],answer:1,difficulty:"medium",explain_correct:"Com n = 8 por grupo e d = 0,50, o poder é muito baixo (~17%). O p = 0,21 não prova ausência de efeito — apenas que o estudo era subpotente para detectá-lo.",explain_wrong:"d = 0,50 é o efeito observado, não necessariamente falso. O t funciona com n < 10 se os pressupostos forem atendidos. Não-paramétrico não resolve o problema de poder."},
{id:"r6q17",text:"Muninn lembra o formato APA para reportar teste t com IC e tamanho de efeito. Qual está correto?",options:["t(38) = 2,87, p = 0,007, d = 0,91, IC 95% [0,27; 1,54]","t = 2,87, p < 0,05, efeito grande","F(38) = 2,87, p = 0,007, d = 0,91","t(38) = 2,87, significante, d = 0,91"],answer:0,difficulty:"medium",explain_correct:"O reporte APA completo inclui: t(gl) = valor, p exato, d com IC. Exemplo: t(38) = 2,87, p = 0,007, d = 0,91, 95% CI [0,27; 1,54].",explain_wrong:"'p < 0,05' sem valor exato é insuficiente. F é para ANOVA, não teste t. 'Significante' sem p exato viola diretrizes APA atuais."},
{id:"r6q18",text:"Odin Dinho usa a correção de Welch e obtém gl = 21,4 (não inteiro). Por que os gl de Welch podem ser fracionários?",options:["Erro de arredondamento do software","A fórmula de Welch-Satterthwaite pondera os gl pelas variâncias de cada grupo, produzindo valores não inteiros","Welch sempre arredonda para baixo","Só acontece quando os grupos têm tamanhos iguais"],answer:1,difficulty:"medium",explain_correct:"A fórmula de Welch-Satterthwaite calcula gl como função das variâncias e tamanhos amostrais de ambos os grupos, resultando naturalmente em valores fracionários.",explain_wrong:"Não é erro de software nem arredondamento. Ocorre com grupos de qualquer tamanho. É uma propriedade matemática da aproximação de Satterthwaite."},
{id:"r6q19",text:"Em qual situação o teste t independente e o pareado dariam resultados muito diferentes para os mesmos dados?",options:["Quando as amostras são grandes (N > 100)","Quando há alta correlação entre as medidas pareadas — o pareado captura essa correlação e reduz o erro","Quando as variâncias são iguais","Nunca — os dois testes são equivalentes"],answer:1,difficulty:"medium",explain_correct:"O t pareado remove a variabilidade entre sujeitos, usando cada par como próprio controle. Quanto maior a correlação entre as medidas, menor o erro padrão das diferenças e maior o poder do pareado.",explain_wrong:"Os testes não são equivalentes — o pareado é geralmente mais potente quando há correlação. N grande ajuda ambos. Variâncias iguais beneficiam o t independente, não diferenciam os dois."},
{id:"r6q20",text:"Huginn questiona: 'Se Cohen's d = 0,47 com IC 95% [−0,42; 1,35], o que isso revela?' A interpretação correta é:",options:["O efeito é médio e confirmado pelo IC","O efeito pontual é quase médio, mas o IC amplo inclui zero e valores grandes — há muita incerteza sobre a verdadeira magnitude","O IC mostra que d é significante porque contém 0,47","O efeito é pequeno porque o limite inferior é negativo"],answer:1,difficulty:"medium",explain_correct:"O IC de d incluindo zero indica que o efeito pode ser nulo, pequeno, médio ou grande. A incerteza é alta — o ponto estimado (0,47) é impreciso. Mais dados são necessários.",explain_wrong:"O IC não 'confirma' o efeito se inclui zero. Conter o valor pontual é trivial. O limite inferior negativo mostra possibilidade de efeito na direção oposta, não que d é pequeno."}
],

"reino7": [
{id:"r7q01",text:"Na Ponte de Bifrost, Odin Dinho explica que TOST significa:",options:["Two Omnibus Statistical Tests","Two One-Sided Tests — dois testes unilaterais simultâneos","Test Of Statistical Threshold","Total Observed Statistical Trend"],answer:1,difficulty:"easy",explain_correct:"TOST = Two One-Sided Tests. São dois testes t unilaterais conduzidos simultaneamente para verificar se o efeito está dentro de limites de equivalência pré-definidos.",explain_wrong:"As demais são siglas fictícias. O nome reflete exatamente o procedimento: dois testes unilaterais, um para cada limite de equivalência."},
